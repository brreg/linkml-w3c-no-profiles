      kontaktlaerergruppe:
        slot_uri: utd:kontaktlaerergruppe
        range: Kontaktlaerergruppe
        multivalued: true
        description: Kontaktlærergrupper knytt til klassen.
        in_subset:
          - Valgfri

  Klassemedlemskap:
    is_a: Gruppemedlemskap
