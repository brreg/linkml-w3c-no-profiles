      - kontaktlaerergruppe
      - skoleressurs
      - fag
      - faggruppe
      - skoleeierType
      - vigoreferanse
      - eksamensgruppe
      - utdanningsprogram
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      domenenavn:
        in_subset:
          - Valgfri
      juridiskNavn:
        in_subset:
          - Valgfri
      organisasjonsnavn:
        in_subset:
          - Valgfri
      skolenummer:
        in_subset:
          - Obligatorisk
      organisasjonsnummer:
        in_subset:
          - Valgfri
      forretningsadresse:
        in_subset:
          - Valgfri
      postadresse:
        in_subset:
          - Valgfri
      organisasjon:
        in_subset:
          - Valgfri
      klasse:
        multivalued: true
        in_subset:
          - Valgfri
      kontaktlaerergruppe:
        multivalued: true
        in_subset:
          - Valgfri
      skoleressurs:
        multivalued: true
        in_subset:
          - Valgfri
      fag:
        multivalued: true
        in_subset:
          - Valgfri
      faggruppe:
        multivalued: true
        in_subset:
          - Valgfri
      skoleeierType:
        in_subset:
          - Valgfri
      vigoreferanse:
        in_subset:
          - Valgfri
      eksamensgruppe:
        multivalued: true
        in_subset:
          - Valgfri
      utdanningsprogram:
        in_subset:
          - Valgfri

  Skoleressurs:
    description: Ein lærar eller anna tilsett ved ein skule.
    class_uri: utd:Skoleressurs
