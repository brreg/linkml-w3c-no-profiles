    class_uri: utd:Persongruppemedlemskap
    slots:
      - elevforhold
      - persongruppe
    slot_usage:
      elevforhold:
        in_subset:
          - Valgfri
      persongruppe:
        in_subset:
          - Valgfri

  Skole:
    description: Ein skule eller opplæringsinstitusjon.
    class_uri: utd:Skole
    slots:
      - id
      - navn
      - domenenavn
      - juridiskNavn
      - organisasjonsnavn
      - skolenummer
      - organisasjonsnummer
      - forretningsadresse
      - postadresse
      - organisasjon
