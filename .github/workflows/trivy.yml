name: Trivy

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 2'   # tirsdag morgen

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  scan-requirements:
    runs-on: ubuntu-22.04
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Skann mcp-linkml-validator/requirements.txt
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: src/mcp-linkml-validator/requirements.txt
          format: sarif
          output: trivy-validator.sarif

      - name: Skann mcp-linkml-modell-utkast/requirements.txt
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: src/mcp-linkml-modell-utkast/requirements.txt
          format: sarif
          output: trivy-generator.sarif

      - name: Skann assets/requirements-python-test.txt
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: src/assets/containers/requirements-python-test.txt
          format: sarif
          output: trivy-assets.sarif

      - name: Last opp trivy-validator.sarif til GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-validator.sarif
          category: trivy-validator

      - name: Last opp trivy-generator.sarif til GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-generator.sarif
          category: trivy-generator

      - name: Last opp trivy-assets.sarif til GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-assets.sarif
          category: trivy-assets

  generate-sbom:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Generer SBOM for hele repoet
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          output: sbom.spdx.json

      - name: Last opp SBOM som artefakt
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
