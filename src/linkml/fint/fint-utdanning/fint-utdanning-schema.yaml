    attributes:
      skoleaar:
        slot_uri: utd:skoleaar
        range: Skoleaar
        description: Skoleåret klassen tilhøyrer.
        in_subset:
          - Valgfri
      termin:
        slot_uri: utd:termin
        range: Termin
        multivalued: true
        description: Terminar klassen er aktiv i.
        in_subset:
          - Valgfri
      trinn:
        slot_uri: utd:trinn
        range: Arstrinn
        multivalued: true
        description: Årstrinnet klassen tilhøyrer.
        in_subset:
          - Valgfri
      skole:
        slot_uri: utd:skole
        range: Skole
        description: Skulen klassen tilhøyrer.
        in_subset:
          - Valgfri
      undervisningsforhold:
        slot_uri: utd:undervisningsforhold
        range: Undervisningsforhold
        multivalued: true
