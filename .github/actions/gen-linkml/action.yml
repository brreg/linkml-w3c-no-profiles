name: Flattar ut importar (gen-linkml)
description: Køyrer gen-linkml for å flatte ut importar for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Flattar ut importar (gen-linkml) — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-linkml DOMAIN=${{ inputs.domain }}
    - name: Flattar ut importar (gen-linkml) — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-linkml SCHEMA=${{ inputs.schema }}
