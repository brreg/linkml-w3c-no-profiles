name: Valider mot bronze-policy
description: Validerer alle skjema i domenet mot bronze-policy

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: true

runs:
  using: composite
  steps:
    - name: Valider mot bronze-policy
      shell: bash
      run: make domain-validate-bronze DOMAIN=${{ inputs.domain }}
