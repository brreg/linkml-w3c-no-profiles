      - skole
      - grepreferanse
      - vigoreferanse
    slot_usage:
      programomrade:
        multivalued: true
        in_subset:
          - Valgfri
      skole:
        multivalued: true
        in_subset:
          - Valgfri
      grepreferanse:
        in_subset:
          - Valgfri
      vigoreferanse:
        in_subset:
