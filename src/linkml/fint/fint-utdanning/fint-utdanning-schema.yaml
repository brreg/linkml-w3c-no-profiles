  Elevforhold:
    description: Eit elevs tilknyting til ein skule og eit skoleår.
    class_uri: utd:Elevforhold
    slots:
      - id
      - beskrivelse
      - avbruddsdato
      - tosprakligFagopplaering
      - elev
      - skole
      - kategori
      - avbruddsarsak
      - skoleaar
      - programomrademedlemskap
      - klassemedlemskap
      - faggruppemedlemskap
      - undervisningsgruppemedlemskap
      - kontaktlaerergruppemedlemskap
      - persongruppemedlemskap
      - eksamensgruppemedlemskap
      - fraversregistreringer
      - elevfravar
      - tilrettelegging
      - elevvurdering
    slot_usage:
      beskrivelse:
        required: true
        in_subset:
          - Obligatorisk
      avbruddsdato:
        in_subset:
          - Valgfri
      tosprakligFagopplaering:
        in_subset:
          - Valgfri
      elev:
        required: true
        in_subset:
          - Obligatorisk
      skole:
        required: true
        in_subset:
          - Obligatorisk
      kategori:
        in_subset:
          - Valgfri
      avbruddsarsak:
        in_subset:
          - Valgfri
      skoleaar:
        in_subset:
          - Valgfri
      programomrademedlemskap:
        in_subset:
          - Valgfri
      klassemedlemskap:
        in_subset:
          - Valgfri
      faggruppemedlemskap:
        in_subset:
          - Valgfri
      undervisningsgruppemedlemskap:
        in_subset:
          - Valgfri
      kontaktlaerergruppemedlemskap:
        in_subset:
          - Valgfri
      persongruppemedlemskap:
        in_subset:
          - Valgfri
      eksamensgruppemedlemskap:
        in_subset:
          - Valgfri
      fraversregistreringer:
        in_subset:
          - Valgfri
      elevfravar:
        range: Fravarsoversikt
        in_subset:
          - Valgfri
      tilrettelegging:
        range: Elevtilrettelegging
        multivalued: true
        in_subset:
          - Valgfri
      elevvurdering:
        in_subset:
          - Valgfri

  Elevtilrettelegging:
    description: Tilrettelegging for ein elev i eit elevforhold.
    class_uri: utd:Elevtilrettelegging
