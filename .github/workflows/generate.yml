name: Generate and publish

on:
  push:
    branches: [main]

jobs:

  build-linkml:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Cache linkml-local image
        id: cache
        uses: actions/cache@v4
        with:
          path: linkml-local.tar.zst
          key: linkml-local-${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Sjekk om image finst i GHCR
        id: ghcr-check
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          if podman pull "$IMAGE" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Bygg linkml-local image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          make linkml-build-docker
          podman save localhost/linkml-local:latest | zstd -T0 > linkml-local.tar.zst
      - name: Last inn image frå cache
        if: steps.cache.outputs.cache-hit == 'true' && steps.ghcr-check.outputs.exists != 'true'
        run: podman load < <(zstd -d -c linkml-local.tar.zst)
      - name: Push til GHCR
        if: steps.ghcr-check.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          podman tag localhost/linkml-local:latest "$IMAGE"
          podman push "$IMAGE"

  build-python:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Cache python-pytest image
        id: cache
        uses: actions/cache@v4
        with:
          path: python-pytest.tar.zst
          key: python-pytest-${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Sjekk om image finst i GHCR
        id: ghcr-check
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          if podman pull "$IMAGE" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Bygg python-pytest image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          make python-build-docker
          podman save localhost/python-pytest:latest | zstd -T0 > python-pytest.tar.zst
      - name: Last inn image frå cache
        if: steps.cache.outputs.cache-hit == 'true' && steps.ghcr-check.outputs.exists != 'true'
        run: podman load < <(zstd -d -c python-pytest.tar.zst)
      - name: Push til GHCR
        if: steps.ghcr-check.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          podman tag localhost/python-pytest:latest "$IMAGE"
          podman push "$IMAGE"

  generate-ap-no:
    needs: [build-linkml, build-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-images
      - uses: ./.github/actions/gen-linkml
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-context
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-shapes
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-python
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-json-schema
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-owl
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-rdf
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-examples
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-doc
        with:
          domain: ap-no
      - uses: ./.github/actions/gen-erdiagram
        with:
          domain: ap-no
      - uses: actions/upload-artifact@v4
        with:
          name: generated-ap-no
          path: generated/ap-no/
          retention-days: 1

  generate-fair:
    needs: [build-linkml, build-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-images
      - uses: ./.github/actions/gen-linkml
        with:
          domain: fair
      - uses: ./.github/actions/gen-context
        with:
          domain: fair
      - uses: ./.github/actions/gen-shapes
        with:
          domain: fair
      - uses: ./.github/actions/gen-python
        with:
          domain: fair
      - uses: ./.github/actions/gen-json-schema
        with:
          domain: fair
      - uses: ./.github/actions/gen-owl
        with:
          domain: fair
      - uses: ./.github/actions/gen-rdf
        with:
          domain: fair
      - uses: ./.github/actions/gen-examples
        with:
          domain: fair
      - uses: ./.github/actions/gen-doc
        with:
          domain: fair
      - uses: ./.github/actions/gen-erdiagram
        with:
          domain: fair
      - uses: actions/upload-artifact@v4
        with:
          name: generated-fair
          path: generated/fair/
          retention-days: 1

  generate-fint:
    needs: [build-linkml, build-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-images
      - uses: ./.github/actions/gen-linkml
        with:
          domain: fint
      - uses: ./.github/actions/gen-context
        with:
          domain: fint
      - uses: ./.github/actions/gen-shapes
        with:
          domain: fint
      - uses: ./.github/actions/gen-python
        with:
          domain: fint
      - uses: ./.github/actions/gen-json-schema
        with:
          domain: fint
      - uses: ./.github/actions/gen-owl
        with:
          domain: fint
      - uses: ./.github/actions/gen-rdf
        with:
          domain: fint
      - uses: ./.github/actions/gen-examples
        with:
          domain: fint
      - uses: ./.github/actions/gen-doc
        with:
          domain: fint
      - uses: ./.github/actions/gen-erdiagram
        with:
          domain: fint
      - uses: actions/upload-artifact@v4
        with:
          name: generated-fint
          path: generated/fint/
          retention-days: 1

  generate-ngr:
    needs: [build-linkml, build-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-images
      - uses: ./.github/actions/gen-linkml
        with:
          domain: ngr
      - uses: ./.github/actions/gen-context
        with:
          domain: ngr
      - uses: ./.github/actions/gen-shapes
        with:
          domain: ngr
      - uses: ./.github/actions/gen-python
        with:
          domain: ngr
      - uses: ./.github/actions/gen-json-schema
        with:
          domain: ngr
      - uses: ./.github/actions/gen-owl
        with:
          domain: ngr
      - uses: ./.github/actions/gen-rdf
        with:
          domain: ngr
      - uses: ./.github/actions/gen-examples
        with:
          domain: ngr
      - uses: ./.github/actions/gen-doc
        with:
          domain: ngr
      - uses: ./.github/actions/gen-erdiagram
        with:
          domain: ngr
      - uses: actions/upload-artifact@v4
        with:
          name: generated-ngr
          path: generated/ngr/
          retention-days: 1

  generate-oreg:
    needs: [build-linkml, build-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-images
      - uses: ./.github/actions/gen-linkml
        with:
          domain: oreg
      - uses: ./.github/actions/gen-context
        with:
          domain: oreg
      - uses: ./.github/actions/gen-shapes
        with:
          domain: oreg
      - uses: ./.github/actions/gen-python
        with:
          domain: oreg
      - uses: ./.github/actions/gen-json-schema
        with:
          domain: oreg
      - uses: ./.github/actions/gen-owl
        with:
          domain: oreg
      - uses: ./.github/actions/gen-rdf
        with:
          domain: oreg
      - uses: ./.github/actions/gen-examples
        with:
          domain: oreg
      - uses: ./.github/actions/gen-doc
        with:
          domain: oreg
      - uses: ./.github/actions/gen-erdiagram
        with:
          domain: oreg
      - uses: actions/upload-artifact@v4
        with:
          name: generated-oreg
          path: generated/oreg/
          retention-days: 1

  generate-samt:
    needs: [build-linkml, build-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-images
      - uses: ./.github/actions/gen-linkml
        with:
          domain: samt
      - uses: ./.github/actions/gen-context
        with:
          domain: samt
      - uses: ./.github/actions/gen-shapes
        with:
          domain: samt
      - uses: ./.github/actions/gen-python
        with:
          domain: samt
      - uses: ./.github/actions/gen-json-schema
        with:
          domain: samt
      - uses: ./.github/actions/gen-owl
        with:
          domain: samt
      - uses: ./.github/actions/gen-rdf
        with:
          domain: samt
      - uses: ./.github/actions/gen-examples
        with:
          domain: samt
      - uses: ./.github/actions/gen-doc
        with:
          domain: samt
      - uses: ./.github/actions/gen-erdiagram
        with:
          domain: samt
      - uses: actions/upload-artifact@v4
        with:
          name: generated-samt
          path: generated/samt/
          retention-days: 1

  publish:
    needs: [generate-ap-no, generate-fair, generate-fint, generate-ngr, generate-oreg, generate-samt]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Last ned alle genererte artefaktar
        uses: actions/download-artifact@v4
        with:
          pattern: generated-*
          path: generated/
          merge-multiple: true

      - name: Cache mkdocs-local image
        id: cache-mkdocs
        uses: actions/cache@v4
        with:
          path: mkdocs-local.tar.zst
          key: mkdocs-local-${{ hashFiles('mkdocs/Dockerfile.mkdocs') }}
      - name: Bygg mkdocs-local image
        if: steps.cache-mkdocs.outputs.cache-hit != 'true'
        run: |
          make docs-build-docker
          podman save localhost/mkdocs-local:latest | zstd -T0 > mkdocs-local.tar.zst
      - name: Last inn mkdocs-local image
        run: podman load < <(zstd -d -c mkdocs-local.tar.zst)

      - name: Publiser og bygg dokumentasjonsportal
        run: |
          make publish
          make docs-build

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v5
        with:
          path: mkdocs/site/

      - name: Deploy til GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
