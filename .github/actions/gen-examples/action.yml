name: Konverter eksempelfiler til Turtle
description: Køyrer linkml-convert på alle eksempelfiler i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Konverter eksempelfiler til Turtle — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-examples DOMAIN=${{ inputs.domain }}
    - name: Konverter eksempelfiler til Turtle — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-examples SCHEMA=${{ inputs.schema }}
