site_name:  Norske W3C-profiler og offentlige domenemodeller i LinkML-format
site_description: Norske W3C-applikasjonsprofiler og offentlige domenemodeller i LinkML-format
site_url: https://brreg.github.io/linkml-datamodellering-no
docs_dir: docs

theme:
  name: material
  language: nb
  features:
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - navigation.instant
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

plugins:
  - search
  - build-cache

extra_css:
  - stylesheets/aktivt-menypunkt.css

extra_javascript:
  - javascripts/nav-active-fix.js

markdown_extensions:
  - admonition
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# gen-doc genererer interne lenkjer som ikkje alltid har tilsvarende .md-filer
# (t.d. lowercase-alias for PascalCase-klassefiler på case-insensitive filsystem).
# Desse åtvaringane er ikkje kritiske og vert undertrykka her.
validation:
  links:
    not_found: ignore
  nav:
    omitted_files: ignore

nav:
  - Heim: index.md
  - Rettleiingar:
      - Ny domenemodell: ny-domenemodell.md
      - Ny begrepskatalog: ny-begrepsmodell.md
      - Generatorkonfigurasjon: generate-config.md
  - 'Begrep – Begrepskatalogmodellar':
      - begrep/index.md
      - 'brreg-begrep': begrep/brreg-begrep/index.md
  - 'OREG – Offentlege registre':
      - oreg/index.md
      - 'register-over-aksjeeiere': oreg/register-over-aksjeeiere/index.md
  - 'SAMT – Kommunale integrasjonar':
      - samt/index.md
      - 'samt-bu': samt/samt-bu/index.md
