id: https://data.norge.no/fint/fint-ressurs
name: fint-ressurs
title: FINT Ressurs
description: >
  FINT-domenemodell for ressursstyring. Dekkjer tre sub-pakkar:
  ressurs.eiendel (applikasjonar og lisensressursar),
  ressurs.datautstyr (digitale einingar og einingsgrupper) og
  ressurs.tilgang (identitetar og rettigheiter).
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/ressurs/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  res:    https://schema.fintlabs.no/ressurs/

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  # --- RessursContainer-lister ----------------------------------------------

  # --- Felles res-slots (delt mellom fleire klasser) ------------------------

  # navn:
  #   slot_uri: res:navn
  #   range: string
  #   description: Namn på ressursen eller kodeverk-elementet.

  plattform:
    slot_uri: res:plattform
    range: Plattform
    description: Plattforma ressursen er knytt til.

  enhetstype:
    slot_uri: res:enhetstype
    range: Enhetstype
    description: Type digital eining.

  enhetsgruppemedlemskap:
    slot_uri: res:enhetsgruppemedlemskap
    range: Enhetsgruppemedlemskap
    multivalued: true
    description: Einingsgruppemelemskap.

  personalressurs:
    slot_uri: res:personalressurs
    range: uriorcurie
    description: Referanse til Personalressurs (Administrasjon).

  eier:
    slot_uri: res:eier
    range: uriorcurie
    description: Referanse til Organisasjonselement som har eigarskap.

  lisensantall:
    slot_uri: res:lisensantall
    range: integer
    description: Totalt tal på lisensar.

  # --- ressurs.eiendel ------------------------------------------------------

  applikasjonsressurs:
    slot_uri: res:applikasjonsressurs
    range: Applikasjonsressurs
    multivalued: true
    description: Ulike ressursar (lisensar) knytt til ein applikasjon.

  applikasjonskategori:
    slot_uri: res:applikasjonskategori
    range: Applikasjonskategori
    multivalued: true
    description: Kategoriar av applikasjonar.

  applikasjon:
    slot_uri: res:applikasjon
    range: Applikasjon
    description: Applikasjonen ressursen (lisensen) er knytt til.

  brukertype:
    slot_uri: res:brukertype
    range: Brukertype
    multivalued: true
    description: For kva brukertypar lisensen er gyldig.

  handhevingstype:
    slot_uri: res:handhevingstype
    range: Handhevingstype
    description: Korleis lisensmodellen skal handhevast.

  lisensmodell:
    slot_uri: res:lisensmodell
    range: Lisensmodell
    description: Lisensmodellen applikasjonsressursen har.

  ressurstilgjengelighet:
    slot_uri: res:ressurstilgjengelighet
    range: Applikasjonsressurstilgjengelighet
    multivalued: true
    description: Angir kva organisasjonseining og kor mange ressursar som skal tilordnast.

  enhetskostnad:
    slot_uri: res:enhetskostnad
    range: integer
    description: Kostnad per ressurs.

  kreverGodkjenning:
    slot_uri: res:kreverGodkjenning
    range: boolean
    description: True dersom tildeling av ressursen krev godkjenning.

  konsument:
    slot_uri: res:konsument
    range: uriorcurie
    description: Referanse til Organisasjonselement som har tilgang til ressursen.

  ressursRef:
    slot_uri: res:ressursRef
    range: Applikasjonsressurs
    description: Ressursen organisasjonselementet har tilgang til.

  # --- ressurs.datautstyr ---------------------------------------------------

  serienummer:
    slot_uri: res:serienummer
    range: string
    description: Unikt serienummer frå einingsprodusentens.

  dataobjektId:
    slot_uri: res:dataobjektId
    range: Identifikator
    inlined: true
    description: Einingsens ID i datakatalogen.

  flerbrukerenhet:
    slot_uri: res:flerbrukerenhet
    range: boolean
    description: Kvifor eininga er ein- eller flerbrukarenheit.

  privateid:
    slot_uri: res:privateid
    range: boolean
    description: Angir om eininga er eigd av organisasjonen eller privatperson.

  administrator:
    slot_uri: res:administrator
    range: uriorcurie
    description: Referanse til Organisasjonselement som administrerer eininga.

  status:
    slot_uri: res:status
    range: Status
    description: Status på eininga i fagsystemet.

  produsent:
    slot_uri: res:produsent
    range: Produsent
    description: Namn på produsenten av eininga.

  organisasjonsenhet:
    slot_uri: res:organisasjonsenhet
    range: uriorcurie
    description: Referanse til Organisasjonselement grupperinga er tilknytt.

  digitalEnhet:
    slot_uri: res:digitalEnhet
    range: DigitalEnhet
    description: Den digitale eininga dette medlemskapet tilhøyrer.

  enhetsgruppe:
    slot_uri: res:enhetsgruppe
    range: Enhetsgruppe
    description: Einingsgruppen dette medlemskapet tilhøyrer.

  # --- ressurs.tilgang ------------------------------------------------------

  rettighet:
    slot_uri: res:rettighet
    range: Rettighet
    multivalued: true
    description: Rettigheiter knytt til identiteten.

  identitet:
    slot_uri: res:identitet
    range: Identitet
    multivalued: true
    description: Identitetar knytt til rettigheta.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  RessursContainer:
    tree_root: true
    description: Rotcontainer for FINT Ressurs-instansar.
    attributes:
      # ressurs.eiendel
      applikasjonar:
        range: Applikasjon
        multivalued: true
        inlined_as_list: true
      applikasjonsressursar:
        range: Applikasjonsressurs
        multivalued: true
        inlined_as_list: true
      applikasjonsressurstilgjengelegheit:
        range: Applikasjonsressurstilgjengelighet
        multivalued: true
        inlined_as_list: true
      # ressurs.datautstyr
      digitaleEiningar:
        range: DigitalEnhet
        multivalued: true
        inlined_as_list: true
      einingsgrupper:
        range: Enhetsgruppe
        multivalued: true
        inlined_as_list: true
      einingsgruppedmedlemskap:
        range: Enhetsgruppemedlemskap
        multivalued: true
        inlined_as_list: true
      # ressurs.tilgang
      identitetar:
        range: Identitet
        multivalued: true
        inlined_as_list: true
      rettigheiter:
        range: Rettighet
        multivalued: true
        inlined_as_list: true
      # ressurs.kodeverk
      applikasjonskategoriar:
        range: Applikasjonskategori
        multivalued: true
        inlined_as_list: true
      brukertypar:
        range: Brukertype
        multivalued: true
        inlined_as_list: true
      einingstypar:
        range: Enhetstype
        multivalued: true
        inlined_as_list: true
      handhaevingstypar:
        range: Handhevingstype
        multivalued: true
        inlined_as_list: true
      lisensmodellar:
        range: Lisensmodell
        multivalued: true
        inlined_as_list: true
      plattformar:
        range: Plattform
        multivalued: true
        inlined_as_list: true
      produsentar:
        range: Produsent
        multivalued: true
        inlined_as_list: true
      statusar:
        range: Status
        multivalued: true
        inlined_as_list: true

  # =========================================================================
  # ressurs.eiendel
  # =========================================================================

  Applikasjon:
    description: Ein applikasjon med tilhøyrande ressursar.
    class_uri: res:Applikasjon
    slots:
      - id
      - navn
      - beskrivelse
      - gyldighetsperiode
      - plattform
      - applikasjonsressurs
      - applikasjonskategori
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Valgfri
      gyldighetsperiode:
        required: true
        in_subset:
          - Obligatorisk
      plattform:
        multivalued: true
        in_subset:
          - Valgfri
      applikasjonsressurs:
        in_subset:
          - Valgfri
      applikasjonskategori:
        in_subset:
          - Valgfri

  Applikasjonsressurs:
    description: Informasjon om kor ein applikasjon kan nyttast (lisensressurs).
    class_uri: res:Applikasjonsressurs
    slots:
      - id
      - navn
      - beskrivelse
      - gyldighetsperiode
      - enhetskostnad
      - kreverGodkjenning
      - lisensantall
      - eier
      - applikasjon
      - brukertype
      - handhevingstype
      - lisensmodell
      - ressurstilgjengelighet
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Valgfri
      gyldighetsperiode:
        required: true
        in_subset:
          - Obligatorisk
      enhetskostnad:
        in_subset:
          - Valgfri
      kreverGodkjenning:
        in_subset:
          - Anbefalt
      lisensantall:
        in_subset:
          - Anbefalt
      eier:
        required: true
        in_subset:
          - Obligatorisk
      applikasjon:
        required: true
        in_subset:
          - Obligatorisk
      brukertype:
        required: true
        in_subset:
          - Obligatorisk
      handhevingstype:
        in_subset:
          - Valgfri
      lisensmodell:
        in_subset:
          - Valgfri
      ressurstilgjengelighet:
        in_subset:
          - Valgfri

  Applikasjonsressurstilgjengelighet:
    description: Kva organisasjonselements brukarar som har tilgang til ein ressurs.
    class_uri: res:Applikasjonsressurstilgjengelighet
    slots:
      - id
      - gyldighetsperiode
      - lisensantall
      - konsument
      - ressursRef
    slot_usage:
      gyldighetsperiode:
        required: true
        in_subset:
          - Obligatorisk
      lisensantall:
        in_subset:
          - Valgfri
      konsument:
        required: true
        in_subset:
          - Obligatorisk
      ressursRef:
        required: true
        in_subset:
          - Obligatorisk

  # =========================================================================
  # ressurs.datautstyr
  # =========================================================================

  DigitalEnhet:
    description: Ei digital eining som t.d. PC, nettbrett eller mobil.
    class_uri: res:DigitalEnhet
    slots:
      - id
      - serienummer
      - navn
      - dataobjektId
      - flerbrukerenhet
      - privateid
      - administrator
      - eier
      - personalressurs
      - elev
      - status
      - enhetstype
      - plattform
      - produsent
      - enhetsgruppemedlemskap
    slot_usage:
      serienummer:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        in_subset:
          - Valgfri
      dataobjektId:
        in_subset:
          - Valgfri
      flerbrukerenhet:
        in_subset:
          - Valgfri
      privateid:
        in_subset:
          - Valgfri
      administrator:
        required: true
        in_subset:
          - Obligatorisk
      eier:
        in_subset:
          - Valgfri
      personalressurs:
        in_subset:
          - Valgfri
      elev:
        in_subset:
          - Valgfri
      status:
        in_subset:
          - Valgfri
      enhetstype:
        required: true
        in_subset:
          - Obligatorisk
      plattform:
        required: true
        in_subset:
          - Obligatorisk
      produsent:
        in_subset:
          - Valgfri
      enhetsgruppemedlemskap:
        in_subset:
          - Valgfri

  Enhetsgruppe:
    description: Ei gruppering av einsarta digitale einingar.
    class_uri: res:Enhetsgruppe
    slots:
      - id
      - navn
      - organisasjonsenhet
      - enhetstype
      - plattform
      - enhetsgruppemedlemskap
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      organisasjonsenhet:
        required: true
        in_subset:
          - Obligatorisk
      enhetstype:
        required: true
        in_subset:
          - Obligatorisk
      plattform:
        required: true
        in_subset:
          - Obligatorisk
      enhetsgruppemedlemskap:
        in_subset:
          - Valgfri

  Enhetsgruppemedlemskap:
    description: Medlemskap mellom ei digital eining og ei einingsgruppe.
    class_uri: res:Enhetsgruppemedlemskap
    slots:
      - id
      - digitalEnhet
      - enhetsgruppe
    slot_usage:
      digitalEnhet:
        required: true
        in_subset:
          - Obligatorisk
      enhetsgruppe:
        required: true
        in_subset:
          - Obligatorisk

  # =========================================================================
  # ressurs.tilgang
  # =========================================================================

  Identitet:
    description: Identitet som identifiserer innehavaren av rettigheiter i organisasjonen.
    class_uri: res:Identitet
    slots:
      - id
      - personalressurs
      - rettighet
    slot_usage:
      personalressurs:
        in_subset:
          - Valgfri
      rettighet:
        in_subset:
          - Valgfri

  Rettighet:
    description: Ei namngitt rettighet.
    class_uri: res:Rettighet
    slots:
      - id
      - kode
      - navn
      - beskrivelse
      - gyldighetsperiode
      - passiv
      - identitet
    slot_usage:
      kode:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        required: true
        in_subset:
          - Obligatorisk
      beskrivelse:
        required: true
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri
      identitet:
        in_subset:
          - Valgfri

  # =========================================================================
  # ressurs.kodeverk
  # =========================================================================

  Applikasjonskategori:
    description: Kategori av applikasjonar.
    class_uri: res:Applikasjonskategori
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Brukertype:
    description: Dei ulike brukartypane som kan nytte lisensen.
    class_uri: res:Brukertype
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Enhetstype:
    description: Type digital eining.
    class_uri: res:Enhetstype
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Handhevingstype:
    description: Korleis ulike lisensmodellar kan handhevast.
    class_uri: res:Handhevingstype
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Lisensmodell:
    description: Lisensmodellar som kan knytast til ein lisens.
    class_uri: res:Lisensmodell
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Plattform:
    description: Plattforma tenesta kan leverast på.
    class_uri: res:Plattform
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Produsent:
    description: Produsent av ei digital eining.
    class_uri: res:Produsent
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Status:
    description: Status på ei digital eining i fagsystemet.
    class_uri: res:Status
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
      navn:
        required: true
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri
