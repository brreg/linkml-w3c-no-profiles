  # --- utdanning.utdanningsprogram -------------------------------------------

  Arstrinn:
    is_a: Gruppe
    description: Eit årstrinn i skulen (t.d. Vg1, Vg2, Vg3).
    class_uri: utd:Arstrinn
    slots:
      - klasse
      - vigoreferanse
      - grepreferanse
      - programomrade
    slot_usage:
      klasse:
        multivalued: true
        in_subset:
          - Valgfri
      vigoreferanse:
        in_subset:
          - Valgfri
      grepreferanse:
        in_subset:
          - Valgfri
      programomrade:
        multivalued: true
        in_subset:
          - Valgfri

  Programomrade:
    is_a: Gruppe
    description: Eit programområde innanfor eit utdanningsprogram (t.d. Vg2 Elektrofaget).
    class_uri: utd:Programomrade
    slots:
      - trinn
      - grepreferanse
      - vigoreferanse
      - gruppemedlemskap
    slot_usage:
      trinn:
        in_subset:
          - Valgfri
      grepreferanse:
        in_subset:
          - Valgfri
      vigoreferanse:
        in_subset:
          - Valgfri
      gruppemedlemskap:
        range: Programomrademedlemskap
        in_subset:
          - Valgfri

  Programomrademedlemskap:
    is_a: Gruppemedlemskap
    description: Eit elevs tilknyting til eit programområde.
    class_uri: utd:Programomrademedlemskap
    slots:
      - elevforhold
      - programomrade
    slot_usage:
      elevforhold:
        in_subset:
          - Valgfri
      programomrade:
        in_subset:
          - Valgfri

  Utdanningsprogram:
