        in_subset:
          - Valgfri
      termin:
        multivalued: true
        in_subset:
          - Valgfri
      trinn:
        in_subset:
          - Valgfri
      skole:
        in_subset:
          - Valgfri
      undervisningsforhold:
        in_subset:
          - Valgfri
      klassemedlemskap:
        in_subset:
          - Valgfri
      kontaktlaerergruppe:
