      - elevforhold
      - klasse
    slot_usage:
      elevforhold:
        in_subset:
          - Valgfri
      klasse:
        in_subset:
          - Valgfri

  Kontaktlaerergruppe:
    is_a: Gruppe
    description: Gruppe av elevar med felles kontaktlærar.
    class_uri: utd:Kontaktlaerergruppe
    slots:
      - klasse
      - termin
      - skole
      - skoleaar
      - undervisningsforhold
      - gruppemedlemskap
    slot_usage:
