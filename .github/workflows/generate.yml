name: Generate and publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/linkml/**'
      - 'src/assets/containers/Dockerfile.linkml'
      - 'src/assets/containers/Dockerfile.python'
      - 'src/assets/containers/requirements-python-test.txt'
      - 'src/templates/**'
      - 'mkdocs/**'
      - 'README.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  checkout-source:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/upload-artifact@v7
        with:
          name: source
          path: |
            src/
            examples/
            mkdocs/
            .github/
            Makefile
            README.md
          retention-days: 1

  ensure-images:
    needs: [checkout-source]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Cache linkml-local image
        id: cache-linkml
        uses: actions/cache@v5
        with:
          path: linkml-local.tar.zst
          key: linkml-local-${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
      - name: Sjekk om linkml-local finst i GHCR
        id: ghcr-linkml
        if: steps.cache-linkml.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          podman pull "$IMAGE" 2>/dev/null && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Bygg linkml-local image
        if: steps.cache-linkml.outputs.cache-hit != 'true'
        run: |
          make linkml-build-docker
          podman save localhost/linkml-local:latest | zstd -T0 > linkml-local.tar.zst
      - name: Last inn linkml-local frå cache
        if: steps.cache-linkml.outputs.cache-hit == 'true' && steps.ghcr-linkml.outputs.exists != 'true'
        run: podman load < <(zstd -d -c linkml-local.tar.zst)
      - name: Push linkml-local til GHCR
        if: steps.ghcr-linkml.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          podman tag localhost/linkml-local:latest "$IMAGE"
          podman push "$IMAGE"

      - name: Cache python-pytest image
        id: cache-python
        uses: actions/cache@v5
        with:
          path: python-pytest.tar.zst
          key: python-pytest-${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
      - name: Sjekk om python-pytest finst i GHCR
        id: ghcr-python
        if: steps.cache-python.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          podman pull "$IMAGE" 2>/dev/null && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      - name: Bygg python-pytest image
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          make python-build-docker
          podman save localhost/python-pytest:latest | zstd -T0 > python-pytest.tar.zst
      - name: Last inn python-pytest frå cache
        if: steps.cache-python.outputs.cache-hit == 'true' && steps.ghcr-python.outputs.exists != 'true'
        run: podman load < <(zstd -d -c python-pytest.tar.zst)
      - name: Push python-pytest til GHCR
        if: steps.ghcr-python.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/python-pytest:${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          podman tag localhost/python-pytest:latest "$IMAGE"
          podman push "$IMAGE"

  generate:
    name: "generate / ${{ matrix.domain }}"
    needs: [ensure-images]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      actions: write
    strategy:
      matrix:
        domain: [ap-no, begrep, fair, fint, ngr, oreg, samt]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Cache genererte artefaktar (${{ matrix.domain }})
        id: cache-generated
        uses: actions/cache@v5
        with:
          path: generated/${{ matrix.domain }}/
          key: generated-${{ matrix.domain }}-${{ hashFiles(format('src/linkml/{0}/**', matrix.domain)) }}-infra-${{ hashFiles('src/assets/containers/Dockerfile.linkml', 'src/templates/**', 'Makefile') }}

      - name: Gjenopprett linkml-local frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: linkml-local.tar.zst
          key: linkml-local-${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}
          fail-on-cache-miss: true

      - name: Gjenopprett python-pytest frå cache
        if: steps.cache-generated.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v5
        with:
          path: python-pytest.tar.zst
          key: python-pytest-${{ hashFiles('src/assets/containers/Dockerfile.python', 'src/assets/containers/requirements-python-test.txt') }}
          fail-on-cache-miss: true

      - name: Last images inn i podman
        if: steps.cache-generated.outputs.cache-hit != 'true'
        run: |
          podman load < <(zstd -d -c linkml-local.tar.zst)
          podman load < <(zstd -d -c python-pytest.tar.zst)

      - name: Generer alle artefaktar for ${{ matrix.domain }}
        if: steps.cache-generated.outputs.cache-hit != 'true'
        shell: bash
        run: |
          for artifact in linkml context shapes python json-schema owl rdf erdiagram doc proto plantuml examples; do
            make domain-gen-$artifact DOMAIN=${{ matrix.domain }}
          done

      - uses: actions/upload-artifact@v7
        with:
          name: generated-${{ matrix.domain }}
          path: generated/
          retention-days: 1

  publish:
    needs: [generate]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: source

      - name: Last ned alle genererte artefaktar
        uses: actions/download-artifact@v8
        with:
          pattern: generated-*
          path: generated/
          merge-multiple: true

      - name: Cache mkdocs-local image
        id: cache-mkdocs
        uses: actions/cache@v5
        with:
          path: mkdocs-local.tar.zst
          key: mkdocs-local-${{ hashFiles('mkdocs/Dockerfile.mkdocs') }}
      - name: Bygg mkdocs-local image
        if: steps.cache-mkdocs.outputs.cache-hit != 'true'
        run: |
          make docs-build-docker
          podman save localhost/mkdocs-local:latest | zstd -T0 > mkdocs-local.tar.zst
      - name: Last inn mkdocs-local image
        run: podman load < <(zstd -d -c mkdocs-local.tar.zst)

      - name: Cache mkdocs-build-cache
        uses: actions/cache@v5
        with:
          path: mkdocs/.cache/
          key: mkdocs-build-${{ hashFiles('src/linkml/**', 'src/assets/containers/Dockerfile.linkml', 'mkdocs/mkdocs.yml', 'mkdocs/docs/**', 'src/templates/**') }}
          restore-keys: mkdocs-build-

      - name: Publiser og bygg dokumentasjonsportal
        run: |
          make publish
          make docs-build

      - name: Konfigurer GitHub Pages
        uses: actions/configure-pages@v6

      - name: Last opp Pages-artefakt
        uses: actions/upload-pages-artifact@v5
        with:
          path: mkdocs/site/

      - name: Deploy til GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
