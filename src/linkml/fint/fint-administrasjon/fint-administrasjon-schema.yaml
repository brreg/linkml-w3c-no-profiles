id: https://data.norge.no/linkml/fint-administrasjon
name: fint-administrasjon
title: FINT Administrasjon
description: >
  FINT-domenemodell for administrasjon og HR. Dekkjer personalressursar,
  arbeidsforhold, fullmakter og organisasjonsstruktur.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/administrasjon/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  adm:    https://schema.fintlabs.no/administrasjon/

subsets:
  Obligatorisk:
    description: Obligatorisk eigensskap.
  Anbefalt:
    description: Anbefalt eigensskap.
  Valgfri:
    description: Valfri eigensskap.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  AdministrasjonContainer:
    tree_root: true
    description: Rotcontainer for FINT Administrasjon-instansar.
    attributes:
      # Felles hovudklassar
      personar:
        range: Person
        multivalued: true
        inlined_as_list: true
      kontaktpersonar:
        range: Kontaktperson
        multivalued: true
        inlined_as_list: true
      virksomhetar:
        range: Virksomhet
        multivalued: true
        inlined_as_list: true
      # Felles kodeverk
      landkodar:
        range: Landkode
        multivalued: true
        inlined_as_list: true
      kjonn:
        range: Kjonn
        multivalued: true
        inlined_as_list: true
      fylke:
        range: Fylke
        multivalued: true
        inlined_as_list: true
      kommunar:
        range: Kommune
        multivalued: true
        inlined_as_list: true
      spraak:
        range: Spraak
        multivalued: true
        inlined_as_list: true
      valuta:
        range: Valuta
        multivalued: true
        inlined_as_list: true
      # Domenehovudklassar
      personalressursar:
        range: Personalressurs
        multivalued: true
        inlined_as_list: true
      arbeidsforhold:
        range: Arbeidsforhold
        multivalued: true
        inlined_as_list: true
      arbeidslokasjoner:
        range: Arbeidslokasjon
        multivalued: true
        inlined_as_list: true
      fastlonn:
        range: Fastlonn
        multivalued: true
        inlined_as_list: true
      fasttillegg:
        range: Fasttillegg
        multivalued: true
        inlined_as_list: true
      fravaer:
        range: Fravaer
        multivalued: true
        inlined_as_list: true
      fullmakter:
        range: Fullmakt
        multivalued: true
        inlined_as_list: true
      organisasjonselement:
        range: Organisasjonselement
        multivalued: true
        inlined_as_list: true
      rollar:
        range: Rolle
        multivalued: true
        inlined_as_list: true
      variabellonn:
        range: Variabellonn
        multivalued: true
        inlined_as_list: true
      # Domenekodeverk
      aktivitetar:
        range: Aktivitet
        multivalued: true
        inlined_as_list: true
      anlegg:
        range: Anlegg
        multivalued: true
        inlined_as_list: true
      ansvar:
        range: Ansvar
        multivalued: true
        inlined_as_list: true
      artar:
        range: Art
        multivalued: true
        inlined_as_list: true
      arbeidsforholdstypar:
        range: Arbeidsforholdstype
        multivalued: true
        inlined_as_list: true
      diverse:
        range: Diverse
        multivalued: true
        inlined_as_list: true
      formaal:
        range: Formaal
        multivalued: true
        inlined_as_list: true
      fravaersgrunnar:
        range: Fravaersgrunn
        multivalued: true
        inlined_as_list: true
      fravaerstypar:
        range: Fravaerstype
        multivalued: true
        inlined_as_list: true
      funksjonar:
        range: Funksjon
        multivalued: true
        inlined_as_list: true
      kontrakter:
        range: Kontrakt
        multivalued: true
        inlined_as_list: true
      lonsartar:
        range: Lonsart
        multivalued: true
        inlined_as_list: true
      lopenummer:
        range: Lopenummer
        multivalued: true
        inlined_as_list: true
      objekt:
        range: Objekt
        multivalued: true
        inlined_as_list: true
      organisasjonstypar:
        range: Organisasjonstype
        multivalued: true
        inlined_as_list: true
      personalressurskategoriar:
        range: Personalressurskategori
        multivalued: true
        inlined_as_list: true
      prosjekt:
        range: Prosjekt
        multivalued: true
        inlined_as_list: true
      prosjektartar:
        range: Prosjektart
        multivalued: true
        inlined_as_list: true
      rammer:
        range: Ramme
        multivalued: true
        inlined_as_list: true
      stillingskoder:
        range: Stillingskode
        multivalued: true
        inlined_as_list: true
      uketimetall:
        range: Uketimetall
        multivalued: true
        inlined_as_list: true

  # --- Abstrakt base for lønn ------------------------------------------------

  Lonn:
    description: Informasjon om lønn for eit arbeidsforhold (abstrakt base).
    class_uri: adm:Lonn
    abstract: true
    slots:
      - id
    attributes:
      anvist:
        slot_uri: adm:anvist
        range: datetime
        description: Tidspunkt då lønn vart anvist.
        in_subset:
          - Valgfri
      attestert:
        slot_uri: adm:attestert
        range: datetime
        description: Tidspunkt då lønn vart attestert.
        in_subset:
          - Valgfri
      beskrivelse:
        slot_uri: adm:beskrivelse
        range: string
        required: true
        description: Beskriving av lønn til føring på lønnslipp.
        in_subset:
          - Obligatorisk
      kildesystemId:
        slot_uri: adm:kildesystemId
        range: Identifikator
        inlined: true
        description: Kjeldesystemets unike identifikator for lønn.
        in_subset:
          - Valgfri
      kontert:
        slot_uri: adm:kontert
        range: datetime
        description: Tidspunkt då lønn vart kontert.
        in_subset:
          - Valgfri
      kontostreng:
        slot_uri: adm:kontostreng
        range: Kontostreng
        inlined: true
        required: true
        description: Kontering av lønn.
        in_subset:
          - Obligatorisk
      opptjent:
        slot_uri: adm:opptjent
        range: Periode
        inlined: true
        description: Periode der lønn vart opptent.
        in_subset:
          - Valgfri
      periode:
        slot_uri: adm:periode
        range: Periode
        inlined: true
        required: true
        description: Periode lønn vert utbetalt.
        in_subset:
          - Obligatorisk
      anviser:
        slot_uri: adm:anviser
        range: Personalressurs
        description: Personalressurs som har anvist lønsmeldinga etter fullmakt.
        in_subset:
          - Valgfri
      konterer:
        slot_uri: adm:konterer
        range: Personalressurs
        description: Personalressurs som har kontert lønsmeldinga etter fullmakt.
        in_subset:
          - Valgfri
      attestant:
        slot_uri: adm:attestant
        range: Personalressurs
        description: Personalressurs som har attestert lønsmeldinga etter fullmakt.
        in_subset:
          - Valgfri

  # --- Kompleks datatype -----------------------------------------------------

  Kontostreng:
    description: Sammensetning av kontodimensjonar for bokføring.
    class_uri: adm:Kontostreng
    attributes:
      aktivitet:
        slot_uri: adm:aktivitet
        range: Aktivitet
        description: Detaljering av funksjon.
        in_subset:
          - Valgfri
      anlegg:
        slot_uri: adm:anlegg
        range: Anlegg
        description: Objekt som skal aktiverast eller avskrivast.
        in_subset:
          - Valgfri
      ansvar:
        slot_uri: adm:ansvar
        range: Ansvar
        required: true
        description: Ansvarleg for ei utgift eller inntekt.
        in_subset:
          - Obligatorisk
      art:
        slot_uri: adm:art
        range: Art
        required: true
        description: Type inntekt eller utgift.
        in_subset:
          - Obligatorisk
      diverse:
        slot_uri: adm:diverse
        range: Diverse
        description: Spesifikasjon som ikkje kjem fram i øvrige dimensjonar.
        in_subset:
          - Valgfri
      formaal:
        slot_uri: adm:formaal
        range: Formaal
        description: Formål viser aktivitet og tenesteproduksjon.
        in_subset:
          - Valgfri
      funksjon:
        slot_uri: adm:funksjon
        range: Funksjon
        required: true
        description: Det som vert produsert eller tenesta som vert levert.
        in_subset:
          - Obligatorisk
      kontrakt:
        slot_uri: adm:kontrakt
        range: Kontrakt
        description: Kontostrengens kontraktsegment.
        in_subset:
          - Valgfri
      lopenummer:
        slot_uri: adm:lopenummer
        range: Lopenummer
        description: Løpenummer i ei nummerserie.
        in_subset:
          - Valgfri
      objekt:
        slot_uri: adm:objekt
        range: Objekt
        description: Objekt som skal aktiverast eller avskrivast.
        in_subset:
          - Valgfri
      prosjekt:
        slot_uri: adm:prosjekt
        range: Prosjekt
        description: Kontostrengens prosjektsegment.
        in_subset:
          - Valgfri
      prosjektart:
        slot_uri: adm:prosjektart
        range: Prosjektart
        description: Deloppgåve eller delprosjekt.
        in_subset:
          - Valgfri
      ramme:
        slot_uri: adm:ramme
        range: Ramme
        description: Budsjettramme som skal bere kostnadane.
        in_subset:
          - Valgfri

  # --- Kodeverk (alle is_a Begrep) -------------------------------------------

  Aktivitet:
    is_a: Begrep
    description: Del av kontostrengen og detaljering av funksjon.
    class_uri: adm:Aktivitet

  Anlegg:
    is_a: Begrep
    description: Del av kontostrengen; objekt som skal aktiverast eller avskrivast.
    class_uri: adm:Anlegg

  Ansvar:
    is_a: Begrep
    description: Del av kontostrengen som beskriv kven som har ansvaret for ei utgift eller inntekt.
    class_uri: adm:Ansvar
    attributes:
      overordnet:
        slot_uri: adm:overordnet
        range: Ansvar
        description: Overordna ansvar.
        in_subset:
          - Valgfri
      underordnet:
        slot_uri: adm:underordnet
        range: Ansvar
        multivalued: true
        description: Alle underansvar.
        in_subset:
          - Valgfri
      organisasjonselement:
        slot_uri: adm:organisasjonselement
        range: Organisasjonselement
        multivalued: true
        description: Organisasjonselement ansvaret er knytt til.
        in_subset:
          - Valgfri

  Art:
    is_a: Begrep
    description: Del av kontostrengen som beskriv kva slags inntekter og utgifter det gjeld.
    class_uri: adm:Art

  Arbeidsforholdstype:
    is_a: Begrep
    description: Viser kva behov hos arbeidsgjevar arbeidsforholdet dekkjer.
    class_uri: adm:Arbeidsforholdstype
    attributes:
      forelder:
        slot_uri: adm:forelder
        range: Arbeidsforholdstype
        description: For å byggje hierarki av Arbeidsforholdstype.
        in_subset:
          - Valgfri

  Diverse:
    is_a: Begrep
    description: Del av kontostrengen; supplement til øvrige dimensjonar.
    class_uri: adm:Diverse

  Formaal:
    is_a: Begrep
    description: Del av kontostrengen som detaljerer inntekter og utgifter ved drift.
    class_uri: adm:Formaal

  Fravaersgrunn:
    is_a: Begrep
    description: Grunn til fråvær.
    class_uri: adm:Fravaersgrunn

  Fravaerstype:
    is_a: Begrep
    description: Type fråvær.
    class_uri: adm:Fravaerstype
    attributes:
      overfores:
        slot_uri: adm:overfores
        range: boolean
        description: Angir om fråvær av denne typen skal overførast til HR.
        in_subset:
          - Valgfri
      lonsart:
        slot_uri: adm:lonsart
        range: Lonsart
        description: Lønnsart fråværstypen vert ført på.
        in_subset:
          - Valgfri

  Funksjon:
    is_a: Begrep
    description: Del av kontostrengen som beskriv kva som vert produsert.
    class_uri: adm:Funksjon
    attributes:
      overordnet:
        slot_uri: adm:overordnet
        range: Funksjon
        description: Overordna funksjon.
        in_subset:
          - Valgfri
      underordnet:
        slot_uri: adm:underordnet
        range: Funksjon
        multivalued: true
        description: Underordna funksjonar.
        in_subset:
          - Valgfri

  Kontrakt:
    is_a: Begrep
    description: Kontrakt transaksjonen er knytt til.
    class_uri: adm:Kontrakt

  Lonsart:
    is_a: Begrep
    description: Type ytelse.
    class_uri: adm:Lonsart
    attributes:
      kategori:
        slot_uri: adm:kategori
        range: string
        description: Kategori lønnsart.
        in_subset:
          - Valgfri
      art:
        slot_uri: adm:art
        range: Art
        description: Art som lønnsarten er knytt til.
        in_subset:
          - Valgfri

  Lopenummer:
    is_a: Begrep
    description: Løpenummer i ei nummerserie.
    class_uri: adm:Lopenummer

  Objekt:
    is_a: Begrep
    description: Eit bygg, ein veg eller ein mottakar av ei teneste eller eit tilskott.
    class_uri: adm:Objekt

  Organisasjonstype:
    is_a: Begrep
    description: Typen til eit organisasjonselement.
    class_uri: adm:Organisasjonstype

  Personalressurskategori:
    is_a: Begrep
    description: Ansettelsesform til eit arbeidsforhold.
    class_uri: adm:Personalressurskategori

  Prosjekt:
    is_a: Begrep
    description: Del av kontostrengen som peikar på løpande prosjekt.
    class_uri: adm:Prosjekt
    attributes:
      prosjektart:
        slot_uri: adm:prosjektart
        range: Prosjektart
        multivalued: true
        description: Deloppgåver eller delprosjekt som høyrer til prosjektet.
        in_subset:
          - Valgfri

  Prosjektart:
    is_a: Begrep
    description: Element i ei prosjektnedbrytningsstruktur eller arbeidsnedbrytningsstruktur.
    class_uri: adm:Prosjektart
    attributes:
      prosjekt:
        slot_uri: adm:prosjekt
        range: Prosjekt
        description: Prosjektet som er øvste nivå i strukturen.
        in_subset:
          - Valgfri
      overordnet:
        slot_uri: adm:overordnet
        range: Prosjektart
        description: Prosjektart i nivået over i strukturen.
        in_subset:
          - Valgfri
      underordnet:
        slot_uri: adm:underordnet
        range: Prosjektart
        multivalued: true
        description: Prosjektartar i nivået under i strukturen.
        in_subset:
          - Valgfri

  Ramme:
    is_a: Begrep
    description: Del av kontostrengen som viser kva budsjettramme som skal bere kostnadane.
    class_uri: adm:Ramme

  Stillingskode:
    is_a: Begrep
    description: Felles kodeverk for stillingar.
    class_uri: adm:Stillingskode
    attributes:
      forelder:
        slot_uri: adm:forelder
        range: Stillingskode
        description: For å byggje hierarki av stillingskoder.
        in_subset:
          - Valgfri

  Uketimetall:
    is_a: Begrep
    description: Timer per veke i 100 % stilling.
    class_uri: adm:Uketimetall

  # --- Personal: lønn --------------------------------------------------------

  Fastlonn:
    is_a: Lonn
    description: Informasjon om fast lønnsbeordring.
    class_uri: adm:Fastlonn
    attributes:
      prosent:
        slot_uri: adm:prosent
        range: integer
        required: true
        description: Andel av lønnsprosent som vert beslaglagt.
        in_subset:
          - Obligatorisk
      lonsart:
        slot_uri: adm:lonsart
        range: Lonsart
        description: Lønnsart for fastlønn.
        in_subset:
          - Valgfri
      arbeidsforhold:
        slot_uri: adm:arbeidsforhold
        range: Arbeidsforhold
        required: true
        description: Arbeidsforhold fastlønna gjeld for.
        in_subset:
          - Obligatorisk

  Fasttillegg:
    is_a: Lonn
    description: Faste tillegg til utbetaling.
    class_uri: adm:Fasttillegg
    attributes:
      belop:
        slot_uri: adm:belop
        range: integer
        required: true
        description: Beløp i øre.
        in_subset:
          - Obligatorisk
      lonsart:
        slot_uri: adm:lonsart
        range: Lonsart
        required: true
        description: Lønnsart for tillegget.
        in_subset:
          - Obligatorisk
      arbeidsforhold:
        slot_uri: adm:arbeidsforhold
        range: Arbeidsforhold
        required: true
        description: Arbeidsforhold fasttillegget gjeld for.
        in_subset:
          - Obligatorisk

  Variabellonn:
    is_a: Lonn
    description: Informasjon om variabel lønn.
    class_uri: adm:Variabellonn
    attributes:
      antall:
        slot_uri: adm:antall
        range: integer
        required: true
        description: Mengde som vert beskriven av tillegget, i hundredeler.
        in_subset:
          - Obligatorisk
      belop:
        slot_uri: adm:belop
        range: integer
        description: Beløp i øre som skal betalast ut.
        in_subset:
          - Valgfri
      lonsart:
        slot_uri: adm:lonsart
        range: Lonsart
        required: true
        description: Lønnsart for variabel lønn.
        in_subset:
          - Obligatorisk
      arbeidsforhold:
        slot_uri: adm:arbeidsforhold
        range: Arbeidsforhold
        required: true
        description: Arbeidsforhold variabellønna gjeld for.
        in_subset:
          - Obligatorisk

  # --- Personal: fravær ------------------------------------------------------

  Fravaer:
    description: Fråvær frå eit arbeidsforhold.
    class_uri: adm:Fravaer
    slots:
      - id
    attributes:
      godkjent:
        slot_uri: adm:godkjent
        range: datetime
        description: Tidspunkt då fråværet vart godkjent.
        in_subset:
          - Valgfri
      kildesystemId:
        slot_uri: adm:kildesystemId
        range: Identifikator
        inlined: true
        description: Kjeldesystemets unike identifikator for fråværet.
        in_subset:
          - Valgfri
      periode:
        slot_uri: adm:periode
        range: Periode
        inlined: true
        required: true
        description: Periode for fråværet.
        in_subset:
          - Obligatorisk
      prosent:
        slot_uri: adm:prosent
        range: integer
        required: true
        description: Prosent fråværande.
        in_subset:
          - Obligatorisk
      fravaersgrunn:
        slot_uri: adm:fravaersgrunn
        range: Fravaersgrunn
        description: Grunn til fråværet.
        in_subset:
          - Valgfri
      fravaerstype:
        slot_uri: adm:fravaerstype
        range: Fravaerstype
        required: true
        description: Type fråvær.
        in_subset:
          - Obligatorisk
      arbeidsforhold:
        slot_uri: adm:arbeidsforhold
        range: Arbeidsforhold
        multivalued: true
        required: true
        description: Arbeidsforholdet fråværet gjeld for.
        in_subset:
          - Obligatorisk
      fortsettelse:
        slot_uri: adm:fortsettelse
        range: Fravaer
        description: Fortsetjande fråvær.
        in_subset:
          - Valgfri
      fortsetter:
        slot_uri: adm:fortsetter
        range: Fravaer
        description: Fråværet dette fråværet er fortsetjing av.
        in_subset:
          - Valgfri
      godkjenner:
        slot_uri: adm:godkjenner
        range: Personalressurs
        description: Personalressurs som har godkjent fråværsmeldinga.
        in_subset:
          - Valgfri

  # --- Fullmakt --------------------------------------------------------------

  Fullmakt:
    description: Fullmakt til å gjere handlingar i høve til ei gjeven Rolle.
    class_uri: adm:Fullmakt
    slots:
      - id
    attributes:
      gyldighetsperiode:
        slot_uri: adm:gyldighetsperiode
        range: Periode
        inlined: true
        required: true
        description: Periode fullmakta er gyldig for.
        in_subset:
          - Obligatorisk
      ramme:
        slot_uri: adm:ramme
        range: Ramme
        description: Myndigheit på kontodimensjon ramme.
        in_subset:
          - Valgfri
      funksjon:
        slot_uri: adm:funksjon
        range: Funksjon
        description: Myndigheit på kontodimensjon funksjon.
        in_subset:
          - Valgfri
      objekt:
        slot_uri: adm:objekt
        range: Objekt
        description: Myndigheit på kontodimensjon objekt.
        in_subset:
          - Valgfri
      organisasjonselement:
        slot_uri: adm:organisasjonselement
        range: Organisasjonselement
        description: Myndigheit på organisasjonselement.
        in_subset:
          - Valgfri
      art:
        slot_uri: adm:art
        range: Art
        description: Myndigheit på kontodimensjon art.
        in_subset:
          - Valgfri
      anlegg:
        slot_uri: adm:anlegg
        range: Anlegg
        description: Myndigheit på kontodimensjon anlegg.
        in_subset:
          - Valgfri
      diverse:
        slot_uri: adm:diverse
        range: Diverse
        description: Myndigheit på kontodimensjon diverse.
        in_subset:
          - Valgfri
      aktivitet:
        slot_uri: adm:aktivitet
        range: Aktivitet
        description: Myndigheit på kontodimensjon aktivitet.
        in_subset:
          - Valgfri
      ansvar:
        slot_uri: adm:ansvar
        range: Ansvar
        description: Myndigheit på kontodimensjon ansvar.
        in_subset:
          - Valgfri
      stedfortreder:
        slot_uri: adm:stedfortreder
        range: Personalressurs
        description: Personalressurs som er stedfortredar for den fullmektige.
        in_subset:
          - Valgfri
      kontrakt:
        slot_uri: adm:kontrakt
        range: Kontrakt
        description: Myndigheit på kontodimensjon kontrakt.
        in_subset:
          - Valgfri
      fullmektig:
        slot_uri: adm:fullmektig
        range: Personalressurs
        description: Personalressurs som har fått fullmakt til ei gjeven rolle.
        in_subset:
          - Valgfri
      prosjekt:
        slot_uri: adm:prosjekt
        range: Prosjekt
        description: Myndigheit på kontodimensjon prosjekt.
        in_subset:
          - Valgfri
      formaal:
        slot_uri: adm:formaal
        range: Formaal
        description: Formål viser aktivitet og tenesteproduksjon.
        in_subset:
          - Valgfri
      rolle:
        slot_uri: adm:rolle
        range: Rolle
        required: true
        description: Kva type fullmakt.
        in_subset:
          - Obligatorisk
      lopenummer:
        slot_uri: adm:lopenummer
