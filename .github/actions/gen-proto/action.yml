name: Generer schema.proto
description: Køyrer gen-proto for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer schema.proto — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-proto DOMAIN=${{ inputs.domain }}
    - name: Generer schema.proto — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-proto SCHEMA=${{ inputs.schema }}
