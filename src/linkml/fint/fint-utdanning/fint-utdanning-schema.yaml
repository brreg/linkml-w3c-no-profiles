id: https://data.norge.no/fint/fint-utdanning
name: fint-utdanning
title: FINT Utdanning
description: >
  FINT-domenemodell for utdanning. Dekkjer elevar, skular, skoleressursar,
  elevforhold, undervisningsforhold, klasser, undervisningsgrupper, faggrupper,
  kontaktlærergrupper, utdanningsprogram, programområde, vurdering, lærling og OT.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/utdanning/
default_range: string

imports:
