id: https://data.norge.no/linkml/fint-personvern
name: fint-personvern
title: FINT Personvern
description: >
  FINT-domenemodell for personvern. Dekkjer behandling av personopplysningar,
  samtykke, tenester og kodeverk for behandlingsgrunnlag og personopplysningstypar.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/personvern/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  pvn:    https://schema.fintlabs.no/personvern/

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  # --- PersonvernContainer-lister -------------------------------------------

  behandlingar:
    slot_uri: pvn:behandlingar
    range: Behandling
    multivalued: true
    inlined_as_list: true

  samtykker:
    slot_uri: pvn:samtykker
    range: Samtykke
    multivalued: true
    inlined_as_list: true

  tenester:
    slot_uri: pvn:tenester
    range: Tjeneste
    multivalued: true
    inlined_as_list: true

  personopplysningar:
    slot_uri: pvn:personopplysningar
    range: Personopplysning
    multivalued: true
    inlined_as_list: true

  # --- Felles pvn-slots (delt mellom fleire klasser) ------------------------

  # behandlingsgrunnlag: brukt i PersonvernContainer (liste) og Behandling (singular, req)
  behandlingsgrunnlag:
    slot_uri: pvn:behandlingsgrunnlag
    range: Behandlingsgrunnlag
    description: Rettsleg grunnlag for behandling av personopplysning.

  # behandling: brukt i Samtykke (req, singular) og Tjeneste (multi, optional)
  behandling:
    slot_uri: pvn:behandling
    range: Behandling
    description: Behandlingsaktivitet.

  slettet:
    slot_uri: pvn:slettet
    range: datetime
    description: Tidspunkt ressursen er sletta.

  # --- Behandling -----------------------------------------------------------

  aktiv:
    slot_uri: pvn:aktiv
    range: boolean
    description: Status på behandling.

  formal:
    slot_uri: pvn:formal
    range: string
    description: Grunngjeving for behandling av personopplysning.

  personopplysning:
    slot_uri: pvn:personopplysning
    range: Personopplysning
    description: Opplysning eller vurdering som kan knytast til ein enkeltperson.

  samtykke:
    slot_uri: pvn:samtykke
    range: Samtykke
    multivalued: true
    description: Samtykker tilknytt ei behandling.

  tjeneste:
    slot_uri: pvn:tjeneste
    range: Tjeneste
    description: Tenesta som behandlinga tilhøyrer.

  # --- Samtykke -------------------------------------------------------------

  opprettet:
    slot_uri: pvn:opprettet
    range: datetime
    description: Dato då samtykket vart oppretta.

  # person:
  #   slot_uri: pvn:person
  #   range: uriorcurie
  #   description: Referanse til Person (Administrasjon).

  organisasjonselement:
    slot_uri: pvn:organisasjonselement
    range: uriorcurie
    description: Referanse til Organisasjonselement (Administrasjon).

  # --- Tjeneste / kodeverk --------------------------------------------------

  # navn:
  #   slot_uri: pvn:navn
  #   range: string
  #   description: Namn på ressursen.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  PersonvernContainer:
    tree_root: true
    description: Rotcontainer for FINT Personvern-instansar.
    slots:
      - behandlingar
      - samtykker
      - tenester
      - behandlingsgrunnlag
      - personopplysningar
    slot_usage:
      behandlingsgrunnlag:
        multivalued: true
        inlined_as_list: true

  # --- personvern.samtykke --------------------------------------------------

  Behandling:
    description: All bruk av personopplysningar (behandlingsaktivitet).
    class_uri: pvn:Behandling
    slots:
      - id
      - aktiv
      - formal
      - slettet
      - behandlingsgrunnlag
      - personopplysning
      - samtykke
      - tjeneste
    slot_usage:
      aktiv:
        required: true
        in_subset:
          - Obligatorisk
      formal:
        required: true
        in_subset:
          - Obligatorisk
      slettet:
        in_subset:
          - Valgfri
      behandlingsgrunnlag:
        required: true
        in_subset:
          - Obligatorisk
      personopplysning:
        required: true
        in_subset:
          - Obligatorisk
      samtykke:
        in_subset:
          - Valgfri
      tjeneste:
        required: true
        in_subset:
          - Obligatorisk

  Samtykke:
    description: Tillating til behandling av personopplysning.
    class_uri: pvn:Samtykke
    slots:
      - id
      - gyldighetsperiode
      - opprettet
      - behandling
      - person
      - organisasjonselement
    slot_usage:
      gyldighetsperiode:
        required: true
        in_subset:
          - Obligatorisk
      opprettet:
        required: true
        in_subset:
          - Obligatorisk
      behandling:
        required: true
        in_subset:
          - Obligatorisk
      person:
        required: true
        in_subset:
          - Obligatorisk
      organisasjonselement:
        in_subset:
          - Valgfri

  Tjeneste:
    description: Teneste eller system som behandlar personopplysningar.
    class_uri: pvn:Tjeneste
    slots:
      - id
      - navn
      - slettet
      - behandling
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      slettet:
        in_subset:
          - Valgfri
      behandling:
        multivalued: true
        in_subset:
          - Valgfri

  # --- personvern.kodeverk --------------------------------------------------

  Behandlingsgrunnlag:
    description: Rettsleg grunnlag for behandling av personopplysningar.
    class_uri: pvn:Behandlingsgrunnlag
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        required: true
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  Personopplysning:
    description: Opplysningar og vurderingar som kan knytast til enkeltpersonar.
    class_uri: pvn:Personopplysning
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        required: true
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri
