  # --- utdanning.basisklasser (abstrakte) ------------------------------------

  Gruppe:
    abstract: true
    description: Abstrakt basisklasse for alle gruppetypar i utdanning.
    class_uri: utd:Gruppe
    slots:
      - id
    attributes:
      navn:
        slot_uri: utd:navn
        range: string
        required: true
        description: Namn på gruppa.
        in_subset:
          - Obligatorisk
      beskrivelse:
        slot_uri: utd:beskrivelse
        range: string
        description: Skildring av gruppa.
        in_subset:
          - Valgfri

  Gruppemedlemskap:
    abstract: true
    description: Abstrakt basisklasse for gruppemedlemskapar i utdanning.
    class_uri: utd:Gruppemedlemskap
    slots:
      - id
    attributes:
      gyldighetsperiode:
        slot_uri: utd:gyldighetsperiode
        range: Periode
        inlined: true
        description: Perioden medlemskapet er gyldig.
        in_subset:
          - Valgfri

  Utdanningsforhold:
    abstract: true
    description: Abstrakt basisklasse for undervisningsforhold i utdanning.
    class_uri: utd:Utdanningsforhold
    slots:
      - id
    attributes:
      beskrivelse:
        slot_uri: utd:beskrivelse
        range: string
        description: Skildring av utdanningsforholdet.
        in_subset:
          - Valgfri

  # --- utdanning.elev --------------------------------------------------------

  Elev:
    description: Ein elev registrert i skulesystemet.
    class_uri: utd:Elev
    slots:
      - id
    attributes:
      elevnummer:
        slot_uri: utd:elevnummer
        range: Identifikator
        inlined: true
        description: Skulens interne elevnummer.
        in_subset:
          - Obligatorisk
      person:
        slot_uri: utd:person
        range: uriorcurie
        description: Referanse til Person i Administrasjon-domenet.
        in_subset:
          - Obligatorisk

  Elevforhold:
    description: Eit elevs tilknyting til ein skule og eit skoleår.
    class_uri: utd:Elevforhold
    slots:
      - id
    attributes:
      beskrivelse:
        slot_uri: utd:beskrivelse
        range: string
        required: true
        description: Skildring av elevforholdet.
        in_subset:
          - Obligatorisk
      avbruddsdato:
        slot_uri: utd:avbruddsdato
        range: date
        description: Dato for avbrot frå opplæring.
        in_subset:
          - Valgfri
      tosprakligFagopplaering:
        slot_uri: utd:tosprakligFagopplaering
        range: boolean
        description: Indikerer om eleven har tospråkleg fagopplæring.
        in_subset:
          - Valgfri
      elev:
        slot_uri: utd:elev
        range: Elev
        required: true
        description: Eleven dette forholdet gjeld.
        in_subset:
          - Obligatorisk
      skole:
        slot_uri: utd:skole
        range: Skole
        required: true
        description: Skulen eleven er tilknytt.
        in_subset:
          - Obligatorisk
      kategori:
        slot_uri: utd:kategori
        range: Elevkategori
        description: Kategori for elevforholdet.
        in_subset:
          - Valgfri
      avbruddsarsak:
        slot_uri: utd:avbruddsarsak
        range: Avbruddsaarsak
        description: Årsak til avbrot frå opplæring.
        in_subset:
          - Valgfri
      skoleaar:
        slot_uri: utd:skoleaar
        range: Skoleaar
        description: Skoleåret elevforholdet tilhøyrer.
        in_subset:
          - Valgfri
      programomrademedlemskap:
        slot_uri: utd:programomrademedlemskap
        range: Programomrademedlemskap
        multivalued: true
        description: Programområdemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      klassemedlemskap:
        slot_uri: utd:klassemedlemskap
        range: Klassemedlemskap
        multivalued: true
        description: Klassemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      faggruppemedlemskap:
        slot_uri: utd:faggruppemedlemskap
        range: Faggruppemedlemskap
        multivalued: true
        description: Faggruppemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      undervisningsgruppemedlemskap:
        slot_uri: utd:undervisningsgruppemedlemskap
        range: Undervisningsgruppemedlemskap
        multivalued: true
        description: Undervisningsgruppemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      kontaktlaerergruppemedlemskap:
        slot_uri: utd:kontaktlaerergruppemedlemskap
        range: Kontaktlaerergruppemedlemskap
        multivalued: true
        description: Kontaktlærergruppemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      persongruppemedlemskap:
        slot_uri: utd:persongruppemedlemskap
        range: Persongruppemedlemskap
        multivalued: true
        description: Persongruppemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      eksamensgruppemedlemskap:
        slot_uri: utd:eksamensgruppemedlemskap
        range: Eksamensgruppemedlemskap
        multivalued: true
        description: Eksamensgruppemedlemskap knytt til elevforholdet.
        in_subset:
          - Valgfri
      fraversregistreringer:
        slot_uri: utd:fraversregistreringer
        range: Elevfravar
        multivalued: true
        description: Fråværsregistreringar knytt til elevforholdet.
        in_subset:
          - Valgfri
      elevfravar:
        slot_uri: utd:elevfravar
        range: Fravarsoversikt
        description: Fråværsoversikt for elevforholdet.
        in_subset:
          - Valgfri
      tilrettelegging:
        slot_uri: utd:tilrettelegging
        range: Elevtilrettelegging
        multivalued: true
        description: Tilretteleggingar knytt til elevforholdet.
        in_subset:
          - Valgfri
      elevvurdering:
        slot_uri: utd:elevvurdering
        range: Elevvurdering
        description: Vurderingssamling for elevforholdet.
        in_subset:
          - Valgfri

  Elevtilrettelegging:
    description: Tilrettelegging for ein elev i eit elevforhold.
    class_uri: utd:Elevtilrettelegging
