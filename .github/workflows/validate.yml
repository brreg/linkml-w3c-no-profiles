name: Validate

on:
  push:
    branches: [main]
    paths:
      - 'src/linkml/**'
      - 'src/mcp-linkml-validator/**'
  pull_request:
    paths:
      - 'src/linkml/**'
      - 'src/mcp-linkml-validator/**'

jobs:

  build-validator:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Cache mcp-linkml-validator image
        id: cache
        uses: actions/cache@v5
        with:
          path: mcp-linkml-validator.tar.zst
          key: mcp-linkml-validator-${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
      - name: Bygg mcp-linkml-validator image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          make mcp-val-build
          podman save mcp-linkml-validator | zstd -T0 > mcp-linkml-validator.tar.zst
      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Sjekk om image finst i GHCR
        id: ghcr-check
        if: steps.cache.outputs.cache-hit == 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          if podman pull "$IMAGE" 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Last inn image frå cache
        if: steps.cache.outputs.cache-hit == 'true' && steps.ghcr-check.outputs.exists != 'true'
        run: podman load < <(zstd -d -c mcp-linkml-validator.tar.zst)
      - name: Push til GHCR
        if: steps.ghcr-check.outputs.exists != 'true'
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
          podman tag mcp-linkml-validator "$IMAGE"
          podman push "$IMAGE"

  validate-ap-no:
    needs: build-validator
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - name: Cache validering (ap-no)
        id: cache-validated
        uses: actions/cache@v5
        with:
          path: .validated-ap-no
          key: validated-ap-no-${{ hashFiles('src/linkml/ap-no/**', 'examples/ap-no/**', 'src/mcp-linkml-validator/server.py', 'src/mcp-linkml-validator/policies/**', 'src/mcp-linkml-validator/flatten-and-validate.bash', 'src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt', '.github/workflows/validate.yml', '.github/actions/**') }}
      - uses: ./.github/actions/load-validator
        if: steps.cache-validated.outputs.cache-hit != 'true'
      - uses: ./.github/actions/validate-bronze
        if: steps.cache-validated.outputs.cache-hit != 'true'
        with:
          domain: ap-no
      - uses: ./.github/actions/validate-examples
        if: steps.cache-validated.outputs.cache-hit != 'true'
        with:
          domain: ap-no
      - name: Merk validering som vellykka
        if: steps.cache-validated.outputs.cache-hit != 'true'
        run: touch .validated-ap-no

