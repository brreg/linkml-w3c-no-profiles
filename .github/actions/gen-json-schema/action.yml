name: Generer schema.json
description: Køyrer gen-json-schema for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer schema.json — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-json-schema DOMAIN=${{ inputs.domain }}
    - name: Generer schema.json — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-json-schema SCHEMA=${{ inputs.schema }}
