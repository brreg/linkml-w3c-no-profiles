id: https://data.norge.no/linkml/xkos-ap-no
name: xkos-ap-no
title: XKOS-AP-NO
description: >-
  LinkML-modell for XKOS-AP-NO – norsk applikasjonsprofil for utvida SKOS-klassifikasjonar.
  Basert på https://data.norge.no/specification/xkos-ap-no

prefixes:
  linkml:   https://w3id.org/linkml/
  xkos:     http://rdf-vocabulary.ddialliance.org/xkos#
  uneskos:  http://purl.org/umu/uneskos#
  skos:     http://www.w3.org/2004/02/skos/core#
  dct:      http://purl.org/dc/terms/
  foaf:     http://xmlns.com/foaf/0.1/
  rdfs:     http://www.w3.org/2000/01/rdf-schema#
  rdf:      http://www.w3.org/1999/02/22-rdf-syntax-ns#
  xsd:      http://www.w3.org/2001/XMLSchema#

default_prefix: https://data.norge.no/linkml/xkos-ap-no/
default_range: string

imports:
  - linkml:types
  - ../common/common-ap-no-schema

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  # -------------------------------------------------------------------------
  # Klassifikasjon  (skos:ConceptScheme)
  # -------------------------------------------------------------------------

  Klassifikasjon:
    class_uri: skos:ConceptScheme
    description: >-
      Ei klassifikasjon – ein systematisk struktur av kategoriar brukt til å
      klassifisere data (skos:ConceptScheme).
    slots:
      - id
      - identifikator_literal
      - tittel
      - beskrivelse
      - utgjevar
      - tema
      - nokkelord
      - spraak
      - har_versjonsnummer
      - endringsdato
      - utgivelsesdato
      - heimeside
      - gjeld_for_tidsrom
      - antall_nivaa
      - er_samanlikna_med
      - forste_nivaa
    slot_usage:
      identifikator_literal:
        in_subset:
          - Obligatorisk
        required: true
      tittel:
        in_subset:
          - Obligatorisk
        required: true
      utgjevar:
        in_subset:
          - Obligatorisk
        required: true
      tema:
        in_subset:
          - Anbefalt
      nokkelord:
        in_subset:
          - Anbefalt
      spraak:
        in_subset:
          - Anbefalt
      har_versjonsnummer:
        in_subset:
          - Anbefalt
      endringsdato:
        in_subset:
          - Anbefalt
      utgivelsesdato:
        in_subset:
          - Anbefalt
      heimeside:
        in_subset:
          - Anbefalt
      gjeld_for_tidsrom:
        in_subset:
          - Anbefalt
      antall_nivaa:
        in_subset:
          - Anbefalt
      er_samanlikna_med:
        in_subset:
          - Valgfri
      forste_nivaa:
        in_subset:
          - Valgfri

  # -------------------------------------------------------------------------
  # Klassifikasjonsnivå  (xkos:ClassificationLevel ⊆ skos:Collection)
  # -------------------------------------------------------------------------

  Klassifikasjonsnivaa:
    class_uri: xkos:ClassificationLevel
    description: >-
      Eit nivå i ein klassifikasjon (xkos:ClassificationLevel).
    slots:
      - id
      - tittel
      - nivaa_djupn
      - har_medlem
      - underordna_klassifikasjonsnivaa
    slot_usage:
      tittel:
        in_subset:
          - Anbefalt
      nivaa_djupn:
        in_subset:
          - Obligatorisk
        required: true
      har_medlem:
        in_subset:
          - Obligatorisk
        required: true
      underordna_klassifikasjonsnivaa:
        in_subset:
          - Valgfri

  # -------------------------------------------------------------------------
  # Kategori  (skos:Concept)
  # -------------------------------------------------------------------------

  Kategori:
    class_uri: skos:Concept
    description: >-
      Ein kategori i ein klassifikasjon (skos:Concept).
    slots:
      - id
      - anbefalt_term
      - er_i_klassifikasjon
      - tilhorande_klassifikasjonsnivaa
      - overordna_kategori
      - underordna_kategori
      - har_notat
      - er_ekvivalent_med
      - er_eksklusivt_ekvivalent_med
      - er_ikkje_ekvivalent_med
    slot_usage:
      anbefalt_term:
        in_subset:
          - Obligatorisk
        required: true
      er_i_klassifikasjon:
        in_subset:
          - Obligatorisk
        required: true
      tilhorande_klassifikasjonsnivaa:
        in_subset:
          - Anbefalt
      overordna_kategori:
        in_subset:
          - Anbefalt
      underordna_kategori:
        in_subset:
          - Anbefalt
      har_notat:
        in_subset:
          - Valgfri
      er_ekvivalent_med:
        in_subset:
          - Valgfri
      er_eksklusivt_ekvivalent_med:
        in_subset:
          - Valgfri
      er_ikkje_ekvivalent_med:
        in_subset:
          - Valgfri

  # -------------------------------------------------------------------------
  # Klassifikasjonssammenligning  (xkos:Correspondence)
  # -------------------------------------------------------------------------

  Klassifikasjonssamanlikning:
    class_uri: xkos:Correspondence
    description: >-
      Ein samanlikning mellom to klassifikasjonar (xkos:Correspondence).
    slots:
      - id
      - identifikator_literal
      - tittel
      - utgjevar
      - samanliknar
      - bestar_av
    slot_usage:
      identifikator_literal:
        in_subset:
          - Obligatorisk
        required: true
      tittel:
        in_subset:
          - Obligatorisk
        required: true
      utgjevar:
        in_subset:
          - Obligatorisk
        required: true
      samanliknar:
        in_subset:
          - Obligatorisk
        required: true
      bestar_av:
        in_subset:
          - Obligatorisk
        required: true

  # -------------------------------------------------------------------------
  # Kategorisammenligning  (xkos:ConceptAssociation)
  # -------------------------------------------------------------------------

  Kategorisamanlikning:
    class_uri: xkos:ConceptAssociation
    description: >-
      Ein samanlikning mellom to kategoriar på tvers av klassifikasjonar
      (xkos:ConceptAssociation).
    slots:
      - id
      - kjeldeomgrep
      - maalomgrep
    slot_usage:
      kjeldeomgrep:
        in_subset:
          - Anbefalt
      maalomgrep:
        in_subset:
          - Anbefalt

  # -------------------------------------------------------------------------
  # Støtteklassar
  # -------------------------------------------------------------------------

  Organisasjon:
    class_uri: foaf:Agent
    description: Ein organisasjon eller aktør (foaf:Agent).
    slots:
      - id

  Tidsrom:
    class_uri: dct:PeriodOfTime
    description: Eit tidsrom med start- og/eller sluttdato (dct:PeriodOfTime).
    slots:
      - id
      - tidsrom_start
      - tidsrom_slutt

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  utgjevar:
    slot_uri: dct:publisher
    range: Organisasjon
    description: Organisasjon som er ansvarleg utgjevar (dct:publisher).

  tema:
    slot_uri: dct:subject
    range: Konsept
    multivalued: true
    description: Fagleg tema klassifikasjonen dekkjer (dct:subject).

  antall_nivaa:
    slot_uri: xkos:numberOfLevels
    range: NonNegativeInteger
    description: Antal nivå i klassifikasjonen (xkos:numberOfLevels).

  gjeld_for_tidsrom:
    slot_uri: dct:temporal
    range: Tidsrom
    description: Tidsrom klassifikasjonen er gyldig for (dct:temporal).

  er_samanlikna_med:
    slot_uri: xkos:compares
    range: Klassifikasjon
    multivalued: true
    description: Klassifikasjonar som er samanlikna (xkos:compares).

  forste_nivaa:
    slot_uri: xkos:levels
    range: Klassifikasjonsnivaa
    multivalued: true
    description: Toppnivå i klassifikasjonen (xkos:levels).

  nivaa_djupn:
    slot_uri: xkos:depth
    range: NonNegativeInteger
    description: Djupna (nivånummer) i klassifikasjonsstrukturen (xkos:depth).

  har_medlem:
    slot_uri: skos:member
    range: Kategori
    multivalued: true
    description: Kategoriar som høyrer til dette nivået (skos:member).

  underordna_klassifikasjonsnivaa:
    slot_uri: xkos:nextLevel
    range: Klassifikasjonsnivaa
    multivalued: true
    description: Underordna klassifikasjonsnivå (xkos:nextLevel).

  er_i_klassifikasjon:
    slot_uri: skos:inScheme
    range: Klassifikasjon
    description: Klassifikasjonen kategorien tilhøyrer (skos:inScheme).

  tilhorande_klassifikasjonsnivaa:
    slot_uri: xkos:belongsTo
    range: Klassifikasjonsnivaa
    description: Klassifikasjonsnivå kategorien høyrer til (xkos:belongsTo).

  overordna_kategori:
    slot_uri: skos:broader
    range: Kategori
    multivalued: true
    description: Overordna kategori (skos:broader).

  underordna_kategori:
    slot_uri: skos:narrower
    range: Kategori
    multivalued: true
    description: Underordna kategori (skos:narrower).

  har_notat:
    slot_uri: skos:note
    range: LangString
    multivalued: true
    description: Fritekstnotat om kategorien (skos:note).

  er_ekvivalent_med:
    slot_uri: uneskos:broadMatch
    range: Kategori
    multivalued: true
    description: Breid ekvivalens til kategori i annan klassifikasjon (uneskos:broadMatch).

  er_eksklusivt_ekvivalent_med:
    slot_uri: xkos:exclusivelyBroadMatch
    range: Kategori
    multivalued: true
    description: Eksklusiv breid ekvivalens (xkos:exclusivelyBroadMatch).

  er_ikkje_ekvivalent_med:
    slot_uri: xkos:disjointMatch
    range: Kategori
    multivalued: true
    description: Klar ikkje-ekvivalens til kategori i annan klassifikasjon (xkos:disjointMatch).

  samanliknar:
    slot_uri: xkos:compares
    range: Klassifikasjon
    multivalued: true
    description: Klassifikasjonar som er samanlikna i korrespondansen (xkos:compares).

  bestar_av:
    slot_uri: xkos:madeOf
    range: Kategorisamanlikning
    multivalued: true
    description: Kategorisamanlikningar som inngår i klassifikasjonssamanlikninga (xkos:madeOf).

  kjeldeomgrep:
    slot_uri: xkos:sourceConcept
    range: Kategori
    description: Kjeldeomgrep i ein kategorisamanlikning (xkos:sourceConcept).

  maalomgrep:
    slot_uri: xkos:targetConcept
    range: Kategori
    description: Måleomgrep i ein kategorisamanlikning (xkos:targetConcept).

  tidsrom_start:
    slot_uri: dct:startDate
    range: date
    description: Startdato for tidsromet (dct:startDate).

  tidsrom_slutt:
    slot_uri: dct:endDate
    range: date
    description: Sluttdato for tidsromet (dct:endDate).
