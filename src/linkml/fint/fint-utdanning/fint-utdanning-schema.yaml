        range: Kontaktlaerergruppe
        description: Kontaktlærergruppa dette medlemskapet er i.
        in_subset:
          - Valgfri

  Persongruppe:
    is_a: Gruppe
    description: Ei gruppe elevar definert for personlege føremål.
    class_uri: utd:Persongruppe
    attributes:
      elev:
        slot_uri: utd:elev
        range: Elevforhold
        multivalued: true
        description: Elevforhold i denne persongruppa.
        in_subset:
          - Valgfri
      persongruppemedlemskap:
        slot_uri: utd:persongruppemedlemskap
        range: Persongruppemedlemskap
        multivalued: true
        description: Medlemskapar i persongruppa.
        in_subset:
          - Valgfri
      termin:
        slot_uri: utd:termin
        range: Termin
        multivalued: true
        description: Terminar gruppa er aktiv i.
        in_subset:
          - Valgfri
      undervisningsforhold:
        slot_uri: utd:undervisningsforhold
        range: Undervisningsforhold
        multivalued: true
        description: Undervisningsforhold knytt til gruppa.
        in_subset:
          - Valgfri
      skole:
        slot_uri: utd:skole
        range: Skole
        description: Skulen gruppa tilhøyrer.
        in_subset:
          - Valgfri
      skoleressurs:
        slot_uri: utd:skoleressurs
        range: Skoleressurs
        multivalued: true
        description: Skoleressursar knytt til gruppa.
        in_subset:
          - Valgfri
      skoleaar:
        slot_uri: utd:skoleaar
        range: Skoleaar
        description: Skoleåret gruppa tilhøyrer.
        in_subset:
          - Valgfri

  Persongruppemedlemskap:
    is_a: Gruppemedlemskap
    description: Eit elevs medlemskap i ei persongruppe.
    class_uri: utd:Persongruppemedlemskap
    attributes:
      elevforhold:
        slot_uri: utd:elevforhold
