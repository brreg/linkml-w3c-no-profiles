id: https://data.norge.no/linkml/fint-administrasjon
name: fint-administrasjon
title: FINT Administrasjon
description: >
  FINT-domenemodell for administrasjon og HR. Dekkjer personalressursar,
  arbeidsforhold, fullmakter og organisasjonsstruktur.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/administrasjon/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  adm:    https://schema.fintlabs.no/administrasjon/


# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  # --- Container-eksklusive lister (felles frå fint-common) ------------------

  personar:
    slot_uri: adm:personar
    range: Person
    multivalued: true
    inlined_as_list: true
    description: Alle personar i containeren.

  kontaktpersonar:
    slot_uri: adm:kontaktpersonar
    range: Kontaktperson
    multivalued: true
    inlined_as_list: true
    description: Alle kontaktpersonar i containeren.

  virksomhetar:
    slot_uri: adm:virksomhetar
    range: Virksomhet
    multivalued: true
    inlined_as_list: true
    description: Alle verksemder i containeren.

  landkodar:
    slot_uri: adm:landkodar
    range: Landkode
    multivalued: true
    inlined_as_list: true
    description: Alle landkodar i containeren.

  kommunar:
    slot_uri: adm:kommunar
    range: Kommune
    multivalued: true
    inlined_as_list: true
    description: Alle kommuneverdiar i containeren.

  spraak:
    slot_uri: adm:spraak
    range: Spraak
    multivalued: true
    inlined_as_list: true
    description: Alle språkverdiar i containeren.

  valuta:
    slot_uri: adm:valuta
    range: Valuta
    multivalued: true
    inlined_as_list: true
    description: Alle valutaverdiar i containeren.

  personalressursar:
    slot_uri: adm:personalressursar
    range: Personalressurs
    multivalued: true
    inlined_as_list: true
    description: Alle personalressursar i containeren.

  arbeidslokasjoner:
    slot_uri: adm:arbeidslokasjoner
    range: Arbeidslokasjon
    multivalued: true
    inlined_as_list: true
    description: Alle arbeidslokasjoner i containeren.

  fullmakter:
    slot_uri: adm:fullmakter
    range: Fullmakt
    multivalued: true
    inlined_as_list: true
    description: Alle fullmakter i containeren.

  rollar:
    slot_uri: adm:rollar
    range: Rolle
    multivalued: true
    inlined_as_list: true
    description: Alle rollar i containeren.

  aktivitetar:
    slot_uri: adm:aktivitetar
    range: Aktivitet
    multivalued: true
    inlined_as_list: true
    description: Alle aktivitetar i containeren.

  artar:
    slot_uri: adm:artar
    range: Art
    multivalued: true
    inlined_as_list: true
    description: Alle artar i containeren.

  arbeidsforholdstypar:
    slot_uri: adm:arbeidsforholdstypar
    range: Arbeidsforholdstype
    multivalued: true
    inlined_as_list: true
    description: Alle arbeidsforholdstypar i containeren.

  fravaersgrunnar:
    slot_uri: adm:fravaersgrunnar
    range: Fravaersgrunn
    multivalued: true
    inlined_as_list: true
    description: Alle fråværsgrunnar i containeren.

  fravaerstypar:
    slot_uri: adm:fravaerstypar
    range: Fravaerstype
    multivalued: true
    inlined_as_list: true
    description: Alle fråværstypar i containeren.

  funksjonar:
    slot_uri: adm:funksjonar
    range: Funksjon
    multivalued: true
    inlined_as_list: true
    description: Alle funksjonar i containeren.

  kontrakter:
    slot_uri: adm:kontrakter
    range: Kontrakt
    multivalued: true
    inlined_as_list: true
    description: Alle kontrakter i containeren.

  lonsartar:
    slot_uri: adm:lonsartar
    range: Lonsart
    multivalued: true
    inlined_as_list: true
    description: Alle lønnsartar i containeren.

  organisasjonstypar:
    slot_uri: adm:organisasjonstypar
    range: Organisasjonstype
    multivalued: true
    inlined_as_list: true
    description: Alle organisasjonstypar i containeren.

  personalressurskategoriar:
    slot_uri: adm:personalressurskategoriar
    range: Personalressurskategori
    multivalued: true
    inlined_as_list: true
    description: Alle personalressurskategoriar i containeren.

  prosjektartar:
    slot_uri: adm:prosjektartar
    range: Prosjektart
    multivalued: true
    inlined_as_list: true
    description: Alle prosjektartar i containeren.

  rammer:
    slot_uri: adm:rammer
    range: Ramme
    multivalued: true
    inlined_as_list: true
    description: Alle rammer i containeren.

  stillingskoder:
    slot_uri: adm:stillingskoder
    range: Stillingskode
    multivalued: true
    inlined_as_list: true
    description: Alle stillingskoder i containeren.

  uketimetall:
    slot_uri: adm:uketimetall
    range: Uketimetall
    multivalued: true
    inlined_as_list: true
    description: Alle uketimetallverdiar i containeren.

  # --- Lønn (Lonn og subklassar) ---------------------------------------------

  anvist:
    slot_uri: adm:anvist
    range: datetime
    description: Tidspunkt då lønn vart anvist.

  attestert:
    slot_uri: adm:attestert
    range: datetime
    description: Tidspunkt då lønn vart attestert.

  kildesystemId:
    slot_uri: adm:kildesystemId
    range: Identifikator
    inlined: true
    description: Kjeldesystemets unike identifikator.

  kontert:
    slot_uri: adm:kontert
    range: datetime
    description: Tidspunkt då lønn vart kontert.

  kontostreng:
    slot_uri: adm:kontostreng
    range: Kontostreng
    inlined: true
    description: Kontering av lønn.

  opptjent:
    slot_uri: adm:opptjent
    range: Periode
    inlined: true
    description: Periode der lønn vart opptent.

  periode:
    slot_uri: adm:periode
    range: Periode
    inlined: true
    description: Periode for ressursen.

  anviser:
    slot_uri: adm:anviser
    range: Personalressurs
    description: Personalressurs som har anvist lønsmeldinga etter fullmakt.

  konterer:
    slot_uri: adm:konterer
    range: Personalressurs
    description: Personalressurs som har kontert lønsmeldinga etter fullmakt.

  attestant:
    slot_uri: adm:attestant
    range: Personalressurs
    description: Personalressurs som har attestert lønsmeldinga etter fullmakt.

  prosent:
    slot_uri: adm:prosent
    range: integer
    description: Prosent.

  antall:
    slot_uri: adm:antall
    range: integer
    description: Mengde som vert beskriven av tillegget, i hundredeler.

  belop:
    slot_uri: adm:belop
    range: integer
    description: Beløp i øre.

  lonsart:
    slot_uri: adm:lonsart
    range: Lonsart
    description: Lønnsart.

  # --- Kontostreng-dimensjonar (delte på tvers av klasser) ------------------

  aktivitet:
    slot_uri: adm:aktivitet
    range: Aktivitet
    description: Detaljering av funksjon.

  anlegg:
    slot_uri: adm:anlegg
    range: Anlegg
    description: Objekt som skal aktiverast eller avskrivast.

  ansvar:
    slot_uri: adm:ansvar
    range: Ansvar
    description: Ansvarleg for ei utgift eller inntekt.

  art:
    slot_uri: adm:art
    range: Art
    description: Type inntekt eller utgift.

  diverse:
    slot_uri: adm:diverse
    range: Diverse
    description: Spesifikasjon som ikkje kjem fram i øvrige dimensjonar.

  formaal:
    slot_uri: adm:formaal
    range: Formaal
    description: Formål viser aktivitet og tenesteproduksjon.

  funksjon:
    slot_uri: adm:funksjon
    range: Funksjon
    description: Det som vert produsert eller tenesta som vert levert.

  kontrakt:
    slot_uri: adm:kontrakt
    range: Kontrakt
    description: Kontrakt ressursen er knytt til.

  lopenummer:
    slot_uri: adm:lopenummer
    range: Lopenummer
    description: Løpenummer i ei nummerserie.

  objekt:
    slot_uri: adm:objekt
    range: Objekt
    description: Objekt ressursen er knytt til.

  prosjekt:
    slot_uri: adm:prosjekt
    range: Prosjekt
    description: Prosjekt ressursen er knytt til.

  prosjektart:
    slot_uri: adm:prosjektart
    range: Prosjektart
    description: Deloppgåve eller delprosjekt.

  ramme:
    slot_uri: adm:ramme
    range: Ramme
    description: Budsjettramme som skal bere kostnadane.

  # --- Hierarki-slots (range varierer per klasse) ----------------------------

  overordnet:
    slot_uri: adm:overordnet
    description: Overordna element i hierarkiet.

  underordnet:
    slot_uri: adm:underordnet
    multivalued: true
    description: Underordna element i hierarkiet.

  forelder:
    slot_uri: adm:forelder
    description: Foreldreelement i hierarki.

  # --- Kodeverk-spesifikke slots ---------------------------------------------

  overfores:
    slot_uri: adm:overfores
    range: boolean
    description: Angir om fråvær av denne typen skal overførast til HR.

  kategori:
    slot_uri: adm:kategori
    range: string
    description: Kategori lønnsart.

  # --- Fråvær ----------------------------------------------------------------

  godkjent:
    slot_uri: adm:godkjent
    range: datetime
    description: Tidspunkt då fråværet vart godkjent.

  fravaersgrunn:
    slot_uri: adm:fravaersgrunn
    range: Fravaersgrunn
    description: Grunn til fråværet.

  fravaerstype:
    slot_uri: adm:fravaerstype
    range: Fravaerstype
    description: Type fråvær.

  fortsettelse:
    slot_uri: adm:fortsettelse
    range: Fravaer
    description: Fortsetjande fråvær.

  fortsetter:
    slot_uri: adm:fortsetter
    range: Fravaer
    description: Fråværet dette fråværet er fortsetjing av.

  godkjenner:
    slot_uri: adm:godkjenner
    range: Personalressurs
    description: Personalressurs som har godkjent fråværsmeldinga.

  # --- Fullmakt / Rolle ------------------------------------------------------

  rolle:
    slot_uri: adm:rolle
    range: Rolle
    description: Kva type fullmakt.

  rolleNavn:
    slot_uri: adm:rolleNavn
    range: Identifikator
    inlined: true
    description: Namn på rolla; unik identifikator.

  fullmakt:
    slot_uri: adm:fullmakt
    range: Fullmakt
    description: Fullmakt ressursen er knytt til.

  fullmektig:
    slot_uri: adm:fullmektig
    range: Personalressurs
    description: Personalressurs som har fått fullmakt til ei gjeven rolle.

  stedfortreder:
    slot_uri: adm:stedfortreder
    description: Stedfortredar i fullmaktssamanheng.

  organisasjonselement:
    slot_uri: adm:organisasjonselement
    range: Organisasjonselement
    description: Organisasjonselement ressursen er knytt til.

  # --- Arbeidslokasjon / Organisasjonselement --------------------------------

  lokasjonskode:
    slot_uri: adm:lokasjonskode
    range: Identifikator
    inlined: true
    description: Kode som identifiserer ein arbeidslokasjon.

  lokasjonsnavn:
    slot_uri: adm:lokasjonsnavn
    range: string
    description: Namn som beskriv ein arbeidslokasjon.

  kortnavn:
    slot_uri: adm:kortnavn
    range: string
    description: Forkorta namn som beskriv organisasjonselementet.

  # navn:
  #   slot_uri: adm:namn
  #   range: string
  #   description: Namn på organisasjonselementet.

  organisasjonsId:
    slot_uri: adm:organisasjonsId
    range: Identifikator
    inlined: true
    description: Unikt internnummer for organisasjonselementet.

  organisasjonsKode:
    slot_uri: adm:organisasjonsKode
    range: Identifikator
    inlined: true
    description: Beskriven kode for organisasjonselementet.

  organisasjonstype:
    slot_uri: adm:organisasjonstype
    range: Organisasjonstype
    description: Kva type organisasjonselement dette er.

  leder:
    slot_uri: adm:leder
    range: Personalressurs
    description: Ansvarleg leiar for organisasjonselementet.

  skole:
    slot_uri: adm:skole
    range: uriorcurie
    description: Referanse til Skole (Utdanning).

  # --- Personalressurs -------------------------------------------------------

  ansattnummer:
    slot_uri: adm:ansattnummer
    range: Identifikator
    inlined: true
    description: Unik identifikator for den tilsette i HR-systemet.

  ansettelsesperiode:
    slot_uri: adm:ansettelsesperiode
    range: Periode
    inlined: true
    description: Perioden personalressursen er i eit tilhøve til organisasjonen.

  ansiennitet:
    slot_uri: adm:ansiennitet
    range: date
    description: Ansiennitet for personalressurs hos arbeidsgjevar.

  brukernavn:
    slot_uri: adm:brukernavn
    range: Identifikator
    inlined: true
    description: Brukarnamn til den tilsette.

  jobbtittel:
    slot_uri: adm:jobbtittel
    range: string
    description: Namn som beskriv jobben eller stillinga.

  # person:
  #   slot_uri: adm:person
  #   range: Person
  #   description: Person som er ein personalressurs.

  personalressurskategori:
    slot_uri: adm:personalressurskategori
    range: Personalressurskategori
    description: Kategori for personalressursen.

  lederFor:
    slot_uri: adm:lederFor
    range: Organisasjonselement
    multivalued: true
    description: Organisasjonselement personalressursen er leiar for.

  personalansvar:
    slot_uri: adm:personalansvar
    range: Arbeidsforhold
    multivalued: true
    description: Arbeidsforhold der personalressursen har personalansvar.

  skoleressurs:
    slot_uri: adm:skoleressurs
    range: uriorcurie
    description: Referanse til Skoleressurs (Utdanning).

  # --- Arbeidsforhold --------------------------------------------------------

  ansettelsesprosent:
    slot_uri: adm:ansettelsesprosent
    range: integer
    description: Prosenten personalressursen eig i høve til arbeidsavtalen.

  arbeidsforholdsperiode:
    slot_uri: adm:arbeidsforholdsperiode
    range: Periode
    inlined: true
    description: Periode for ei gjeven stilling.

  aarslonn:
    slot_uri: adm:aarslonn
    range: integer
    description: Årslønn/grunnlønn i 100 % stilling.

  hovedstilling:
    slot_uri: adm:hovedstilling
    range: boolean
    description: Angir kva arbeidsforhold som er hovudarbeidsforhold.

  lonnsprosent:
    slot_uri: adm:lonnsprosent
    range: integer
    description: Prosent av årslønn den tilsette skal ha utbetalt.

  stillingsnummer:
    slot_uri: adm:stillingsnummer
    range: string
    description: Løpenummer for stillinga.

  stillingstittel:
    slot_uri: adm:stillingstittel
    range: string
    description: Arbeidstakarens stillingstittel i gjeldande stilling.

  tilstedeprosent:
    slot_uri: adm:tilstedeprosent
    range: integer
    description: Det personalressursen faktisk jobbar.

  arbeidsforholdstype:
    slot_uri: adm:arbeidsforholdstype
    range: Arbeidsforholdstype
    description: Beskriven kode som kategoriserer kva funksjon stillinga er gruppert til.

  stillingskode:
    slot_uri: adm:stillingskode
    range: Stillingskode
    description: Firesifra stillingskode frå KS, eventuelt utvida med to siffer.

  timerPerUke:
    slot_uri: adm:timerPerUke
    range: Uketimetall
    description: Timer per veke i 100 % stilling.

  arbeidslokasjon:
    slot_uri: adm:arbeidslokasjon
    range: Arbeidslokasjon
    description: Fysisk lokasjon der den tilsette har sitt arbeidsstad.

  arbeidssted:
    slot_uri: adm:arbeidssted
    range: Organisasjonselement
    description: Tilhøyrsle til organisasjonsstrukturen.

  arbeidsforhold:
    slot_uri: adm:arbeidsforhold
    range: Arbeidsforhold
    description: Arbeidsforhold ressursen er knytt til.

  fastlonn:
    slot_uri: adm:fastlonn
    range: Fastlonn
    description: Fastlønn for arbeidsforholdet.

  fasttillegg:
    slot_uri: adm:fasttillegg
    range: Fasttillegg
    description: Faste tillegg for arbeidsforholdet.

  fravaer:
    slot_uri: adm:fravaer
    range: Fravaer
    description: Fråvær knytt til ressursen.

  variabellonn:
    slot_uri: adm:variabellonn
    range: Variabellonn
    description: Variabel lønn for arbeidsforholdet.

  personalressurs:
    slot_uri: adm:personalressurs
    range: Personalressurs
    description: Personalressurs til arbeidsforholdet.

  personalleder:
    slot_uri: adm:personalleder
    range: Personalressurs
    description: Personalleiar til arbeidsforholdet.

  undervisningsforhold:
    slot_uri: adm:undervisningsforhold
    range: uriorcurie
    description: Referanse til Undervisningsforhold (Utdanning).


# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  AdministrasjonContainer:
    tree_root: true
    description: Rotcontainer for FINT Administrasjon-instansar.
    slots:
      # Felles hovudklassar
      - personar
      - kontaktpersonar
      - virksomhetar
      # Felles kodeverk
      - landkodar
      - kjonn
      - fylke
      - kommunar
      - spraak
      - valuta
      # Domenehovudklassar
      - personalressursar
      - arbeidsforhold
      - arbeidslokasjoner
      - fastlonn
      - fasttillegg
      - fravaer
      - fullmakter
      - organisasjonselement
      - rollar
      - variabellonn
      # Domenekodeverk
      - aktivitetar
      - anlegg
      - ansvar
      - artar
      - arbeidsforholdstypar
      - diverse
      - formaal
      - fravaersgrunnar
      - fravaerstypar
      - funksjonar
      - kontrakter
      - lonsartar
      - lopenummer
      - objekt
      - organisasjonstypar
      - personalressurskategoriar
      - prosjekt
      - prosjektartar
      - rammer
      - stillingskoder
      - uketimetall
    slot_usage:
      arbeidsforhold:
        multivalued: true
        inlined_as_list: true
      fastlonn:
        multivalued: true
        inlined_as_list: true
      fasttillegg:
        multivalued: true
        inlined_as_list: true
      fravaer:
        multivalued: true
        inlined_as_list: true
      organisasjonselement:
        multivalued: true
        inlined_as_list: true
      variabellonn:
        multivalued: true
        inlined_as_list: true
      anlegg:
        multivalued: true
        inlined_as_list: true
      ansvar:
        multivalued: true
        inlined_as_list: true
      diverse:
        multivalued: true
        inlined_as_list: true
      formaal:
        multivalued: true
        inlined_as_list: true
      lopenummer:
        multivalued: true
        inlined_as_list: true
      objekt:
        multivalued: true
        inlined_as_list: true
      prosjekt:
        multivalued: true
        inlined_as_list: true
      kjonn:
        multivalued: true
        inlined_as_list: true
      fylke:
        multivalued: true
        inlined_as_list: true

  # --- Abstrakt base for lønn ------------------------------------------------

  Lonn:
    description: Informasjon om lønn for eit arbeidsforhold (abstrakt base).
    class_uri: adm:Lonn
    abstract: true
    slots:
      - id
      - anvist
      - attestert
      - beskrivelse
      - kildesystemId
      - kontert
      - kontostreng
      - opptjent
      - periode
      - anviser
      - konterer
      - attestant
    slot_usage:
      beskrivelse:
        required: true
        in_subset:
          - Obligatorisk
      kontostreng:
        required: true
        in_subset:
          - Obligatorisk
      periode:
        required: true
        in_subset:
          - Obligatorisk
      anvist:
        in_subset:
          - Valgfri
      attestert:
        in_subset:
          - Valgfri
      kildesystemId:
        in_subset:
          - Valgfri
      kontert:
        in_subset:
          - Valgfri
      opptjent:
        in_subset:
          - Valgfri
      anviser:
        in_subset:
          - Valgfri
      konterer:
        in_subset:
          - Valgfri
      attestant:
        in_subset:
          - Valgfri

  # --- Kompleks datatype -----------------------------------------------------

  Kontostreng:
    description: Sammensetning av kontodimensjonar for bokføring.
    class_uri: adm:Kontostreng
    slots:
      - aktivitet
      - anlegg
      - ansvar
      - art
      - diverse
      - formaal
      - funksjon
      - kontrakt
      - lopenummer
      - objekt
      - prosjekt
      - prosjektart
      - ramme
    slot_usage:
      ansvar:
        required: true
        in_subset:
          - Obligatorisk
      art:
        required: true
        in_subset:
          - Obligatorisk
      funksjon:
        required: true
        in_subset:
          - Obligatorisk
      aktivitet:
        in_subset:
          - Valgfri
      anlegg:
        in_subset:
          - Valgfri
      diverse:
        in_subset:
          - Valgfri
      formaal:
        in_subset:
          - Valgfri
      kontrakt:
        in_subset:
          - Valgfri
      lopenummer:
        in_subset:
          - Valgfri
      objekt:
        in_subset:
          - Valgfri
      prosjekt:
        in_subset:
          - Valgfri
      prosjektart:
        in_subset:
          - Valgfri
      ramme:
        in_subset:
          - Valgfri

  # --- Kodeverk (alle is_a Begrep) -------------------------------------------

  Aktivitet:
    is_a: Begrep
    description: Del av kontostrengen og detaljering av funksjon.
    class_uri: adm:Aktivitet

  Anlegg:
    is_a: Begrep
    description: Del av kontostrengen; objekt som skal aktiverast eller avskrivast.
    class_uri: adm:Anlegg

  Ansvar:
    is_a: Begrep
    description: Del av kontostrengen som beskriv kven som har ansvaret for ei utgift eller inntekt.
    class_uri: adm:Ansvar
    slots:
      - overordnet
      - underordnet
      - organisasjonselement
    slot_usage:
      overordnet:
        range: Ansvar
        in_subset:
          - Valgfri
      underordnet:
        range: Ansvar
        in_subset:
          - Valgfri
      organisasjonselement:
        multivalued: true
        in_subset:
          - Valgfri

  Art:
    is_a: Begrep
    description: Del av kontostrengen som beskriv kva slags inntekter og utgifter det gjeld.
    class_uri: adm:Art

  Arbeidsforholdstype:
    is_a: Begrep
    description: Viser kva behov hos arbeidsgjevar arbeidsforholdet dekkjer.
