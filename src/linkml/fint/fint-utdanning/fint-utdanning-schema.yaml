        multivalued: true
        description: Terminar gruppa er aktiv i.
        in_subset:
          - Valgfri
      skole:
        slot_uri: utd:skole
        range: Skole
        description: Skulen gruppa tilhøyrer.
        in_subset:
          - Valgfri
      skoleaar:
        slot_uri: utd:skoleaar
        range: Skoleaar
        description: Skoleåret gruppa tilhøyrer.
        in_subset:
          - Valgfri
      undervisningsforhold:
        slot_uri: utd:undervisningsforhold
        range: Undervisningsforhold
        multivalued: true
        description: Undervisningsforhold knytt til gruppa.
        in_subset:
          - Valgfri
      gruppemedlemskap:
        slot_uri: utd:gruppemedlemskap
        range: Kontaktlaerergruppemedlemskap
        multivalued: true
        description: Medlemskapar i denne kontaktlærergruppa.
        in_subset:
          - Valgfri

  Kontaktlaerergruppemedlemskap:
    is_a: Gruppemedlemskap
    description: Eit elevs medlemskap i ei kontaktlærargruppe.
    class_uri: utd:Kontaktlaerergruppemedlemskap
    attributes:
      elevforhold:
        slot_uri: utd:elevforhold
