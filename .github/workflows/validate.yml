name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build-validator:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Bygg mcp-linkml-validator
        run: make mcp-val-build
      - name: Lagre image som artefakt
        run: podman save mcp-linkml-validator | gzip > mcp-linkml-validator.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: mcp-linkml-validator-image
          path: mcp-linkml-validator.tar.gz
          retention-days: 1

  validate-ap-no:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: ap-no
      - uses: ./.github/actions/validate-examples
        with:
          domain: ap-no

  validate-fair:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: fair
      - uses: ./.github/actions/validate-examples
        with:
          domain: fair

  validate-fint:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: fint
      - uses: ./.github/actions/validate-examples
        with:
          domain: fint

  validate-ngr:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: ngr
      - uses: ./.github/actions/validate-examples
        with:
          domain: ngr

  validate-oreg:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: oreg
      - uses: ./.github/actions/validate-examples
        with:
          domain: oreg

  validate-samt:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: samt
      - uses: ./.github/actions/validate-examples
        with:
          domain: samt
