id: https://data.norge.no/linkml/fint-utdanning
name: fint-utdanning
title: FINT Utdanning
description: >
  FINT-domenemodell for utdanning. Dekkjer elevar, skular, skoleressursar,
  elevforhold, undervisningsforhold, klasser, undervisningsgrupper, faggrupper,
  kontaktlærergrupper, utdanningsprogram, programområde, vurdering, lærling og OT.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/utdanning/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  utd:    https://schema.fintlabs.no/utdanning/

subsets:
  Obligatorisk:
    description: Obligatorisk eigensskap.
  Anbefalt:
    description: Anbefalt eigensskap.
  Valgfri:
    description: Valfri eigensskap.

