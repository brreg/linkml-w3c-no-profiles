      - id
      - elev
      - tilrettelegging
      - eksamensform
    slot_usage:
      elev:
        range: Elevforhold
        in_subset:
          - Valgfri
      tilrettelegging:
        in_subset:
          - Valgfri
      eksamensform:
        in_subset:
          - Valgfri

  Klasse:
    is_a: Gruppe
    description: Ei fast klasse av elevar ved ein skule (tidlegare kalla Basisgruppe).
    class_uri: utd:Klasse
    slots:
      - skoleaar
      - termin
      - trinn
      - skole
      - undervisningsforhold
      - klassemedlemskap
      - kontaktlaerergruppe
    slot_usage:
