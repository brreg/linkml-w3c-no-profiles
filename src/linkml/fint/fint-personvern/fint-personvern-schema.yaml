id: https://data.norge.no/linkml/fint-personvern
name: fint-personvern
title: FINT Personvern
description: >
  FINT-domenemodell for personvern. Dekkjer behandling av personopplysningar,
  samtykke, tenester og kodeverk for behandlingsgrunnlag og personopplysningstypar.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/personvern/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  pvn:    https://schema.fintlabs.no/personvern/

subsets:
  Obligatorisk:
    description: Obligatorisk eigensskap.
  Anbefalt:
    description: Anbefalt eigensskap.
  Valgfri:
    description: Valfri eigensskap.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  PersonvernContainer:
    tree_root: true
    description: Rotcontainer for FINT Personvern-instansar.
    attributes:
      behandlingar:
        range: Behandling
        multivalued: true
        inlined_as_list: true
      samtykker:
        range: Samtykke
        multivalued: true
        inlined_as_list: true
      tenester:
        range: Tjeneste
        multivalued: true
        inlined_as_list: true
      behandlingsgrunnlag:
        range: Behandlingsgrunnlag
        multivalued: true
        inlined_as_list: true
      personopplysningar:
        range: Personopplysning
        multivalued: true
        inlined_as_list: true

  # --- personvern.samtykke -------------------------------------------------

  Behandling:
    description: All bruk av personopplysningar (behandlingsaktivitet).
    class_uri: pvn:Behandling
    slots:
      - id
    attributes:
      aktiv:
        slot_uri: pvn:aktiv
        range: boolean
        required: true
        description: Status på behandling.
        in_subset:
          - Obligatorisk
      formal:
        slot_uri: pvn:formal
        range: string
        required: true
        description: Grunngjeving for behandling av personopplysning.
        in_subset:
          - Obligatorisk
      slettet:
        slot_uri: pvn:slettet
        range: datetime
        description: Tidspunkt behandlinga er sletta.
        in_subset:
          - Valgfri
      behandlingsgrunnlag:
        slot_uri: pvn:behandlingsgrunnlag
        range: Behandlingsgrunnlag
        required: true
        description: Rettsleg grunnlag for behandling av personopplysning.
        in_subset:
          - Obligatorisk
      personopplysning:
        slot_uri: pvn:personopplysning
        range: Personopplysning
        required: true
        description: Opplysning eller vurdering som kan knytast til ein enkeltperson.
        in_subset:
          - Obligatorisk
      samtykke:
        slot_uri: pvn:samtykke
        range: Samtykke
        multivalued: true
        description: Samtykker tilknytt ei behandling.
        in_subset:
          - Valgfri
      tjeneste:
        slot_uri: pvn:tjeneste
        range: Tjeneste
        required: true
        description: Tenesta som behandlinga tilhøyrer.
        in_subset:
          - Obligatorisk

  Samtykke:
    description: Tillating til behandling av personopplysning.
    class_uri: pvn:Samtykke
    slots:
      - id
    attributes:
      gyldighetsperiode:
        slot_uri: pvn:gyldighetsperiode
        range: Periode
        required: true
        inlined: true
        description: Tidsrom samtykket er gyldig.
        in_subset:
          - Obligatorisk
      opprettet:
        slot_uri: pvn:opprettet
        range: datetime
        required: true
        description: Dato då samtykket vart oppretta.
        in_subset:
          - Obligatorisk
      behandling:
        slot_uri: pvn:behandling
        range: Behandling
        required: true
        description: Behandling som vert omfatta av samtykket.
        in_subset:
          - Obligatorisk
      person:
        slot_uri: pvn:person
        range: uriorcurie
        required: true
        description: Referanse til Person (Administrasjon) som har gjeve samtykke.
        in_subset:
          - Obligatorisk
      organisasjonselement:
        slot_uri: pvn:organisasjonselement
        range: uriorcurie
        description: Referanse til Organisasjonselement (Administrasjon) tilknytt samtykket.
        in_subset:
          - Valgfri

  Tjeneste:
    description: Teneste eller system som behandlar personopplysningar.
    class_uri: pvn:Tjeneste
    slots:
      - id
    attributes:
      navn:
        slot_uri: pvn:navn
        range: string
        required: true
        description: Tittel på tenesta.
        in_subset:
          - Obligatorisk
      slettet:
        slot_uri: pvn:slettet
        range: datetime
        description: Tidspunkt tenesta er sletta.
        in_subset:
          - Valgfri
      behandling:
        slot_uri: pvn:behandling
        range: Behandling
        multivalued: true
        description: Alle behandlingar til ei teneste.
        in_subset:
          - Valgfri

  # --- personvern.kodeverk -------------------------------------------------

  Behandlingsgrunnlag:
    description: Rettsleg grunnlag for behandling av personopplysningar.
    class_uri: pvn:Behandlingsgrunnlag
    slots:
      - id
    attributes:
      kode:
        slot_uri: pvn:kode
        range: string
        required: true
        description: Verdi som identifiserer omgrepet.
        in_subset:
          - Obligatorisk
      navn:
        slot_uri: pvn:navn
        range: string
        required: true
        description: Hovudnamn for omgrepet.
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        slot_uri: pvn:gyldighetsperiode
        range: Periode
        inlined: true
        description: Angir gyldighetsperioden for eit omgrep/kode.
        in_subset:
          - Valgfri
      passiv:
        slot_uri: pvn:passiv
        range: boolean
        description: Angir at koden er passiv og ikkje kan veljast.
        in_subset:
          - Valgfri

  Personopplysning:
    description: Opplysningar og vurderingar som kan knytast til enkeltpersonar.
    class_uri: pvn:Personopplysning
    slots:
      - id
    attributes:
      kode:
        slot_uri: pvn:kode
        range: string
        required: true
        description: Verdi som identifiserer omgrepet.
        in_subset:
          - Obligatorisk
      navn:
        slot_uri: pvn:navn
        range: string
        required: true
        description: Hovudnamn for omgrepet.
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        slot_uri: pvn:gyldighetsperiode
        range: Periode
        inlined: true
        description: Angir gyldighetsperioden for eit omgrep/kode.
        in_subset:
          - Valgfri
      passiv:
        slot_uri: pvn:passiv
        range: boolean
        description: Angir at koden er passiv og ikkje kan veljast.
        in_subset:
          - Valgfri

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  id:
    identifier: true
    range: uriorcurie
    description: URI-identifikator (tilsvarar systemId i FINT).
