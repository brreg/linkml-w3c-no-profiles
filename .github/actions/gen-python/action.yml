name: Generer model.py
description: Køyrer gen-python for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer model.py — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-python DOMAIN=${{ inputs.domain }}
    - name: Generer model.py — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-python SCHEMA=${{ inputs.schema }}
