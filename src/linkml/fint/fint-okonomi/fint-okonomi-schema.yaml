id: https://data.norge.no/linkml/fint-okonomi
name: fint-okonomi
title: FINT Økonomi
description: >
  FINT-domenemodell for økonomi. Dekkjer tre sub-pakkar:
  okonomi.faktura (faktura, fakturagrunnlag, fakturautsteder),
  okonomi.regnskap (transaksjonar, posteringar, bilag, leverandørar) og
  okonomi.kodeverk (vare, merverdiavgift, valuta).
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/okonomi/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  okn:    https://schema.fintlabs.no/okonomi/

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  # --- OkonomiContainer-lister ----------------------------------------------

  fakturaer:
    slot_uri: okn:fakturaer
    range: Faktura
    multivalued: true
    inlined_as_list: true

  fakturautstederear:
    slot_uri: okn:fakturautstederear
    range: Fakturautsteder
    multivalued: true
    inlined_as_list: true

  transaksjonar:
    slot_uri: okn:transaksjonar
    range: Transaksjon
    multivalued: true
    inlined_as_list: true

  posteringar:
    slot_uri: okn:posteringar
    range: Postering
    multivalued: true
    inlined_as_list: true

  leverandorar:
    slot_uri: okn:leverandorar
    range: Leverandor
    multivalued: true
    inlined_as_list: true

  leverandorgrupper:
    slot_uri: okn:leverandorgrupper
    range: Leverandorgruppe
    multivalued: true
    inlined_as_list: true

  varer:
    slot_uri: okn:varer
    range: Vare
    multivalued: true
    inlined_as_list: true

  merverdiavgifter:
    slot_uri: okn:merverdiavgifter
    range: Merverdiavgift
    multivalued: true
    inlined_as_list: true

  valutaer:
    slot_uri: okn:valutaer
    range: OkonomiValuta
    multivalued: true
    inlined_as_list: true

  # --- Felles okn-slots (delt mellom fleire klasser) ------------------------

  # fakturagrunnlag: brukt i OkonomiContainer (liste), Faktura (req) og Fakturautsteder (liste)
  fakturagrunnlag:
    slot_uri: okn:fakturagrunnlag
    range: Fakturagrunnlag
    description: Grunnlag for fakturering.

  fakturautsteder:
    slot_uri: okn:fakturautsteder
    range: Fakturautsteder
    description: Utstedar av faktura og mottakar av betaling.

  belop:
    slot_uri: okn:belop
    range: integer
    description: Beløp, i øre.

  forfallsdato:
    slot_uri: okn:forfallsdato
    range: date
    description: Frist for betaling eller forfallsdato for transaksjon.

  pris:
    slot_uri: okn:pris
    range: integer
    description: Pris per eining, i øre.

  kontering:
    slot_uri: okn:kontering
    range: Kontostreng
    inlined: true
    description: Kontodimensjonar.

  vare:
    slot_uri: okn:vare
    range: Vare
    description: Vare i vareregisteret.

  leverandor:
    slot_uri: okn:leverandor
    range: Leverandor
    description: Leverandør.

  # person:
  #   slot_uri: okn:person
  #   range: uriorcurie
  #   description: Referanse til Person (Administrasjon).

  # --- Faktura --------------------------------------------------------------

  fakturanummer:
    slot_uri: okn:fakturanummer
    range: Identifikator
    inlined: true
    description: Identifikator oppretta i fakturaprogrammet.

  dato:
    slot_uri: okn:dato
    range: date
    description: Dato for utferding av faktura.

  mottaker:
    slot_uri: okn:mottaker
    range: string
    description: Namn på mottakar.

  betalt:
    slot_uri: okn:betalt
    range: boolean
    description: Status på betaling.

  fakturert:
    slot_uri: okn:fakturert
    range: boolean
    description: Status på utsending.

  kreditert:
    slot_uri: okn:kreditert
    range: boolean
    description: Status på kreditering.

  restbelop:
    slot_uri: okn:restbelop
    range: integer
    description: Gjenståande beløp å betale, i øre.

  # --- Fakturagrunnlag ------------------------------------------------------

  ordrenummer:
    slot_uri: okn:ordrenummer
    range: Identifikator
    inlined: true
    description: Unik identifikator for ordren det skal utferdigast faktura på.

  # fakturamottaker: inlined Fakturamottaker — ulikt frå mottaker (string) på Faktura
  fakturamottaker:
    slot_uri: okn:fakturamottaker
    range: Fakturamottaker
    inlined: true
    description: Mottakar som skal betale faktura.

  fakturalinjer:
    slot_uri: okn:fakturalinjer
    range: Fakturalinje
    multivalued: true
    inlined_as_list: true
    description: Linjer av varer eller tenester som skal fakturerast.

  leveringsdato:
    slot_uri: okn:leveringsdato
    range: date
    description: Dato varer eller tenester vart leverte.

  nettobelop:
    slot_uri: okn:nettobelop
    range: integer
    description: Del av totalbeløp som utgjer summen av fakturalinjene, i øre.

  avgiftsbelop:
    slot_uri: okn:avgiftsbelop
    range: integer
    description: Del av totalbeløp som er avgifter, i øre.

  totalbelop:
    slot_uri: okn:totalbelop
    range: integer
    description: Totalt beløp på faktura inkl. avgifter, i øre.

  faktura:
    slot_uri: okn:faktura
    range: Faktura
    multivalued: true
    description: Utferdigde fakturaer for fakturagrunnlaget.

  # --- Fakturautsteder ------------------------------------------------------

  # navn:
  #   slot_uri: okn:navn
  #   range: string
  #   description: Namn på eining eller kodeverk-element.

  organisasjonselement:
    slot_uri: okn:organisasjonselement
    range: uriorcurie
    description: Referanse til Organisasjonselement (Administrasjon).

  # --- Fakturalinje ---------------------------------------------------------

  antall:
    slot_uri: okn:antall
    range: float
    description: Mengd av varen levert.

  fritekst:
    slot_uri: okn:fritekst
    range: string
    multivalued: true
    description: Fritekst som skildrar varen slik han er levert.

  # --- Transaksjon ----------------------------------------------------------

  transaksjonsId:
    slot_uri: okn:transaksjonsId
    range: Identifikator
    inlined: true
    description: Intern unik identifikator i økonomisystemet.

  bilag:
    slot_uri: okn:bilag
    range: Bilag
    multivalued: true
    inlined_as_list: true
    description: Bilag til transaksjonen.

  transaksjonstidspunkt:
    slot_uri: okn:transaksjonstidspunkt
    range: datetime
    description: Tidspunkt for registrering av transaksjonen.

  oppdateringstidspunkt:
    slot_uri: okn:oppdateringstidspunkt
    range: datetime
    description: Tidspunkt for siste endring i transaksjonen.

  postering:
    slot_uri: okn:postering
    range: Postering
    multivalued: true
    description: Posteringar tilhøyrande transaksjonen.

  ansvarlig:
    slot_uri: okn:ansvarlig
    range: uriorcurie
    description: Referanse til Personalressurs (Administrasjon) som er ansvarleg.

  valuta:
    slot_uri: okn:valuta
    range: OkonomiValuta
    description: Valuta for oppgjeve beløp.

  # --- Postering ------------------------------------------------------------

  posteringsId:
    slot_uri: okn:posteringsId
    range: Identifikator
    inlined: true
    description: Intern unik identifikator i økonomisystemet.

  debet:
    slot_uri: okn:debet
    range: boolean
    description: Angir om posteringa er debet eller kredit.

  transaksjon:
    slot_uri: okn:transaksjon
    range: Transaksjon
    description: Transaksjonen posteringa tilhøyrer.

  # --- Leverandor -----------------------------------------------------------

  kontonummer:
    slot_uri: okn:kontonummer
    range: string
    description: Kontonummer til leverandøren.

  leverandornummer:
    slot_uri: okn:leverandornummer
    range: Identifikator
    inlined: true
    description: Nummer som identifiserer ein leverandør.

  leverandorgruppe:
    slot_uri: okn:leverandorgruppe
    range: Leverandorgruppe
    description: Gruppe av leverandørar leverandøren tilhøyrer.

  virksomhet:
    slot_uri: okn:virksomhet
    range: uriorcurie
    description: Referanse til Virksomhet som er leverandør.

  # --- Bilag ----------------------------------------------------------------

  bilagsdato:
    slot_uri: okn:bilagsdato
    range: date
    description: Dato bilaget er registrert.

  bilagsnummer:
    slot_uri: okn:bilagsnummer
    range: string
    description: Nummer på bilaget.

  referanse:
    slot_uri: okn:referanse
    range: string
    description: Ekstern referanse, t.d. fakturanummer.

  url:
    slot_uri: okn:url
    range: string
    description: URL til eksternt dokument.

  filnavn:
    slot_uri: okn:filnavn
    range: string
    description: Namn på bilagets fil.

  data:
    slot_uri: okn:data
    range: string
    description: Bilagets fil, koda som Base64.

  # --- Kontostreng ----------------------------------------------------------

  art:
    slot_uri: okn:art
    range: string
    description: Artskonto (type utgift/inntekt).

  funksjon:
    slot_uri: okn:funksjon
    range: string
    description: Funksjonskode (KOSTRA).

  ansvar:
    slot_uri: okn:ansvar
    range: string
    description: Ansvarsomrade.

  prosjekt:
    slot_uri: okn:prosjekt
    range: string
    description: Prosjektkode.

  # --- Vare -----------------------------------------------------------------

  enhet:
    slot_uri: okn:enhet
    range: string
    description: Namn på mengdeeininga varen leverast i.

  merverdiavgift:
    slot_uri: okn:merverdiavgift
    range: Merverdiavgift
    description: Varens avgiftsklasse og -sats.

  # --- Merverdiavgift -------------------------------------------------------

  sats:
    slot_uri: okn:sats
    range: integer
    description: Sats for merverdiavgift.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  OkonomiContainer:
    tree_root: true
    description: Rotcontainer for FINT Økonomi-instansar.
    slots:
      # okonomi.faktura
      - fakturaer
      - fakturagrunnlag
      - fakturautstederear
      # okonomi.regnskap
      - transaksjonar
      - posteringar
      - leverandorar
      - leverandorgrupper
      # okonomi.kodeverk
      - varer
      - merverdiavgifter
      - valutaer
    slot_usage:
      fakturagrunnlag:
        multivalued: true
        inlined_as_list: true

  # =========================================================================
  # okonomi.faktura
  # =========================================================================

  Faktura:
    description: Betalingskrav utforma og oversendt frå fakturautstedar til fakturamottakar.
    class_uri: okn:Faktura
    slots:
      - id
      - fakturanummer
      - dato
      - forfallsdato
      - belop
      - mottaker
      - adresse
      - betalt
      - fakturert
      - kreditert
      - restbelop
      - fakturagrunnlag
    slot_usage:
      fakturanummer:
        required: true
        in_subset:
          - Obligatorisk
      dato:
        required: true
        in_subset:
          - Obligatorisk
      forfallsdato:
        required: true
        in_subset:
          - Obligatorisk
      belop:
        required: true
        in_subset:
          - Obligatorisk
      mottaker:
        required: true
        in_subset:
          - Obligatorisk
      adresse:
        in_subset:
          - Valgfri
      betalt:
        in_subset:
          - Anbefalt
      fakturert:
        in_subset:
          - Anbefalt
      kreditert:
        in_subset:
          - Anbefalt
      restbelop:
        in_subset:
          - Valgfri
      fakturagrunnlag:
        required: true
        in_subset:
          - Obligatorisk

  Fakturagrunnlag:
    description: Grunnlag for fakturering.
    class_uri: okn:Fakturagrunnlag
    slots:
      - id
      - ordrenummer
      - fakturamottaker
      - fakturalinjer
      - leveringsdato
      - nettobelop
      - avgiftsbelop
      - totalbelop
      - faktura
      - fakturautsteder
    slot_usage:
      ordrenummer:
        required: true
        in_subset:
          - Obligatorisk
      fakturamottaker:
        required: true
        in_subset:
          - Obligatorisk
      fakturalinjer:
        required: true
        in_subset:
          - Obligatorisk
      leveringsdato:
        in_subset:
          - Valgfri
      nettobelop:
        in_subset:
          - Valgfri
      avgiftsbelop:
        in_subset:
          - Valgfri
      totalbelop:
        in_subset:
          - Valgfri
      faktura:
        in_subset:
          - Valgfri
      fakturautsteder:
        required: true
        in_subset:
          - Obligatorisk

  Fakturautsteder:
    description: Eining som utformar og oversender faktura og mottar betaling.
    class_uri: okn:Fakturautsteder
    slots:
      - id
      - navn
      - fakturagrunnlag
      - organisasjonselement
      - vare
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      fakturagrunnlag:
        multivalued: true
        in_subset:
          - Valgfri
      organisasjonselement:
        in_subset:
          - Valgfri
      vare:
        multivalued: true
        in_subset:
          - Valgfri

  # --- Komplekse datatypar (okonomi.faktura) --------------------------------

  Fakturamottaker:
    description: Aktør som skal betale faktura (kompleks datatype).
    class_uri: okn:Fakturamottaker
    slots:
      - person
    slot_usage:
      person:
        required: true
        in_subset:
          - Obligatorisk

  Fakturalinje:
    description: Del av Fakturagrunnlag som skildrar ei enkelt vare (kompleks datatype).
    class_uri: okn:Fakturalinje
    slots:
      - antall
      - pris
      - fritekst
      - vare
    slot_usage:
      antall:
        required: true
        in_subset:
          - Obligatorisk
      pris:
        required: true
        in_subset:
          - Obligatorisk
      fritekst:
        in_subset:
          - Valgfri
      vare:
        required: true
        in_subset:
          - Obligatorisk

  # =========================================================================
  # okonomi.regnskap
  # =========================================================================

  Transaksjon:
    description: Overføring av pengar til eller frå eksterne partar.
    class_uri: okn:Transaksjon
    slots:
      - id
      - transaksjonsId
      - belop
      - forfallsdato
      - beskrivelse
      - bilag
      - transaksjonstidspunkt
      - oppdateringstidspunkt
      - leverandor
      - postering
      - ansvarlig
      - valuta
    slot_usage:
      transaksjonsId:
        required: true
        in_subset:
          - Obligatorisk
      belop:
        required: true
        in_subset:
          - Obligatorisk
      forfallsdato:
        required: true
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Valgfri
      bilag:
        in_subset:
          - Valgfri
      transaksjonstidspunkt:
        in_subset:
          - Valgfri
      oppdateringstidspunkt:
        in_subset:
          - Valgfri
      leverandor:
        in_subset:
          - Valgfri
      postering:
        multivalued: true
        required: true
        in_subset:
          - Obligatorisk
      ansvarlig:
        in_subset:
          - Valgfri
      valuta:
        required: true
        in_subset:
          - Obligatorisk

  Postering:
    description: Føring på ein konto i rekneskapet.
    class_uri: okn:Postering
    slots:
      - id
      - posteringsId
      - belop
      - debet
      - kontering
      - transaksjon
    slot_usage:
      posteringsId:
        required: true
        in_subset:
          - Obligatorisk
      belop:
        required: true
        in_subset:
          - Obligatorisk
      debet:
        required: true
        in_subset:
          - Obligatorisk
      kontering:
        required: true
        in_subset:
          - Obligatorisk
      transaksjon:
        in_subset:
          - Valgfri

  Leverandor:
    description: Person eller verksemd som leverer produkt eller tenester.
    class_uri: okn:Leverandor
    slots:
      - id
      - kontonummer
      - leverandornummer
      - person
      - leverandorgruppe
      - virksomhet
    slot_usage:
      kontonummer:
        in_subset:
          - Valgfri
      leverandornummer:
        in_subset:
          - Valgfri
      person:
        in_subset:
          - Valgfri
      leverandorgruppe:
        in_subset:
          - Valgfri
      virksomhet:
        in_subset:
          - Valgfri

  Leverandorgruppe:
    description: Gruppering av leverandørar.
    class_uri: okn:Leverandorgruppe
    slots:
      - id
      - navn
      - leverandor
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      leverandor:
        multivalued: true
        in_subset:
          - Valgfri

  # --- Komplekse datatypar (okonomi.regnskap) --------------------------------

  Bilag:
    description: Dokumentasjon til ein transaksjon (kompleks datatype).
    class_uri: okn:Bilag
    slots:
      - bilagsdato
      - bilagsnummer
      - referanse
      - url
      - filnavn
      - data
    slot_usage:
      bilagsdato:
        required: true
        in_subset:
          - Obligatorisk
      bilagsnummer:
        in_subset:
          - Valgfri
      referanse:
        in_subset:
          - Valgfri
      url:
        in_subset:
          - Valgfri
      filnavn:
        in_subset:
          - Valgfri
      data:
        in_subset:
          - Valgfri

  Kontostreng:
    description: Kontodimensjonar for ei postering (kompleks datatype).
    class_uri: okn:Kontostreng
    slots:
      - art
      - funksjon
      - ansvar
      - prosjekt
    slot_usage:
      art:
        in_subset:
          - Anbefalt
      funksjon:
        in_subset:
          - Anbefalt
      ansvar:
        in_subset:
          - Valgfri
      prosjekt:
        in_subset:
          - Valgfri

  # =========================================================================
  # okonomi.kodeverk
  # =========================================================================

  Vare:
    description: Vare eller teneste som kan leverast og fakturerast.
    class_uri: okn:Vare
    slots:
      - id
      - kode
      - navn
      - enhet
      - pris
      - kontering
      - gyldighetsperiode
      - passiv
      - fakturautsteder
      - merverdiavgift
    slot_usage:
      kode:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        required: true
        in_subset:
          - Obligatorisk
      enhet:
        required: true
        in_subset:
          - Obligatorisk
      pris:
        required: true
        in_subset:
          - Obligatorisk
      kontering:
        in_subset:
          - Valgfri
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri
      fakturautsteder:
        required: true
        in_subset:
          - Obligatorisk
      merverdiavgift:
        required: true
        in_subset:
          - Obligatorisk

  Merverdiavgift:
    description: Kodeverk for merverdiavgifter.
    class_uri: okn:Merverdiavgift
    slots:
      - id
      - kode
      - navn
      - sats
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        required: true
        in_subset:
          - Obligatorisk
      sats:
        required: true
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri

  OkonomiValuta:
    description: Valuta for transaksjonsbeløp.
    class_uri: okn:Valuta
    slots:
      - id
      - kode
      - navn
      - gyldighetsperiode
      - passiv
    slot_usage:
      kode:
        required: true
        in_subset:
          - Obligatorisk
      navn:
        required: true
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        in_subset:
          - Valgfri
      passiv:
        in_subset:
          - Valgfri
