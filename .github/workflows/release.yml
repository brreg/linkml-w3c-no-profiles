name: Release

on:
  workflow_dispatch:
  push:
    tags: ['v*.*.*']

jobs:
  linkml-local:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Hent eller bygg linkml-local
        run: |
          HASH_TAG="ghcr.io/${{ github.repository_owner }}/linkml-local:${{ hashFiles('src/assets/containers/Dockerfile.linkml') }}"
          if ! podman pull "$HASH_TAG" 2>/dev/null; then
            podman build -f src/assets/containers/Dockerfile.linkml -t localhost/linkml-local:latest .
            podman tag localhost/linkml-local:latest "$HASH_TAG"
            podman push "$HASH_TAG"
          fi
          podman tag "$HASH_TAG" "ghcr.io/${{ github.repository_owner }}/linkml-local:${{ github.ref_name }}"
          podman tag "$HASH_TAG" "ghcr.io/${{ github.repository_owner }}/linkml-local:latest"
          podman push "ghcr.io/${{ github.repository_owner }}/linkml-local:${{ github.ref_name }}"
          podman push "ghcr.io/${{ github.repository_owner }}/linkml-local:latest"

  mcp-linkml-validator:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bygg og push mcp-linkml-validator
        run: |
          podman build \
            -t "ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.ref_name }}" \
            src/mcp-linkml-validator
          podman tag \
            "ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.ref_name }}" \
            "ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:latest"
          podman push "ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.ref_name }}"
          podman push "ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:latest"

  mcp-linkml-modell-utkast:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bygg og push mcp-linkml-modell-utkast
        run: |
          podman build \
            -t "ghcr.io/${{ github.repository_owner }}/mcp-linkml-modell-utkast:${{ github.ref_name }}" \
            src/mcp-linkml-modell-utkast
          podman tag \
            "ghcr.io/${{ github.repository_owner }}/mcp-linkml-modell-utkast:${{ github.ref_name }}" \
            "ghcr.io/${{ github.repository_owner }}/mcp-linkml-modell-utkast:latest"
          podman push "ghcr.io/${{ github.repository_owner }}/mcp-linkml-modell-utkast:${{ github.ref_name }}"
          podman push "ghcr.io/${{ github.repository_owner }}/mcp-linkml-modell-utkast:latest"

  mcp-linkml-begrep-utkast:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Logg inn på GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bygg og push mcp-linkml-begrep-utkast
        run: |
          podman build \
            -t "ghcr.io/${{ github.repository_owner }}/mcp-linkml-begrep-utkast:${{ github.ref_name }}" \
            src/mcp-linkml-begrep-utkast
          podman tag \
            "ghcr.io/${{ github.repository_owner }}/mcp-linkml-begrep-utkast:${{ github.ref_name }}" \
            "ghcr.io/${{ github.repository_owner }}/mcp-linkml-begrep-utkast:latest"
          podman push "ghcr.io/${{ github.repository_owner }}/mcp-linkml-begrep-utkast:${{ github.ref_name }}"
          podman push "ghcr.io/${{ github.repository_owner }}/mcp-linkml-begrep-utkast:latest"
