name: Valider domene
description: Last inn validator-image og valider skjema og eksempelfiler for eit domene

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: mcp-linkml-validator-image

    - name: Last inn validator-image
      shell: bash
      run: podman load < <(gunzip -c mcp-linkml-validator.tar.gz)

    - name: Valider mot bronze-policy
      shell: bash
      run: make domain-validate-bronze DOMAIN=${{ inputs.domain }}

    - name: Valider eksempelfiler mot skjema
      shell: bash
      run: make domain-validate-examples DOMAIN=${{ inputs.domain }}
