id: https://data.norge.no/linkml/dcat-ap-no
name: dcat-ap-no
title: DCAT-AP-NO
description: >-
  Norsk applikasjonsprofil av DCAT-AP, modellert i LinkML med lenking framfor inlining.
  Basert på https://informasjonsforvaltning.github.io/dcat-ap-no/

version: "2.0"

prefixes:
  linkml:  https://w3id.org/linkml/
  dcat:    http://www.w3.org/ns/dcat#
  dct:     http://purl.org/dc/terms/
  foaf:    http://xmlns.com/foaf/0.1/
  skos:    http://www.w3.org/2004/02/skos/core#
  vcard:   http://www.w3.org/2006/vcard/ns#
  prov:    http://www.w3.org/ns/prov#
  dcatap:  http://data.europa.eu/r5r/
  eli:     http://data.europa.eu/eli/ontology#
  adms:    http://www.w3.org/ns/adms#
  odrl:    http://www.w3.org/ns/odrl/2/
  spdx:    http://spdx.org/rdf/terms#
  cv:      http://data.europa.eu/m8g/
  odrs:    http://schema.theodi.org/odrs#
  time:    http://www.w3.org/6006/time#
  xsd:     http://www.w3.org/2001/XMLSchema#
  rdfs:    http://www.w3.org/2000/01/rdf-schema#
  rdf:     http://www.w3.org/1999/02/22-rdf-syntax-ns#

default_prefix: https://data.norge.no/linkml/dcat-ap-no/
default_range: string

imports:
  - linkml:types
  - ../common/common-ap-no-schema

# ---------------------------------------------------------------------------
# Rotklasse (tree_root)
# ---------------------------------------------------------------------------

classes:

  Container:
    tree_root: true
    description: >-
      Rotklasse for DCAT-AP-NO-datafiler. Held flate lister av alle instansierbare
      klassar; referansar mellom objekta brukar URI-lenking.
    attributes:
      katalogar:
        range: Katalog
        multivalued: true
        inlined_as_list: true
      datasett:
        range: Datasett
        multivalued: true
        inlined_as_list: true
      datasettprofil:
        range: Datasettserie
        multivalued: true
        inlined_as_list: true
      datatenestar:
        range: Datatjeneste
        multivalued: true
        inlined_as_list: true
      distribusjonar:
        range: Distribusjon
        multivalued: true
        inlined_as_list: true
      aktorar:
        range: Aktor
        multivalued: true
        inlined_as_list: true
      kontaktopplysningar:
        range: Kontaktopplysning
        multivalued: true
        inlined_as_list: true
      tidsrom:
        range: Tidsrom
        multivalued: true
        inlined_as_list: true
      standardar:
        range: Standard
        multivalued: true
        inlined_as_list: true
      regulativeRessursar:
        range: RegulativRessurs
        multivalued: true
        inlined_as_list: true
      rettigheitserklaringar:
        range: Rettighetserklaring
        multivalued: true
        inlined_as_list: true
      sjekksumar:
        range: Sjekksum
        multivalued: true
        inlined_as_list: true
      gebyr:
        range: Gebyr
        multivalued: true
        inlined_as_list: true
      relasjonar:
        range: Relasjon
        multivalued: true
        inlined_as_list: true
      identifikatorar:
        range: Identifikator
        multivalued: true
        inlined_as_list: true
      katalogpostar:
        range: Katalogpost
        multivalued: true
        inlined_as_list: true

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

  # ---- Hjelpeklassar for refererte vokabularressursar ----------------------

  Frekvens:
    class_uri: dct:Frequency
    description: Ein oppdateringsfrekvens.
    slots:
      - id

  ProvenanceStatement:
    class_uri: dct:ProvenanceStatement
    description: Ein provenienserklæring.
    slots:
      - id

  OdrlPolicy:
    class_uri: odrl:Policy
    description: Ein ODRL-policy.
    slots:
      - id

  ProvAktivitet:
    class_uri: prov:Activity
    description: Ein PROV-aktivitet.
    slots:
      - id

  ProvAttributering:
    class_uri: prov:Attribution
    description: Ein kvalifisert PROV-attributering.
    slots:
      - id

  Tidsinstant:
    class_uri: time:Instant
    description: Eit tidspunkt (OWL Time).
    slots:
      - id

  # ---- Hovudklassar --------------------------------------------------------

  KatalogisertRessurs:
    class_uri: dcat:Resource
    description: Basisklasse for ressursar som kan katalogiserast.
    slots:
      - id

  Aktor:
    class_uri: foaf:Agent
    description: Ein aktør (person, organisasjon eller system) med ansvar for ein ressurs.
    slots:
      - id
      - navn_aktor
      - identifikator_literal
      - type_concept
    slot_usage:
      navn_aktor:
        required: true
        in_subset:
          - Obligatorisk

  Kontaktopplysning:
    class_uri: vcard:Kind
    description: Kontaktinformasjon for ein aktør.
    slots:
      - id
      - navn_vcard
      - har_epost
      - har_kontaktside
    slot_usage:
      navn_vcard:
        required: true
        in_subset:
          - Obligatorisk

  Tidsrom:
    class_uri: dct:PeriodOfTime
    description: Eit tidsintervall med start- og sluttdato.
    slots:
      - id
      - startdato
      - sluttdato
      - begynnelse
      - slutt

  Standard:
    class_uri: dct:Standard
    description: Ein standard som ein ressurs er i samsvar med.
    slots:
      - id
      - tittel
      - har_referanse
      - versjon
    slot_usage:
      tittel:
        required: true
        in_subset:
          - Obligatorisk

  RegulativRessurs:
    class_uri: eli:LegalResource
    description: Ein regulativ ressurs (lov, forskrift o.l.) som gjeld for ein ressurs.
    slots:
      - id
      - beskrivelse
      - identifikator_literal
      - har_referanse
      - sprak
      - tittel
      - type_concept
      - relatert_regulativ_ressurs

  Identifikator:
    class_uri: adms:Identifier
    description: Ein alternativ identifikator for ein ressurs.
    slots:
      - id
      - notasjon
    slot_usage:
      notasjon:
        required: true
        in_subset:
          - Obligatorisk

  Rettighetserklaring:
    class_uri: dct:RightsStatement
    description: Ei erklæring om rettar til ein ressurs (ODRS).
    slots:
      - id
      - anvendelsesretningslinjer
      - jurisdiksjon
      - krediteringstekst
      - krediteringsurl
      - opphavsrettserklaring
      - opphavsrettsinnehaver
      - opphavsrettsnotis
      - opphavsrettsaar

  Sjekksum:
    class_uri: spdx:Checksum
    description: Ein sjekksum for ein distribusjon.
    slots:
      - id
      - algoritme
      - sjekksumverdi
    slot_usage:
      algoritme:
        required: true
        in_subset:
          - Obligatorisk
      sjekksumverdi:
        required: true
        in_subset:
          - Obligatorisk

  Gebyr:
    class_uri: cv:Cost
    description: Eit gebyr knytt til bruk av ein datatjeneste.
    slots:
      - id
      - belop
      - beskrivelse
      - dokumentasjon
      - valuta

  Relasjon:
    class_uri: dcat:Relationship
    description: Ein kvalifisert relasjon mellom to ressursar.
    slots:
      - id
      - har_rolle
      - relasjon_til
    slot_usage:
      har_rolle:
        required: true
        in_subset:
          - Obligatorisk
      relasjon_til:
        required: true
        in_subset:
          - Obligatorisk

  Distribusjon:
    class_uri: dcat:Distribution
    description: Ein spesifikk representasjon/nedlastbar form av eit datasett.
    slots:
      - id
      - tilgangs_url
      - beskrivelse
      - format
      - lisens
      - status
      - tilgjengelighet
      - dokumentasjon
      - endringsdato
      - filstorrelse
      - gjeldende_lovgivning
      - i_samsvar_med
      - komprimeringsformat
      - medietype
      - nedlastningslenke
      - pakkeformat
      - policy
      - rettigheter
      - sjekksum
      - sprak
      - tidsopplosning
      - tilgangstjeneste
      - tittel
      - utgivelsesdato
    slot_usage:
      tilgangs_url:
        required: true
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Anbefalt
      format:
        in_subset:
          - Anbefalt
      lisens:
        in_subset:
          - Anbefalt
      status:
        in_subset:
          - Anbefalt
      tilgjengelighet:
        in_subset:
          - Anbefalt

  Datasett:
    is_a: KatalogisertRessurs
    class_uri: dcat:Dataset
    description: Ei samling av data utgjeven eller kuratert av éin aktør.
    slots:
      - beskrivelse
      - kontaktpunkt
      - tema
      - tittel
      - utgiver
      - begrep
      - ble_generert_ved
      - datasettdistribusjon
      - dekningsomrade
      - gjeldende_lovgivning
      - nokkelord
      - tidsrom
      - tilgangsrettigheter
      - annen_ansvarlig_aktor
      - annen_identifikator
      - annen_spesifikk_relasjon
      - dokumentasjon
      - eierskapshistorikk
      - eksempeldata
      - endringsdato
      - identifikator_literal
      - i_samsvar_med
      - i_serie
      - kilde_datasett
      - landingsside
      - produsent
      - relatert_ressurs
      - sprak
      - type_concept
      - utgivelsesdato
      - versjon
      - versjonsmerknad
    slot_usage:
      beskrivelse:
        required: true
        in_subset:
          - Obligatorisk
      kontaktpunkt:
        required: true
        in_subset:
          - Obligatorisk
      tema:
        required: true
        in_subset:
          - Obligatorisk
      tittel:
        required: true
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      begrep:
        in_subset:
          - Anbefalt
      ble_generert_ved:
        in_subset:
          - Anbefalt
      datasettdistribusjon:
        in_subset:
          - Anbefalt
      dekningsomrade:
        in_subset:
          - Anbefalt
      gjeldende_lovgivning:
        in_subset:
          - Anbefalt
      nokkelord:
        in_subset:
          - Anbefalt
      tidsrom:
        in_subset:
          - Anbefalt
      tilgangsrettigheter:
        in_subset:
          - Anbefalt

  Datasettserie:
    is_a: KatalogisertRessurs
    class_uri: dcat:DatasetSeries
    description: Ei serie av relaterte datasett publisert separat men med felles metadata.
    slots:
      - beskrivelse
      - kontaktpunkt
      - tema
      - tittel
      - utgiver
      - dekningsomrade
      - gjeldende_lovgivning
      - siste
      - tidsrom
      - endringsdato
      - frekvens
      - forste
      - utgivelsesdato
    slot_usage:
      beskrivelse:
        required: true
        in_subset:
          - Obligatorisk
      kontaktpunkt:
        required: true
        in_subset:
          - Obligatorisk
      tema:
        required: true
        in_subset:
          - Obligatorisk
      tittel:
        required: true
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      dekningsomrade:
        in_subset:
          - Anbefalt
      gjeldende_lovgivning:
        in_subset:
          - Anbefalt
      siste:
        in_subset:
          - Anbefalt
      tidsrom:
        in_subset:
          - Anbefalt

  Datatjeneste:
    is_a: KatalogisertRessurs
    class_uri: dcat:DataService
    description: Ei samling operasjonar tilgjengeleg via eit API-grensesnitt.
    slots:
      - endepunkts_url
      - kontaktpunkt
      - tittel
      - utgiver
      - endepunktsbeskrivelse
      - format
      - gjeldende_lovgivning
      - i_samsvar_med
      - nokkelord
      - tema
      - tilgjengeliggjor_datasett
      - tilgjengelighet
      - beskrivelse
      - dokumentasjon
      - har_gebyr
      - identifikator_literal
      - landingsside
      - lisens
      - rettigheter
      - status
      - tilgangsrettigheter
      - versjon
      - versjonsmerknad
    slot_usage:
      endepunkts_url:
        required: true
        in_subset:
          - Obligatorisk
      kontaktpunkt:
        required: true
        in_subset:
          - Obligatorisk
      tittel:
        required: true
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      endepunktsbeskrivelse:
        in_subset:
          - Anbefalt
      format:
        in_subset:
          - Anbefalt
      gjeldende_lovgivning:
        in_subset:
          - Anbefalt
      i_samsvar_med:
        in_subset:
          - Anbefalt
      nokkelord:
        in_subset:
          - Anbefalt
      tema:
        in_subset:
          - Anbefalt
      tilgjengeliggjor_datasett:
        in_subset:
          - Anbefalt
      tilgjengelighet:
        in_subset:
          - Anbefalt

  Katalogpost:
    class_uri: dcat:CatalogRecord
    description: Ein katalogpost som beskriv ein ressurs i katalogen.
    slots:
      - id
      - endringsdato
      - primaertema
      - i_samsvar_med
      - status
      - utgivelsesdato
      - beskrivelse
      - kilde_post
      - sprak
      - tittel
    slot_usage:
      endringsdato:
        required: true
        in_subset:
          - Obligatorisk
      primaertema:
        required: true
        in_subset:
          - Obligatorisk
      i_samsvar_med:
        in_subset:
          - Anbefalt
      status:
        in_subset:
          - Anbefalt
      utgivelsesdato:
        in_subset:
          - Anbefalt

  Katalog:
    is_a: KatalogisertRessurs
    class_uri: dcat:Catalog
    description: Ei kuratert samling av metadata om datasett, datatenestar og/eller andre katalogar.
    slots:
      - beskrivelse
      - kontaktpunkt
      - tittel
      - utgiver
      - datasett
      - datatjeneste
      - dekningsomrade
      - endringsdato
      - hjemmeside
      - lisens
      - sprak
      - temaer
      - utgivelsesdato
      - gjeldende_lovgivning
      - har_del
      - identifikator_literal
      - underkatalog
      - katalogpost
      - produsent
      - rettigheter
      - tidsrom
    slot_usage:
      beskrivelse:
        required: true
        in_subset:
          - Obligatorisk
      kontaktpunkt:
        required: true
        in_subset:
          - Obligatorisk
      tittel:
        required: true
        in_subset:
          - Obligatorisk
      utgiver:
        required: true
        in_subset:
          - Obligatorisk
      datasett:
        in_subset:
          - Anbefalt
      datatjeneste:
        in_subset:
          - Anbefalt
      dekningsomrade:
        in_subset:
          - Anbefalt
      endringsdato:
        in_subset:
          - Anbefalt
      hjemmeside:
        in_subset:
          - Anbefalt
      lisens:
        in_subset:
          - Anbefalt
      sprak:
        in_subset:
          - Anbefalt
      temaer:
        in_subset:
          - Anbefalt
      utgivelsesdato:
        in_subset:
          - Anbefalt

# ---------------------------------------------------------------------------
# Slots (berre DCAT-AP-NO-spesifikke)
# ---------------------------------------------------------------------------

slots:

  # ---- Tekst ---------------------------------------------------------------

  tittel_literal:
    slot_uri: dct:title
    range: string
    multivalued: true
    description: Namn/tittel utan språktag.

  nokkelord:
    slot_uri: dcat:keyword
    range: LangString
    multivalued: true
    description: Nøkkelord som beskriv ressursen.

  notasjon:
    slot_uri: skos:notation
    range: string
    description: Notasjon/kode for identifikatoren.

  versjon:
    slot_uri: dcat:version
    range: string
    description: Versjonsnummer.

  versjonsmerknad:
    slot_uri: adms:versionNotes
    range: LangString
    multivalued: true
    description: Merknad om endringar i denne versjonen.

  navn_aktor:
    slot_uri: foaf:name
    range: LangString
    multivalued: true
    description: Namn på aktøren.

  navn_vcard:
    slot_uri: vcard:fn
    range: LangString
    multivalued: true
    description: Formatert namn (vCard).

  algoritme:
    slot_uri: spdx:algorithm
    range: string
    description: Hash-algoritme brukt for sjekksummen.

  sjekksumverdi:
    slot_uri: spdx:checksumValue
    range: string
    description: Sjekksumverdi som heksadesimal streng.

  belop:
    slot_uri: cv:hasValue
    range: string
    description: Beløp for gebyret.

  # ---- Datoer --------------------------------------------------------------

  startdato:
    slot_uri: dcat:startDate
    range: date
    description: Startdato for tidsrommet.

  sluttdato:
    slot_uri: dcat:endDate
    range: date
    description: Sluttdato for tidsrommet.

  tidsopplosning:
    slot_uri: dcat:temporalResolution
    range: Duration
    description: Minste tidsoppløysing i datasettet.

  # ---- URI-verdiar ---------------------------------------------------------

  endepunkts_url:
    slot_uri: dcat:endpointURL
    range: uri
    multivalued: true
    description: URL til datatjenestens endepunkt.

  endepunktsbeskrivelse:
    slot_uri: dcat:endpointDescription
    range: uri
    multivalued: true
    description: URL til beskriving av endepunktet (t.d. OpenAPI-dokument).

  tilgangs_url:
    slot_uri: dcat:accessURL
    range: uri
    multivalued: true
    description: URL for tilgang til distribusjonen.

  nedlastningslenke:
    slot_uri: dcat:downloadURL
    range: uri
    multivalued: true
    description: Direkte nedlastingslenke for distribusjonsfila.

  landingsside:
    slot_uri: dcat:landingPage
    range: uri
    multivalued: true
    description: Nettside med informasjon om ressursen.

  hjemmeside:
    slot_uri: foaf:homepage
    range: uri
    description: Heimeside for katalogen.

  har_epost:
    slot_uri: vcard:hasEmail
    range: uri
    description: E-postadresse til kontaktpunktet.

  har_kontaktside:
    slot_uri: vcard:hasURL
    range: uri
    description: Nettside for kontakt.

  dokumentasjon:
    slot_uri: foaf:page
    range: uri
    multivalued: true
    description: Lenke til dokumentasjon om ressursen.

  referanse:
    slot_uri: rdfs:seeAlso
    range: uri
    multivalued: true
    description: Referanse til ekstern ressurs.

  relatert_ressurs:
    slot_uri: dct:relation
    range: uri
    multivalued: true
    description: Generisk relasjon til ein annan ressurs.

  kilde_post:
    slot_uri: dct:source
    range: uri
    description: Kjelde for katalogposten (ekstern oppføring).

  krediteringsurl:
    slot_uri: odrs:attributionURL
    range: uri
    description: URL for kreditering av rettshavar.

  filstorrelse:
    slot_uri: dcat:byteSize
    range: NonNegativeInteger
    description: Filstørrelse i bytes.

  # ---- ODRS-strenger -------------------------------------------------------

  anvendelsesretningslinjer:
    slot_uri: odrs:reuserGuidelines
    range: string
    description: Retningslinjer for gjenbruk av data.

  jurisdiksjon:
    slot_uri: odrs:jurisdiction
    range: string
    description: Jurisdiksjon for rettigheitserklæringa.

  krediteringstekst:
    slot_uri: odrs:attributionText
    range: string
    description: Tekst som skal brukast ved kreditering.

  opphavsrettserklaring:
    slot_uri: odrs:copyrightStatement
    range: string
    description: Opphavsrettserklæring.

  opphavsrettsinnehaver:
    slot_uri: odrs:copyrightHolder
    range: string
    description: Namn på opphavsrettsinnehavar.

  opphavsrettsnotis:
    slot_uri: odrs:copyrightNotice
    range: string
    description: Opphavsrettsnotis.

  opphavsrettsaar:
    slot_uri: odrs:copyrightYear
    range: GYear
    description: Årstal for opphavsrett.

  # ---- Klasse-referansar ---------------------------------------------------

  utgiver:
    slot_uri: dct:publisher
    range: Aktor
    description: Aktøren som er ansvarleg for å tilgjengeleggjere ressursen.

  produsent:
    slot_uri: dct:creator
    range: Aktor
    description: Aktøren som primært har skapt ressursen.

  kontaktpunkt:
    slot_uri: dcat:contactPoint
    range: Kontaktopplysning
    multivalued: true
    description: Kontaktinformasjon for hendvendelsar om ressursen.

  tema:
    slot_uri: dcat:theme
    range: Begrep
    multivalued: true
    description: Tema frå eit kontrollert vokabular.

  temaer:
    slot_uri: dcat:themeTaxonomy
    range: Begrepssamling
    multivalued: true
    description: Temavokabular som vert brukt i katalogen.

  begrep:
    slot_uri: dct:subject
    range: Begrep
    multivalued: true
    description: Fagomgrep som datasettet handlar om.

  dekningsomrade:
    slot_uri: dct:spatial
    range: Begrep
    multivalued: true
    description: Geografisk dekningsområde.

  medietype:
    slot_uri: dcat:mediaType
    range: Mediatype
    description: Medietype i samsvar med IANA-registeret.

  komprimeringsformat:
    slot_uri: dcat:compressFormat
    range: Mediatype
    description: Komprimeringsformat brukt i distribusjonen.

  pakkeformat:
    slot_uri: dcat:packageFormat
    range: Mediatype
    description: Pakkeformat brukt i distribusjonen.

  frekvens:
    slot_uri: dct:accrualPeriodicity
    range: Frekvens
    description: Oppdateringsfrekvens for datasettet.

  status:
    slot_uri: adms:status
    range: Begrep
    description: Status for ressursen frå eit kontrollert vokabular.

  tilgjengelighet:
    slot_uri: dcatap:availability
    range: Begrep
    description: Planlagt tilgjengelegheit for ressursen.

  har_rolle:
    slot_uri: dcat:hadRole
    range: Begrep
    description: Rolle ein aktør eller ressurs har i ein relasjon.

  lisens:
    slot_uri: dct:license
    range: Begrep
    description: Lisens for bruk av ressursen.

  gjeldende_lovgivning:
    slot_uri: dcatap:applicableLegislation
    range: RegulativRessurs
