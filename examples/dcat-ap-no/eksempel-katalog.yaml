# Eksempel på ein DCAT-AP-NO-katalog med eit datasett og tilhøyrande ressursar.
# Modelleringsstil: lenking framfor inlining – referansar mellom objekt er URI-ar.

katalogar:
  - id: https://example.org/katalogar/eksempel-1
    tittel:
      - Eksempelkatalog
    beskrivelse:
      - Ein demonstrasjonskatalog for DCAT-AP-NO modellert i LinkML.
    utgiver: https://organization-catalog.fellesdatakatalog.digdir.no/organizations/991825827
    kontaktpunkt:
      - https://example.org/kontaktpunkt/1
    datasett:
      - https://example.org/datasett/aapen-adresseregister
    sprak:
      - http://publications.europa.eu/resource/authority/language/NOB
    lisens: http://publications.europa.eu/resource/authority/licence/CC_BY_4_0
    utgivelsesdato: "2024-01-15"
    endringsdato: "2024-06-01"

datasett:
  - id: https://example.org/datasett/aapen-adresseregister
    tittel:
      - Ope adresseregister
    beskrivelse:
      - Eit datasett med norske adresser tilgjengeleg for allmenta.
    utgiver: https://organization-catalog.fellesdatakatalog.digdir.no/organizations/991825827
    kontaktpunkt:
      - https://example.org/kontaktpunkt/1
    tema:
      - http://publications.europa.eu/resource/authority/data-theme/REGI
    nokkelord:
      - adresse
      - geografi
    datasettdistribusjon:
      - https://example.org/distribusjonar/adresser-csv
    utgivelsesdato: "2023-03-01"
    endringsdato: "2024-05-15"

distribusjonar:
  - id: https://example.org/distribusjonar/adresser-csv
    tilgangs_url:
      - https://example.org/nedlasting/adresser.csv
    nedlastningslenke:
      - https://example.org/nedlasting/adresser.csv
    format: http://publications.europa.eu/resource/authority/file-type/CSV
    medietype: https://www.iana.org/assignments/media-types/text/csv
    lisens: http://publications.europa.eu/resource/authority/licence/CC_BY_4_0

aktørar:
  - id: https://organization-catalog.fellesdatakatalog.digdir.no/organizations/991825827
    navn_aktor:
      - Digitaliseringsdirektoratet

kontaktopplysningar:
  - id: https://example.org/kontaktpunkt/1
    navn_vcard:
      - Datateam Digdir
    har_epost: mailto:data@digdir.no
