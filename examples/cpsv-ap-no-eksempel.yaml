# Eksempel på CPSV-AP-NO med offentleg teneste, lovpålagd teneste, kontaktpunkt og kanal.
# Modelleringsstil: lenking framfor inlining – referansar mellom objekt er URI-ar.

katalogar:
  - id: https://example.org/katalogar/nav-tenestekatalog
    tittel:
      - "NAV Tenestekatalog"
    beskrivelse:
      - "Oversikt over NAV sine offentlege tenester."
    identifikator_literal: "nav-tenestekatalog-2024"
    inneheld_teneste:
      - https://example.org/tenestar/dagpenger
    har_kontaktpunkt:
      - https://example.org/kontaktpunkt/nav-hovud
    utgjevar: https://example.org/organisasjonar/nav

lovpalagdeTenestar:
  - id: https://example.org/lovpalagde/retten-til-dagpenger
    tittel:
      - "Rett til dagpengar ved arbeidsløyse"
    beskrivelse:
      - "Lovpålagd teneste som sikrar rett til dagpengar ved ufrivillig arbeidsløyse, jf. folketrygdlova kapittel 4."
    identifikator_literal: "lovpalagd-dagpenger-ftrl-kap4"
    har_kontaktpunkt:
      - https://example.org/kontaktpunkt/nav-hovud
    har_tenesteresultattype:
      - https://example.org/resultattypar/dagpengar-vedtak
    har_regulativ_ressurs:
      - https://example.org/regelverk/folketrygdlova-kap4

offentligeTenestar:
  - id: https://example.org/tenestar/dagpenger
    tittel:
      - "Søk om dagpengar"
    beskrivelse:
      - "Teneste for å søkje om dagpengar ved arbeidsløyse."
    identifikator_literal: "nav-dagpenger-2024"
    har_kontaktpunkt:
      - https://example.org/kontaktpunkt/nav-hovud
    har_tenesteresultattype:
      - https://example.org/resultattypar/dagpengar-vedtak
    har_ansvarleg_styremakt:
      - https://example.org/organisasjonar/nav
    realiserer:
      - https://example.org/lovpalagde/retten-til-dagpenger
    har_tenestekanal:
      - https://example.org/kanalar/nav-nett
      - https://example.org/kanalar/nav-telefon

tenesteresultattypar:
  - id: https://example.org/resultattypar/dagpengar-vedtak
    tittel:
      - "Vedtak om dagpengar"
    beskrivelse:
      - "Eit vedtak som innvilgar eller avslår søknad om dagpengar."
    mogleg_sprak:
      - http://publications.europa.eu/resource/authority/language/NOB
      - http://publications.europa.eu/resource/authority/language/NNO

offentligeOrganisasjonar:
  - id: https://example.org/organisasjonar/nav
    tittel:
      - "NAV"
    identifikator_literal: "974652269"
    føretrekt_namn:
      - "Arbeids- og velferdsetaten"
    dekningsomrade:
      - http://publications.europa.eu/resource/authority/country/NOR

kontaktpunkt:
  - id: https://example.org/kontaktpunkt/nav-hovud
    telefon:
      - "55553333"
    kontaktside:
      - https://www.nav.no/kontakt-oss

tenestekanalar:
  - id: https://example.org/kanalar/nav-nett
    identifikator_literal: "nav-kanal-nett"
    nettside:
      - https://www.nav.no/dagpenger
  - id: https://example.org/kanalar/nav-telefon
    identifikator_literal: "nav-kanal-telefon"
    opningstider:
      - "Mo-Fr 08:00-15:30"

regulativeRessursar:
  - id: https://example.org/regelverk/folketrygdlova-kap4
    tittel:
      - "Folketrygdlova kapittel 4 – Dagpengar ved arbeidsløyse"
    identifikator_literal: "LOV-1997-02-28-19-K4"
