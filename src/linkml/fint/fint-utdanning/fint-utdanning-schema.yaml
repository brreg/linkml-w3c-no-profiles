        in_subset:
          - Obligatorisk
      organisasjonsnummer:
        slot_uri: utd:organisasjonsnummer
        range: Identifikator
        inlined: true
        description: Organisasjonsnummer-identifikator.
        in_subset:
          - Valgfri
      forretningsadresse:
        slot_uri: utd:forretningsadresse
        range: Adresse
        inlined: true
        description: Forretningsadresse til skulen.
        in_subset:
          - Valgfri
      postadresse:
        slot_uri: utd:postadresse
        range: Adresse
        inlined: true
        description: Postadresse til skulen.
        in_subset:
          - Valgfri
      organisasjon:
        slot_uri: utd:organisasjon
        range: uriorcurie
        description: Referanse til Organisasjonselement i Administrasjon-domenet.
        in_subset:
          - Valgfri
      klasse:
        slot_uri: utd:klasse
        range: Klasse
        multivalued: true
        description: Klassar ved skulen.
        in_subset:
