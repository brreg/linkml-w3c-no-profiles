id: https://data.norge.no/linkml/fint-arkiv
name: fint-arkiv
title: FINT Arkiv
description: >
  FINT-domenemodell for arkiv basert på Noark 5-standarden. Dekkjer sakshandtering,
  journalpostar, dokumenthandsaming, tilgangsstyring og spesialiserte saksmappe-typar.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/arkiv/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  ark:    https://schema.fintlabs.no/arkiv/

subsets:
  Obligatorisk:
    description: Obligatorisk eigensskap.
  Anbefalt:
    description: Anbefalt eigensskap.
  Valgfri:
    description: Valfri eigensskap.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  ArkivContainer:
    tree_root: true
    description: Rotcontainer for FINT Arkiv-instansar.
    attributes:
      # arkiv.noark - Hauptklassar
      arkivdelar:
        range: Arkivdel
        multivalued: true
        inlined_as_list: true
      arkivressursar:
        range: Arkivressurs
        multivalued: true
        inlined_as_list: true
      autorisasjonar:
        range: Autorisasjon
        multivalued: true
        inlined_as_list: true
      administrativeEiningar:
        range: AdministrativEnhet
        multivalued: true
        inlined_as_list: true
      dokumentfiler:
        range: Dokumentfil
        multivalued: true
        inlined_as_list: true
      dokumentbeskrivelsar:
        range: Dokumentbeskrivelse
        multivalued: true
        inlined_as_list: true
      journalpostar:
        range: Journalpost
        multivalued: true
        inlined_as_list: true
      klassifikasjonssystem:
        range: Klassifikasjonssystem
        multivalued: true
        inlined_as_list: true
      tilgangar:
        range: Tilgang
        multivalued: true
        inlined_as_list: true
      sakar:
        range: Sak
        multivalued: true
        inlined_as_list: true
      # arkiv.personal
      personalmappe:
        range: Personalmappe
        multivalued: true
        inlined_as_list: true
      # arkiv.kulturminnevern
      dispensasjonAutomatiskFredaKulturminne:
        range: DispensasjonAutomatiskFredaKulturminne
        multivalued: true
        inlined_as_list: true
      tilskuddFartoy:
        range: TilskuddFartoy
        multivalued: true
        inlined_as_list: true
      tilskuddFredaBygningPrivatEie:
        range: TilskuddFredaBygningPrivatEie
        multivalued: true
        inlined_as_list: true
      # arkiv.samferdsel
      soeknadDrosjeloeyve:
        range: SoeknadDrosjeloeyve
        multivalued: true
        inlined_as_list: true
      # arkiv.kodeverk
      dokumentstatuskodar:
        range: DokumentStatus
        multivalued: true
        inlined_as_list: true
      dokumenttypar:
        range: DokumentType
        multivalued: true
        inlined_as_list: true
      formatar:
        range: Format
        multivalued: true
        inlined_as_list: true
      journalposttypar:
        range: JournalpostType
        multivalued: true
        inlined_as_list: true
      journalstatuskodar:
        range: JournalStatus
        multivalued: true
        inlined_as_list: true
      klassifikasjonstypar:
        range: Klassifikasjonstype
        multivalued: true
        inlined_as_list: true
      korrespondanseparttypar:
        range: KorrespondansepartType
        multivalued: true
        inlined_as_list: true
      merknadstypar:
        range: Merknadstype
        multivalued: true
        inlined_as_list: true
      partRollar:
        range: PartRolle
        multivalued: true
        inlined_as_list: true
      rollar:
        range: Rolle
        multivalued: true
        inlined_as_list: true
      saksmappetypar:
        range: Saksmappetype
        multivalued: true
        inlined_as_list: true
      sakstatuskodar:
        range: Saksstatus
        multivalued: true
        inlined_as_list: true
      skjermingsheimlar:
        range: Skjermingshjemmel
        multivalued: true
        inlined_as_list: true
      tilgangsgrupper:
        range: Tilgangsgruppe
        multivalued: true
        inlined_as_list: true
      tilgangsrestriksjonar:
        range: Tilgangsrestriksjon
        multivalued: true
        inlined_as_list: true
      tilknyttetRegistreringSomKodar:
        range: TilknyttetRegistreringSom
        multivalued: true
        inlined_as_list: true
      variantformatar:
        range: Variantformat
        multivalued: true
        inlined_as_list: true

  # --- arkiv.noark: abstrakte basisklassar ------------------------------------

  Mappe:
    abstract: true
    description: Abstrakt basisklasse for alle mappetypar. Grupperer dokument som høyrer saman.
    class_uri: ark:Mappe
    slots:
      - id
    attributes:
      avsluttetDato:
        slot_uri: ark:avsluttetDato
        range: datetime
        description: Dato og klokkeslett når arkivenheten vart avslutta/lukka.
        in_subset:
          - Valgfri
      beskrivelse:
        slot_uri: ark:beskrivelse
        range: string
        description: Tekstleg skildring av arkivenheten.
        in_subset:
          - Valgfri
      klasse:
        slot_uri: ark:klasse
        range: Klasse
        multivalued: true
        inlined_as_list: true
        description: Klassifisering av mappe.
        in_subset:
          - Valgfri
      mappeId:
        slot_uri: ark:mappeId
        range: Identifikator
        inlined: true
        description: Eintydig identifikasjon av mappa innanfor arkivet.
        in_subset:
          - Valgfri
      merknad:
        slot_uri: ark:merknad
        range: Merknad
        multivalued: true
        inlined_as_list: true
        description: Merknader knytt til mappe.
        in_subset:
          - Valgfri
      noekkelord:
        slot_uri: ark:noekkelord
        range: string
        multivalued: true
        description: Nøkkelord som skildrar innhaldet.
        in_subset:
          - Valgfri
      offentligTittel:
        slot_uri: ark:offentligTittel
        range: string
        description: Offentleg tittel der skjerma ord er fjerna.
        in_subset:
          - Valgfri
      opprettetDato:
        slot_uri: ark:opprettetDato
        range: datetime
        description: Dato og klokkeslett arkivenheten vart oppretta/registrert.
        in_subset:
          - Valgfri
      part:
        slot_uri: ark:part
        range: Part
        multivalued: true
        inlined_as_list: true
        description: Partar til mappe.
        in_subset:
          - Valgfri
      skjerming:
        slot_uri: ark:skjerming
        range: Skjerming
        inlined: true
        description: Skjerming av mappe.
        in_subset:
          - Valgfri
      tittel:
        slot_uri: ark:tittel
        range: string
        description: Tittel eller namn på arkivenheten.
        in_subset:
          - Valgfri
      arkivdel:
        slot_uri: ark:arkivdel
        range: Arkivdel
        description: Arkivdel mappa tilhøyrer.
        in_subset:
          - Valgfri
      avsluttetAv:
        slot_uri: ark:avsluttetAv
        range: Arkivressurs
        description: Person som avslutta/lukka arkivenheten.
        in_subset:
          - Valgfri
      opprettetAv:
        slot_uri: ark:opprettetAv
        range: Arkivressurs
        required: true
        description: Person som oppretta/registrerte arkivenheten.
        in_subset:
          - Obligatorisk

  Saksmappe:
    abstract: true
    is_a: Mappe
    description: Abstrakt spesialisering av Mappe som svarar til ei "sak" i Noark.
    class_uri: ark:Saksmappe
    attributes:
      journalpost:
        slot_uri: ark:journalpost
        range: Journalpost
        multivalued: true
        description: Journalpostar knytt til saksmappa.
        in_subset:
          - Valgfri
      saksaar:
        slot_uri: ark:saksaar
        range: string
        description: Inngår i M003 mappeID — viser året saksmappa vart oppretta.
        in_subset:
          - Valgfri
      saksdato:
        slot_uri: ark:saksdato
        range: datetime
        description: Datoen saka er oppretta.
        in_subset:
          - Valgfri
      sakssekvensnummer:
        slot_uri: ark:sakssekvensnummer
        range: string
        description: Inngår i M003 mappeID — viser rekkjefølgja saksmappene vart oppretta.
        in_subset:
          - Valgfri
      utlaantDato:
        slot_uri: ark:utlaantDato
        range: datetime
        description: Dato ein fysisk saksmappe eller journalpost vart utlånt.
        in_subset:
          - Valgfri
      saksmappetype:
        slot_uri: ark:saksmappetype
        range: Saksmappetype
        description: Type saksmappe.
        in_subset:
          - Valgfri
      saksstatus:
        slot_uri: ark:saksstatus
        range: Saksstatus
        required: true
        description: Status til saksmappa.
        in_subset:
          - Obligatorisk
      tilgangsgruppe:
        slot_uri: ark:tilgangsgruppe
        range: Tilgangsgruppe
        description: Tilgangsgruppe som har tilgang til saksmappa.
        in_subset:
          - Valgfri
      journalenhet:
        slot_uri: ark:journalenhet
        range: AdministrativEnhet
        description: Eining med arkivmessig ansvar for saksmappa.
        in_subset:
          - Valgfri
      administrativEnhet:
        slot_uri: ark:administrativEnhet
        range: AdministrativEnhet
        required: true
        description: Administrativ eining som har ansvar for saksbehandlinga.
        in_subset:
          - Obligatorisk
      saksansvarlig:
        slot_uri: ark:saksansvarlig
        range: Arkivressurs
        required: true
        description: Person som er saksansvarleg.
        in_subset:
          - Obligatorisk

  Registrering:
    abstract: true
    description: Abstrakt basisklasse — arkivets primære byggeklossar.
    class_uri: ark:Registrering
    slots:
      - id
    attributes:
      arkivertDato:
        slot_uri: ark:arkivertDato
        range: datetime
        description: Dato og klokkeslett alle dokument knytt til registreringa vart arkivert.
        in_subset:
          - Valgfri
      beskrivelse:
        slot_uri: ark:beskrivelse
        range: string
        description: Tekstleg skildring av arkivenheten.
        in_subset:
          - Valgfri
      dokumentbeskrivelse:
        slot_uri: ark:dokumentbeskrivelse
        range: Dokumentbeskrivelse
        multivalued: true
        description: Dokumentbeskrivelsar til ei registrering.
        in_subset:
          - Valgfri
      forfatter:
        slot_uri: ark:forfatter
        range: string
        multivalued: true
        description: Namn på person eller organisasjon som skapte dokumentet.
        in_subset:
          - Valgfri
      klasse:
        slot_uri: ark:klasse
        range: Klasse
        inlined: true
        description: Klassifisering av registrering.
        in_subset:
          - Valgfri
      korrespondansepart:
        slot_uri: ark:korrespondansepart
        range: Korrespondansepart
        multivalued: true
        inlined_as_list: true
        description: Mottakar eller sendar av arkivdokument.
        in_subset:
          - Valgfri
      merknad:
        slot_uri: ark:merknad
        range: Merknad
        multivalued: true
        inlined_as_list: true
        description: Merknader til registrering.
        in_subset:
          - Valgfri
      nokkelord:
        slot_uri: ark:nokkelord
        range: string
        multivalued: true
        description: Nøkkelord som skildrar innhaldet.
        in_subset:
          - Valgfri
      offentligTittel:
        slot_uri: ark:offentligTittel
        range: string
        description: Offentleg tittel der skjerma ord er fjerna.
        in_subset:
          - Valgfri
      opprettetDato:
        slot_uri: ark:opprettetDato
        range: datetime
        description: Dato og klokkeslett arkivenheten vart oppretta/registrert.
        in_subset:
          - Valgfri
      part:
        slot_uri: ark:part
        range: Part
        multivalued: true
        inlined_as_list: true
        description: Partar til registrering.
        in_subset:
          - Valgfri
      referanseArkivDel:
        slot_uri: ark:referanseArkivDel
        range: string
        multivalued: true
        description: Referanse til arkivdelen denne arkivenheten er tilknytt.
        in_subset:
          - Valgfri
      registreringsId:
        slot_uri: ark:registreringsId
        range: string
        description: Inngår i M004 journalpostID.
        in_subset:
          - Valgfri
      skjerming:
        slot_uri: ark:skjerming
        range: Skjerming
        inlined: true
        description: Skjerming av registrering.
        in_subset:
          - Valgfri
      tittel:
        slot_uri: ark:tittel
        range: string
        required: true
        description: Tittel eller namn på arkivenheten.
        in_subset:
          - Obligatorisk
      tilgangsgruppe:
        slot_uri: ark:tilgangsgruppe
        range: Tilgangsgruppe
        description: Tilgangsgruppe som har tilgang til registreringa.
        in_subset:
          - Valgfri
      administrativEnhet:
        slot_uri: ark:administrativEnhet
        range: AdministrativEnhet
        description: Administrativ eining som har ansvar for saksbehandlinga.
        in_subset:
          - Valgfri
      arkivdel:
        slot_uri: ark:arkivdel
        range: Arkivdel
        description: Arkivdel registreringa tilhøyrer.
        in_subset:
          - Valgfri
      saksbehandler:
        slot_uri: ark:saksbehandler
        range: Arkivressurs
        description: Person som er saksbehandlar.
        in_subset:
          - Valgfri
      arkivertAv:
        slot_uri: ark:arkivertAv
        range: Arkivressurs
        required: true
        description: Person som arkiverte arkivenheten.
        in_subset:
          - Obligatorisk
      opprettetAv:
        slot_uri: ark:opprettetAv
        range: Arkivressurs
        required: true
        description: Person som oppretta/registrerte arkivenheten.
        in_subset:
          - Obligatorisk

  # --- arkiv.noark: Hauptklassar --------------------------------------------

  AdministrativEnhet:
    description: Administrativ eining med ansvar for saksbehandling.
    class_uri: ark:AdministrativEnhet
    slots:
      - id
    attributes:
      navn:
        slot_uri: ark:navn
        range: string
        required: true
        description: Namn på administrativ eining.
        in_subset:
          - Obligatorisk
      gyldighetsperiode:
        slot_uri: ark:gyldighetsperiode
        range: Periode
        inlined: true
        description: Periode der den administrative eininga er gyldig.
        in_subset:
          - Valgfri
      organisasjonselement:
        slot_uri: ark:organisasjonselement
        range: uriorcurie
        description: Referanse til Organisasjonselement i Administrasjon-domenet.
        in_subset:
          - Valgfri

  Arkivdel:
    description: Ein vilkårleg definert del av eit arkiv.
    class_uri: ark:Arkivdel
    slots:
      - id
    attributes:
      tittel:
        slot_uri: ark:tittel
        range: string
        required: true
        description: Tittel eller namn på arkivdelen.
        in_subset:
          - Obligatorisk
      klassifikasjonssystem:
        slot_uri: ark:klassifikasjonssystem
        range: Klassifikasjonssystem
        multivalued: true
        description: Klassifikasjonssystem nytta i arkivdelen.
        in_subset:
          - Valgfri

  Arkivressurs:
    description: Ansatt med rolle og rettar innanfor arkiv.
    class_uri: ark:Arkivressurs
    slots:
      - id
    attributes:
      kildesystemId:
        slot_uri: ark:kildesystemId
        range: Identifikator
        inlined: true
        description: Kildesystemets identifikator for arkivressursen.
        in_subset:
          - Valgfri
      personalressurs:
        slot_uri: ark:personalressurs
        range: uriorcurie
        required: true
        description: Referanse til Personalressurs i Administrasjon-domenet.
        in_subset:
          - Obligatorisk
      autorisasjon:
        slot_uri: ark:autorisasjon
        range: Autorisasjon
        multivalued: true
        description: Autorisasjonar gjevne til arkivressursen.
        in_subset:
          - Valgfri
      tilgang:
        slot_uri: ark:tilgang
        range: Tilgang
        multivalued: true
        description: Tilgangar gjevne til arkivressursen.
        in_subset:
          - Valgfri

  Autorisasjon:
    description: Siling av kva ein innlogga brukar får lov til å gjere i løysinga.
    class_uri: ark:Autorisasjon
    slots:
      - id
    attributes:
      tilgangsrestriksjon:
        slot_uri: ark:tilgangsrestriksjon
        range: Tilgangsrestriksjon
        multivalued: true
        required: true
        description: Tilgangsrestriksjonar autorisasjonen er gjeven for.
        in_subset:
          - Obligatorisk
      administrativenhet:
        slot_uri: ark:administrativenhet
        range: AdministrativEnhet
        multivalued: true
        description: Administrative einingar autorisasjonen er gyldig for.
        in_subset:
          - Valgfri
      arkivressurs:
        slot_uri: ark:arkivressurs
        range: Arkivressurs
        multivalued: true
        description: Arkivressursar som har fått autorisasjonen.
        in_subset:
          - Valgfri

  Dokumentfil:
    description: Sjølve dokumentfila med data og metadata.
    class_uri: ark:Dokumentfil
    slots:
      - id
    attributes:
      data:
        slot_uri: ark:data
        range: string
        required: true
        description: Dokumentfilens data, koda som Base64.
        in_subset:
          - Obligatorisk
      filnavn:
        slot_uri: ark:filnavn
        range: string
        description: Dokumentfilens namn.
        in_subset:
          - Valgfri
      format:
        slot_uri: ark:format
        range: string
        required: true
        description: Format på dokumentfil, som IANA Media Type.
        in_subset:
          - Obligatorisk

  Journalpost:
    is_a: Registrering
    description: Ein journalpost (inn- eller utgåande dokument, notat o.l.) i ei saksmappe.
    class_uri: ark:Journalpost
    attributes:
      antallVedlegg:
        slot_uri: ark:antallVedlegg
        range: integer
        description: Antal fysiske vedlegg til eit fysisk hoveddokument.
        in_subset:
          - Valgfri
      avskrivning:
        slot_uri: ark:avskrivning
        range: Avskrivning
        inlined: true
        description: Avskriving av journalposten.
        in_subset:
          - Valgfri
      dokumentetsDato:
        slot_uri: ark:dokumentetsDato
        range: datetime
        description: Dato påført sjølve dokumentet.
        in_subset:
          - Valgfri
      forfallsDato:
        slot_uri: ark:forfallsDato
        range: datetime
        description: Frist for å svare på eit inngåande dokument.
        in_subset:
          - Valgfri
      journalAr:
        slot_uri: ark:journalAr
        range: string
        description: Året journalposten vart oppretta.
        in_subset:
          - Valgfri
      journalDato:
        slot_uri: ark:journalDato
        range: datetime
        description: Datoen journalposten er oppretta/arkivert.
        in_subset:
          - Valgfri
      journalPostnummer:
        slot_uri: ark:journalPostnummer
        range: integer
        description: Rekkjefølgja journalpostane vart oppretta innanfor saksmappa.
        in_subset:
          - Valgfri
      journalSekvensnummer:
        slot_uri: ark:journalSekvensnummer
        range: integer
        description: Rekkjefølgja journalposten vart oppretta under året.
        in_subset:
          - Valgfri
      mottattDato:
        slot_uri: ark:mottattDato
        range: datetime
        description: Dato eit eksternt dokument vart motteke.
        in_subset:
          - Valgfri
      offentlighetsvurdertDato:
        slot_uri: ark:offentlighetsvurdertDato
        range: datetime
        description: Datoen offentlegheitsvurdering vart gjennomført.
        in_subset:
          - Valgfri
      sendtDato:
        slot_uri: ark:sendtDato
        range: datetime
        description: Dato eit internt produsert dokument vart sendt/ekspedert.
        in_subset:
          - Valgfri
      journalposttype:
        slot_uri: ark:journalposttype
        range: JournalpostType
        required: true
        description: Namn på type journalpost.
        in_subset:
          - Obligatorisk
      journalstatus:
        slot_uri: ark:journalstatus
        range: JournalStatus
        required: true
        description: Status til journalposten.
        in_subset:
          - Obligatorisk
      journalenhet:
        slot_uri: ark:journalenhet
        range: AdministrativEnhet
        description: Eining med arkivmessig ansvar for journalposten.
        in_subset:
          - Valgfri

  Klassifikasjonssystem:
    description: Overordna struktur for mappene i ein eller fleire arkivdelar.
    class_uri: ark:Klassifikasjonssystem
    slots:
      - id
    attributes:
      avsluttetAv:
        slot_uri: ark:avsluttetAvNavn
        range: string
        description: Namn på person som avslutta/lukka arkivenheten.
        in_subset:
          - Valgfri
      avsluttetDato:
        slot_uri: ark:avsluttetDato
        range: datetime
        description: Dato og klokkeslett arkivenheten vart avslutta/lukka.
        in_subset:
          - Valgfri
      beskrivelse:
        slot_uri: ark:beskrivelse
        range: string
        description: Tekstleg skildring av arkivenheten.
        in_subset:
          - Valgfri
      klasse:
        slot_uri: ark:klasse
        range: Klasse
        multivalued: true
        inlined_as_list: true
        required: true
        description: Klassar tilhøyrande klassifikasjonssystemet.
        in_subset:
          - Obligatorisk
      opprettetAv:
        slot_uri: ark:opprettetAvNavn
        range: string
        required: true
        description: Namn på person som oppretta/registrerte arkivenheten.
        in_subset:
          - Obligatorisk
      opprettetDato:
        slot_uri: ark:opprettetDato
        range: datetime
        required: true
        description: Dato og klokkeslett arkivenheten vart oppretta/registrert.
        in_subset:
          - Obligatorisk
      tittel:
        slot_uri: ark:tittel
        range: string
        required: true
        description: Tittel eller namn på arkivenheten.
        in_subset:
          - Obligatorisk
      klassifikasjonstype:
        slot_uri: ark:klassifikasjonstype
        range: Klassifikasjonstype
        description: Type klassifikasjonssystem.
        in_subset:
          - Valgfri
      arkivdel:
        slot_uri: ark:arkivdel
        range: Arkivdel
        multivalued: true
