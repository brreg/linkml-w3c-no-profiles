      - id
      - feidenavn
      - personalressurs
      - person
      - skole
      - sensor
    slot_usage:
      feidenavn:
        in_subset:
          - Valgfri
      personalressurs:
        in_subset:
          - Obligatorisk
      person:
        in_subset:
