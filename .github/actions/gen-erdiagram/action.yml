name: Generer ER-diagram
description: Køyrer gen-erdiagram for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer ER-diagram — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-erdiagram DOMAIN=${{ inputs.domain }}
    - name: Generer ER-diagram — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-erdiagram SCHEMA=${{ inputs.schema }}
