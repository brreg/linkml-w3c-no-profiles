name: Generer PlantUML-diagram (SVG)
description: Køyrer gen-plantuml og rendrar til SVG for alle skjema i domenet

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: true

runs:
  using: composite
  steps:
    - name: Generer SVG-diagram
      shell: bash
      run: make domain-gen-plantuml DOMAIN=${{ inputs.domain }}
