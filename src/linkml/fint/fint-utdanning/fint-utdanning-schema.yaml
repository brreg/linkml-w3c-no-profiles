  # --- utdanning.basisklasser (abstrakte) ------------------------------------

  Gruppe:
    abstract: true
    description: Abstrakt basisklasse for alle gruppetypar i utdanning.
    class_uri: utd:Gruppe
    slots:
      - id
      - navn
      - beskrivelse
    slot_usage:
      navn:
        required: true
        in_subset:
          - Obligatorisk
      beskrivelse:
        in_subset:
          - Valgfri

  Gruppemedlemskap:
    abstract: true
    description: Abstrakt basisklasse for gruppemedlemskapar i utdanning.
    class_uri: utd:Gruppemedlemskap
    slots:
      - id
      - gyldighetsperiode
    slot_usage:
      gyldighetsperiode:
        in_subset:
          - Valgfri

  Utdanningsforhold:
    abstract: true
    description: Abstrakt basisklasse for undervisningsforhold i utdanning.
    class_uri: utd:Utdanningsforhold
    slots:
      - id
      - beskrivelse
    slot_usage:
      beskrivelse:
        in_subset:
          - Valgfri

  # --- utdanning.elev --------------------------------------------------------

