name: Generer ontology.ttl (OWL)
description: Køyrer gen-owl for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer ontology.ttl (OWL) — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-owl DOMAIN=${{ inputs.domain }}
    - name: Generer ontology.ttl (OWL) — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-owl SCHEMA=${{ inputs.schema }}
