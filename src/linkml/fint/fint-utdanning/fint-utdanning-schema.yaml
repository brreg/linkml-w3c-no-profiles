        multivalued: true
        required: true
        in_subset:
          - Obligatorisk
      termin:
        multivalued: true
        in_subset:
          - Valgfri
      skole:
        in_subset:
          - Valgfri
      skoleaar:
        in_subset:
          - Valgfri
      undervisningsforhold:
        in_subset:
          - Valgfri
      gruppemedlemskap:
        range: Kontaktlaerergruppemedlemskap
        in_subset:
          - Valgfri

  Kontaktlaerergruppemedlemskap:
    is_a: Gruppemedlemskap
    description: Eit elevs medlemskap i ei kontaktlærargruppe.
    class_uri: utd:Kontaktlaerergruppemedlemskap
    slots:
      - elevforhold
      - kontaktlaerergruppe
    slot_usage:
      elevforhold:
        in_subset:
          - Valgfri
      kontaktlaerergruppe:
        in_subset:
          - Valgfri

  Persongruppe:
    is_a: Gruppe
    description: Ei gruppe elevar definert for personlege føremål.
    class_uri: utd:Persongruppe
    slots:
      - elev
      - persongruppemedlemskap
      - termin
      - undervisningsforhold
      - skole
      - skoleressurs
      - skoleaar
    slot_usage:
