name: Last inn validator-image
description: Last mcp-linkml-validator image frå workflow-artefakt

runs:
  using: composite
  steps:
    - name: Last ned validator-artefakt
      uses: actions/download-artifact@v4
      with:
        name: validator-image
        path: /tmp/images

    - name: Last inn validator-image
      shell: bash
      run: |
        podman load < <(zstd -d -c /tmp/images/mcp-linkml-validator.tar.zst)
