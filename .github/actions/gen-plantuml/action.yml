name: Generer PlantUML-diagram (SVG)
description: Køyrer gen-plantuml og rendrar til SVG for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer SVG-diagram — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-plantuml DOMAIN=${{ inputs.domain }}
    - name: Generer SVG-diagram — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-plantuml SCHEMA=${{ inputs.schema }}
