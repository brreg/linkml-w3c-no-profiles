id: https://example.no/ontology/samt-bu-skole
name: skole_ontologi
title: Skoleontologi (Ontodia-vennlig)
description: Ontodia-vennlig LinkML-modell for skoler

prefixes:
  linkml: https://w3id.org/linkml/
  samtbuskole: https://example.no/ontology/skole#
  org:    http://www.w3.org/ns/org#

default_prefix: samtbuskole
default_range: string

imports:
  - linkml:types
  - ../../ap-no/dcat-ap-no/dcat-ap-no-schema
  - ../../ap-no/dqv-ap-no/dqv-ap-no-schema

classes:

  Containerklasse:
    description: Containerklasse for alle klasser som kan inngå i datasettet.
    tree_root: true
    slots:
# metadata
      - kontaktpunkter
      - utgivere
      - organisasjoner
      - gjeldende_lovgivninger
      - datasettdistribusjoner
      - dataset_metadata
      - kvalitetsmerknader
      - brukertilbakemeldinger
      - kvalitetsmaalinger
      - grupper
      - standarder
      - kvalitetsdimensjoner
      - tidsromer
      - tekstdeler
# data
      - id
      - skoler
      - kommuner
      - fylker
      - private_virksomheter
      - basisgrupper
      - elever
      - rektorer
      - kontaktlaerere

  Skole:
    description: En skole er en privat eller offentlig institusjon eller et lærested hvor lærere underviser i ulike fag, oftest som grunnlag for videre utdannelse og yrkesliv.
    exact_mappings:
      - org:OrganizationalUnit
      - schema:EducationalOrganization
    slots:
      - id
      - navn
      - har_skoleeier
    see_also:
      - https://data.norge.no/concepts/fc9d0dda-71a2-3925-8688-52f849cf0f49

  # --- Abstrakt superklasse ---
  Skoleeier:
    abstract: true
    exact_mappings:
      - foaf:Agent
    description: Superklasse for alle typer skoleeiere.
    slots:
      - id
      - navn
    see_also:
      - https://data.norge.no/concepts/91b83e9a-8beb-3747-b65c-238a2bef605a

  Kommune:
    exact_mappings:
      - org:Organization
    description: En kommune er et geografisk avgrenset område som utgjør en egen politisk og administrativ enhet innen en statsdannelse.
    is_a: Skoleeier
    slots:
      - kommunenummer
    see_also:
      - https://data.norge.no/concepts/5b7fd4f2-39f6-39ed-9540-e6c2491ef633

  Fylke:
    description: Fylke (etter norrønt fylki) er en betegnelse på et undernasjonalt, regionalt geografisk område, tilsvarende amt og len.
    exact_mappings:
      - org:Organization
    is_a: Skoleeier
    slots:
      - fylkesnummer

  PrivatVirksomhet:
    description: Virksomhet, eller foretak, er betegnelser for en juridisk person eller en organisasjon som produserer varer eller tjenester.
    exact_mappings:
      - org:Organization
      - schema:Organization
    is_a: Skoleeier
    slots:
      - organisasjonsnummer

  Basisgruppe:
    description: Skoleklasse som hovedsaklig samler elever i ulike fag.
    close_mappings:
      - schema:EducationalOccupationalProgram
      - schema:Course
    slots:
      - id
      - navn
      - trinniva
      - del_av_skole

  Person:
    description: Eit menneske individ
    abstract: true
    exact_mappings:
      - foaf:Person
    slots:
      - id
      - navn
    see_also:
      - https://data.norge.no/concepts/9adf3e97-c9c2-3ee7-bc97-8f2a7e7fa69e

  Elev:
    description: En person som går på skole
    close_mappings:
      - schema:Student
    is_a: Person
    slots:
      - horer_til_basisgruppe

  Rektor:
    description: Høgaste akademiske leder av en skole
    is_a: Person
    slots:
      - enhetsleder_for

  Kontaktlaerer:
    description: En lærer med ansvar for ei basisgruppe og er skolens kontaktpunkt for elevane i basisgruppa
    close_mappings:
      - schema:Teacher
    is_a: Person
    slots:
      - tilknyttet_basisgruppe
      - har_saerlig_ansvar_for
      - jobber_paa_skole
    see_also:
      - https://data.norge.no/concepts/59c7126f-7189-30f7-8dee-650cc9aa8762

slots:

  # --- Identifikator og namn ---
  # identifikator:
  #   identifier: true
  #   range: uriorcurie
  #   description: Global identifikator (CURIE/URI).

  navn:
    range: string
    description: Namn på ressursen.

  # --- Metadata container slots (DCAT-AP-NO) ---
  tidsromer:
    range: Tidsrom
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Tidsrom for kvalitetsmerknad.     

  tekstdeler:
    range: Tekstdel
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Tekstdel for kvalitetsmerknad.   
  
  kvalitetsdimensjoner:
    range: Kvalitetsdimensjon
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Kvalitetsdimensjoner for datasettet.  

  kontaktpunkter:
    range: Kontaktopplysning
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Kontaktpunkt for datasettet.

  utgivere:
    range: Aktor
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Utgjevarar av datasettet.

  organisasjoner:
    range: Aktor
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Organisasjonar knytt til datasettet.

  grupper:
    range: Aktor
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Grupper knytt til datasettet.

  gjeldende_lovgivninger:
    range: RegulativRessurs
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Gjeldande lovgiving for datasettet.

  datasettdistribusjoner:
    range: Distribusjon
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Distribusjonar av datasettet.

  dataset_metadata:
    range: Datasett
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Metadata om datasettet.

  kvalitetsmerknader:
    range: Kvalitetsmerknad
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Kvalitetsmerknader for datasettet.

  brukertilbakemeldinger:
    range: Brukartilbakemelding
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Brukartilbakemeldingar for datasettet.

  kvalitetsmaalinger:
    range: Kvalitetsmaaling
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Kvalitetsmålingar for datasettet.



  standarder:
    range: Standard
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Standardar datasettet følgjer.

  # --- Domene container slots ---
  skoler:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av skole i ei datafil.
    range: Skole
    multivalued: true
    inlined: true
    inlined_as_list: true

  kommuner:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av kommune i ei datafil.
    range: Kommune
    multivalued: true
    inlined: true
    inlined_as_list: true

  fylker:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av fylke i ei datafil.
    range: Fylke
    multivalued: true
    inlined: true
    inlined_as_list: true

  private_virksomheter:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av private_virksomheter i ei datafil.
    range: PrivatVirksomhet
    multivalued: true
    inlined: true
    inlined_as_list: true

  basisgrupper:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av basisgruppe i ei datafil.
    range: Basisgruppe
    multivalued: true
    inlined: true
    inlined_as_list: true

  rektorer:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av rektor i ei datafil.
    range: Rektor
    multivalued: true
    inlined: true
    inlined_as_list: true

  elever:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av elev i ei datafil.
    range: Elev
    multivalued: true
    inlined: true
    inlined_as_list: true

  kontaktlaerere:
    description: Container slot for å legge tilrette for å kunne ha fleire instanser av kontaktlaerer i ei datafil.
    range: Kontaktlaerer
    multivalued: true
    inlined: true
    inlined_as_list: true

  # --- Datatyper ---
  kommunenummer:
    description: Kommunenummer er en nummerrekke som identifiserer kommuner eller kommunefrie områder. 
    slot_uri: dcat:identifier
    close_mappings:
      - skos:notation
    range: string

  fylkesnummer:
    description: Fylkesnummer er definerte identifikasjonskoder for Norges fylker og to territorier (Svalbard og Jan Mayen).
    slot_uri: dcat:identifier
    close_mappings:
      - skos:notation
    range: string

  organisasjonsnummer:
    description: Organisasjonsnummer er i Norge et ni-sifret registreringsnummer som tildeles av Enhetsregisteret ved Brønnøysundregistrene for en organisasjon (foretak, idrettslag og lignende).
    slot_uri: dct:identifier
    exact_mappings:
      - adms:identifier
    range: string

  trinniva:
    description: Grunnskolen (6-15 år) er delt opp i 10 trinn, eit for kvart år.
    range: string

  # --- Relasjoner ---
  har_skoleeier:
    description: Skoleeier for skolen
    exact_mappings:
      - org:hasUnit
    domain: Skole
    range: Skoleeier

  del_av_skole:
    description: Skolen basisgruppa tilhører
    slot_uri: org:unitOf
    close_mappings:
      - schema:isPartOf
    domain: Basisgruppe
    range: Skole


  horer_til_basisgruppe:
    description: Basisgruppe elev tilhører
    close_mappings:
      - schema:memberOf
    domain: Elev
    range: Basisgruppe


  enhetsleder_for:
    description: Enhet rektor er enhetsleder for
    close_mappings:
      - org:headOf
    domain: Rektor
    range: Skole


  tilknyttet_basisgruppe:
    description: Basisgruppe kontaktlærer er tilknyttet
    close_mappings:
      - schema:teaches
    domain: Kontaktlaerer
    range: Basisgruppe


  har_saerlig_ansvar_for:
    description: Elev kontaktlæreren har særlig ansvar for
    domain: Kontaktlaerer
    range: Elev


  jobber_paa_skole:
    description: Skolen kontaktlæreren jobber på
    close_mappings:
      - schema:worksFor
      - org:memberOf
    domain: Kontaktlaerer
    range: Skole