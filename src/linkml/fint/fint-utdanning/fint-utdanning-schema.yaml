    class_uri: utd:Klassemedlemskap
    attributes:
      elevforhold:
        slot_uri: utd:elevforhold
        range: Elevforhold
        description: Elevforholdet dette medlemskapet gjeld.
        in_subset:
          - Valgfri
      klasse:
        slot_uri: utd:klasse
        range: Klasse
        description: Klassen dette medlemskapet er i.
        in_subset:
          - Valgfri

  Kontaktlaerergruppe:
    is_a: Gruppe
    description: Gruppe av elevar med felles kontaktlærar.
    class_uri: utd:Kontaktlaerergruppe
    attributes:
      klasse:
        slot_uri: utd:klasse
        range: Klasse
        multivalued: true
