id: https://data.norge.no/fint/fint-arkiv
name: fint-arkiv
title: FINT Arkiv
description: >
  FINT-domenemodell for arkiv basert på Noark 5-standarden. Dekkjer sakshandtering,
  journalpostar, dokumenthandsaming, tilgangsstyring og spesialiserte saksmappe-typar.
version: "4.0.20"

default_prefix: https://schema.fintlabs.no/arkiv/
default_range: string

imports:
  - linkml:types
  - ../fint-common/fint-common-schema

prefixes:
  linkml: https://w3id.org/linkml/
  fint:   https://schema.fintlabs.no/
  ark:    https://schema.fintlabs.no/arkiv/

# ---------------------------------------------------------------------------
# Slots
# ---------------------------------------------------------------------------

slots:

  # --- ArkivContainer-lister ------------------------------------------------

  # --- Felles ark-slots (delt mellom fleire klasser) ------------------------

  tittel:
    slot_uri: ark:tittel
    range: string
    description: Tittel eller namn på arkivenheten.

  avsluttetDato:
    slot_uri: ark:avsluttetDato
    range: datetime
    description: Dato og klokkeslett når arkivenheten vart avslutta/lukka.

  opprettetDato:
    slot_uri: ark:opprettetDato
    range: datetime
    description: Dato og klokkeslett arkivenheten vart oppretta/registrert.

  offentligTittel:
    slot_uri: ark:offentligTittel
    range: string
    description: Offentleg tittel der skjerma ord er fjerna.

  klasse:
    slot_uri: ark:klasse
    range: Klasse
    description: Klassifisering av arkivenhet.

  part:
    slot_uri: ark:part
    range: Part
    multivalued: true
    inlined_as_list: true
    description: Partar til arkivenhet.

  merknad:
    slot_uri: ark:merknad
    range: Merknad
    multivalued: true
    inlined_as_list: true
    description: Merknader knytt til arkivenhet.

  skjerming:
    slot_uri: ark:skjerming
    range: Skjerming
    inlined: true
    description: Skjerming av arkivenhet.

  arkivdel:
    slot_uri: ark:arkivdel
    range: Arkivdel
    description: Arkivdel arkivenheten tilhøyrer.

  opprettetAv:
    slot_uri: ark:opprettetAv
    range: Arkivressurs
    description: Person som oppretta/registrerte arkivenheten.

  avsluttetAv:
    slot_uri: ark:avsluttetAv
    range: Arkivressurs
    description: Person som avslutta/lukka arkivenheten.

  noekkelord:
    slot_uri: ark:noekkelord
    range: string
    multivalued: true
    description: Nøkkelord som skildrar innhaldet (Mappe).

  mappeId:
    slot_uri: ark:mappeId
    range: Identifikator
    inlined: true
    description: Eintydig identifikasjon av mappa innanfor arkivet.

  tilgangsgruppe:
    slot_uri: ark:tilgangsgruppe
    range: Tilgangsgruppe
    description: Tilgangsgruppe som har tilgang til arkivenheten.

  administrativEnhet:
    slot_uri: ark:administrativEnhet
    range: AdministrativEnhet
    description: Administrativ eining som har ansvar for saksbehandlinga.

  journalenhet:
    slot_uri: ark:journalenhet
    range: AdministrativEnhet
    description: Eining med arkivmessig ansvar.

  arkivressurs:
    slot_uri: ark:arkivressurs
    range: Arkivressurs
    multivalued: true
    description: Arkivressursar.

  tilgangsrestriksjon:
    slot_uri: ark:tilgangsrestriksjon
    range: Tilgangsrestriksjon
    description: Tilgangsrestriksjon.

  forfatter:
    slot_uri: ark:forfatter
    range: string
    multivalued: true
    description: Namn på person eller organisasjon som skapte dokumentet.

  # --- Saksmappe ------------------------------------------------------------

  journalpost:
    slot_uri: ark:journalpost
    range: Journalpost
    multivalued: true
    description: Journalpostar knytt til saksmappa.

  saksaar:
    slot_uri: ark:saksaar
    range: string
    description: Inngår i M003 mappeID — viser året saksmappa vart oppretta.

  saksdato:
    slot_uri: ark:saksdato
    range: datetime
    description: Datoen saka er oppretta.

  sakssekvensnummer:
    slot_uri: ark:sakssekvensnummer
    range: string
    description: Inngår i M003 mappeID — viser rekkjefølgja saksmappene vart oppretta.

  utlaantDato:
    slot_uri: ark:utlaantDato
    range: datetime
    description: Dato ein fysisk saksmappe eller journalpost vart utlånt.

  saksmappetype:
    slot_uri: ark:saksmappetype
    range: Saksmappetype
    description: Type saksmappe.

  saksstatus:
    slot_uri: ark:saksstatus
    range: Saksstatus
    description: Status til saksmappa.

  saksansvarlig:
    slot_uri: ark:saksansvarlig
    range: Arkivressurs
    description: Person som er saksansvarleg.

  # --- Registrering ---------------------------------------------------------

  arkivertDato:
    slot_uri: ark:arkivertDato
    range: datetime
    description: Dato og klokkeslett alle dokument knytt til registreringa vart arkivert.

  dokumentbeskrivelse:
    slot_uri: ark:dokumentbeskrivelse
    range: Dokumentbeskrivelse
    multivalued: true
    description: Dokumentbeskrivelsar til ei registrering.

  korrespondansepart:
    slot_uri: ark:korrespondansepart
    range: Korrespondansepart
    multivalued: true
    inlined_as_list: true
    description: Mottakar eller sendar av arkivdokument.

  nokkelord:
    slot_uri: ark:nokkelord
    range: string
    multivalued: true
    description: Nøkkelord som skildrar innhaldet (Registrering).

  referanseArkivDel:
    slot_uri: ark:referanseArkivDel
    range: string
    multivalued: true
    description: Referanse til arkivdelen denne arkivenheten er tilknytt.

  registreringsId:
    slot_uri: ark:registreringsId
    range: string
    description: Inngår i M004 journalpostID.

  saksbehandler:
    slot_uri: ark:saksbehandler
    range: Arkivressurs
    description: Person som er saksbehandlar.

  arkivertAv:
    slot_uri: ark:arkivertAv
    range: Arkivressurs
    description: Person som arkiverte arkivenheten.

  # --- AdministrativEnhet / Personalmappe -----------------------------------

  # navn: string — brukt av AdministrativEnhet og alle kodeverk-klassar
  # navn:
  #   slot_uri: ark:navn
  #   range: string
  #   description: Namn på arkivenhet eller kodeverk-element.

  # personnavn: Personnavn — brukt av Personalmappe (same slot_uri som navn, ulik range)
  personnavn:
    slot_uri: ark:personnavn
    range: Personnavn
    inlined: true
    description: Namn på person (Personnavn-objekt).

  organisasjonselement:
    slot_uri: ark:organisasjonselement
    range: uriorcurie
    description: Referanse til Organisasjonselement i Administrasjon-domenet.

  # --- Arkivressurs ---------------------------------------------------------

  kildesystemId:
    slot_uri: ark:kildesystemId
    range: Identifikator
    inlined: true
    description: Kildesystemets identifikator for arkivressursen.

  personalressurs:
    slot_uri: ark:personalressurs
    range: uriorcurie
    description: Referanse til Personalressurs i Administrasjon-domenet.

  autorisasjon:
    slot_uri: ark:autorisasjon
    range: Autorisasjon
    multivalued: true
    description: Autorisasjonar gjevne til arkivressursen.

  tilgang:
    slot_uri: ark:tilgang
    range: Tilgang
    multivalued: true
    description: Tilgangar gjevne til arkivressursen.

  # --- Autorisasjon ---------------------------------------------------------

  administrativenhet:
    slot_uri: ark:administrativenhet
    range: AdministrativEnhet
    multivalued: true
    description: Administrative einingar autorisasjonen er gyldig for.

  # --- Klassifikasjonssystem ------------------------------------------------

  klassifikasjonssystem:
    slot_uri: ark:klassifikasjonssystem
    range: Klassifikasjonssystem
    description: Klassifikasjonssystem.

  klassifikasjonstype:
    slot_uri: ark:klassifikasjonstype
    range: Klassifikasjonstype
    description: Type klassifikasjonssystem.

  avsluttetAvNavn:
    slot_uri: ark:avsluttetAvNavn
    range: string
    description: Namn på person som avslutta/lukka arkivenheten.

  opprettetAvNavn:
    slot_uri: ark:opprettetAvNavn
    range: string
    description: Namn på person som oppretta/registrerte arkivenheten.

  # --- Tilgang --------------------------------------------------------------

  rolle:
    slot_uri: ark:rolle
    range: Rolle
    description: Rolle tilknytt tilgangen.

  # --- Dokumentfil ----------------------------------------------------------

  data:
    slot_uri: ark:data
    range: string
    description: Dokumentfilens data, koda som Base64.

  filnavn:
    slot_uri: ark:filnavn
    range: string
    description: Dokumentfilens namn.

  format:
    slot_uri: ark:format
    range: string
    description: Format på dokumentfil, som IANA Media Type.

  # --- Journalpost ----------------------------------------------------------

  antallVedlegg:
    slot_uri: ark:antallVedlegg
    range: integer
    description: Antal fysiske vedlegg til eit fysisk hoveddokument.

  avskrivning:
    slot_uri: ark:avskrivning
    range: Avskrivning
    inlined: true
    description: Avskriving av journalposten.

  dokumentetsDato:
    slot_uri: ark:dokumentetsDato
    range: datetime
    description: Dato påført sjølve dokumentet.

  forfallsDato:
    slot_uri: ark:forfallsDato
    range: datetime
    description: Frist for å svare på eit inngåande dokument.

  journalAr:
    slot_uri: ark:journalAr
    range: string
    description: Året journalposten vart oppretta.

  journalDato:
    slot_uri: ark:journalDato
    range: datetime
    description: Datoen journalposten er oppretta/arkivert.

  journalPostnummer:
    slot_uri: ark:journalPostnummer
    range: integer
    description: Rekkjefølgja journalpostane vart oppretta innanfor saksmappa.

  journalSekvensnummer:
    slot_uri: ark:journalSekvensnummer
    range: integer
    description: Rekkjefølgja journalposten vart oppretta under året.

  mottattDato:
    slot_uri: ark:mottattDato
    range: datetime
    description: Dato eit eksternt dokument vart motteke.

  offentlighetsvurdertDato:
    slot_uri: ark:offentlighetsvurdertDato
    range: datetime
    description: Datoen offentlegheitsvurdering vart gjennomført.

  sendtDato:
    slot_uri: ark:sendtDato
    range: datetime
    description: Dato eit internt produsert dokument vart sendt/ekspedert.

  journalposttype:
    slot_uri: ark:journalposttype
    range: JournalpostType
    description: Namn på type journalpost.

  journalstatus:
    slot_uri: ark:journalstatus
    range: JournalStatus
    description: Status til journalposten.

  # --- Dokumentbeskrivelse --------------------------------------------------

  dokumentnummer:
    slot_uri: ark:dokumentnummer
    range: integer
    description: Identifikasjon av dokumenta innanfor ei registrering.

  dokumentobjekt:
    slot_uri: ark:dokumentobjekt
    range: Dokumentobjekt
    multivalued: true
    inlined_as_list: true
    description: Dokumentobjekt tilhøyrande dokumentbeskrivelsa.

  referanseArkivdel:
    slot_uri: ark:referanseArkivdel
    range: string
    multivalued: true
    description: Referanse til arkivdelen denne arkivenheten er tilknytt.

  tilknyttetDato:
    slot_uri: ark:tilknyttetDato
    range: datetime
    description: Datoen eit dokument vart knytt til ei registrering.

  dokumentstatus:
    slot_uri: ark:dokumentstatus
    range: DokumentStatus
    description: Status til dokumentet.

  dokumentType:
    slot_uri: ark:dokumentType
    range: DokumentType
    description: Namn på type dokument.

  tilknyttetRegistreringSom:
    slot_uri: ark:tilknyttetRegistreringSom
    range: TilknyttetRegistreringSom
    multivalued: true
    description: Rolle dokumentet har i høve registreringa.

  tilknyttetAv:
    slot_uri: ark:tilknyttetAv
    range: Arkivressurs
    description: Person som knytte dokumentet til registreringa.

  # --- Dokumentobjekt -------------------------------------------------------

  filstorrelse:
    slot_uri: ark:filstorrelse
    range: string
    description: Storleiken på fila i antal bytes.

  formatDetaljer:
    slot_uri: ark:formatDetaljer
    range: string
    description: Nærare spesifikasjon av dokumentets format.

  sjekksum:
    slot_uri: ark:sjekksum
    range: string
    description: Verdi som gir integritetssikring til dokumentets innhald.

  sjekksumAlgoritme:
    slot_uri: ark:sjekksumAlgoritme
    range: string
    description: Algoritme nytta for å berekne sjekksummen.

  versjonsnummer:
    slot_uri: ark:versjonsnummer
    range: integer
    description: Identifikasjon av versjonar innanfor same dokument.

  filformat:
    slot_uri: ark:filformat
    range: Format
    description: Dokumentets format.

  variantFormat:
    slot_uri: ark:variantFormat
    range: Variantformat
    description: Kva variant dokumentet førekjem i.

  referanseDokumentfil:
    slot_uri: ark:referanseDokumentfil
    range: Dokumentfil
    description: Referanse til fila som inneheld det elektroniske dokumentet.

  # --- Klasse ---------------------------------------------------------------

  klasseId:
    slot_uri: ark:klasseId
    range: string
    description: Eintydig identifikasjon av klassen innanfor klassifikasjonssystemet.

  rekkefoelge:
    slot_uri: ark:rekkefolge
    range: integer
    description: Rekkjefølgje for klassifiseringar.

  # --- Korrespondansepart / Part --------------------------------------------

  foedselsnummer:
    slot_uri: ark:foedselsnummer
    range: string
    description: Fødselsnummer.

  # Brukt i Korrespondansepart og Part: ark:kontaktperson (string).
  # Ulikt frå fint-common sin 'kontaktperson' (fint:kontaktpersonFor, range Person).
  kontaktperson_str:
    slot_uri: ark:kontaktperson
    range: string
    description: Kontaktperson hos ein organisasjon som er avsender, mottakar eller sakspart.

  korrespondansepartNavn:
    slot_uri: ark:korrespondansepartNavn
    range: string
    description: Namn på person eller organisasjon som er avsender eller mottakar.

  # ark:organisasjonsnummer (string) — ulikt frå fint-common sin (fint:organisasjonsnummer, Identifikator).
  orgnummer:
    slot_uri: ark:organisasjonsnummer
    range: string
    description: Organisasjonsnummer.

  korrespondanseparttype:
    slot_uri: ark:korrespondanseparttype
    range: KorrespondansepartType
    description: Type korrespondansepart.

  partNavn:
    slot_uri: ark:partNavn
    range: string
    description: Namn på verksemd eller person som er part.

  partRolle:
    slot_uri: ark:partRolle
    range: PartRolle
    description: Rolla til parten.

  # --- Merknad --------------------------------------------------------------

  merknadsdato:
    slot_uri: ark:merknadsdato
    range: datetime
    description: Dato og klokkeslett merknaden vart registrert.

  merknadstekst:
    slot_uri: ark:merknadstekst
    range: string
    description: Merknad frå saksbehandlar, leiar eller arkivpersonale.

  merknadstype:
    slot_uri: ark:merknadstype
    range: Merknadstype
    description: Type merknad.

  merknadRegistrertAv:
    slot_uri: ark:merknadRegistrertAv
    range: Arkivressurs
    description: Person som registrerte merknaden.

  # --- Skjerming ------------------------------------------------------------

  skjermingshjemmel:
    slot_uri: ark:skjermingshjemmel
    range: Skjermingshjemmel
    description: Skjermingsheimelen.

  # --- Avskrivning ----------------------------------------------------------

  avskrevetAv:
    slot_uri: ark:avskrevetAv
    range: string
    description: Person som avskriva journalposten.

  avskrivningsdato:
    slot_uri: ark:avskrivningsdato
    range: datetime
    description: Dato og klokkeslett for avskrivinga.

  avskrivningsmate:
    slot_uri: ark:avskrivningsmate
    range: string
    description: Korleis journalposten er avskriven.

  # --- Personalmappe --------------------------------------------------------

  # person:
  #   slot_uri: ark:person
  #   range: uriorcurie
  #   description: Referanse til Person i Administrasjon-domenet.

  leder:
    slot_uri: ark:leder
    range: uriorcurie
    description: Referanse til Personalressurs som er arbeidstakarens leiar.

  arbeidssted:
    slot_uri: ark:arbeidssted
    range: uriorcurie
    description: Referanse til Organisasjonselement som er arbeidstakarens arbeidsstad.

  # --- Kulturminnevern / Samferdsel -----------------------------------------

  kulturminneId:
    slot_uri: ark:kulturminneId
    range: string
    description: Kulturminnets ID i Askeladden.

  matrikkelnummer:
    slot_uri: ark:matrikkelnummer
    range: Matrikkelnummer
    inlined: true
    description: Kulturminnets/bygningens identifikator i Matrikkelen.

  soeknadsnummer:
    slot_uri: ark:soeknadsnummer
    range: Identifikator
    inlined: true
    description: Søknadsnummer frå Digisak.

  tiltak:
    slot_uri: ark:tiltak
    range: string
    description: Skildrar kva tiltak som skal utførast på eigedommen.

  fartoyNavn:
    slot_uri: ark:fartoyNavn
    range: string
    description: Fartøyets namn.

  kallesignal:
    slot_uri: ark:kallesignal
    range: string
    description: Fartøyets kallesignal.

  bygningsnavn:
    slot_uri: ark:bygningsnavn
    range: string
    description: Bygningens namn.

# ---------------------------------------------------------------------------
# Klasser
# ---------------------------------------------------------------------------

classes:

  ArkivContainer:
    tree_root: true
    description: Rotcontainer for FINT Arkiv-instansar.
    attributes:
      # arkiv.noark - Hauptklassar
      arkivdelar:
        range: Arkivdel
        multivalued: true
        inlined_as_list: true
      arkivressursar:
        range: Arkivressurs
        multivalued: true
        inlined_as_list: true
      autorisasjonar:
        range: Autorisasjon
        multivalued: true
        inlined_as_list: true
      administrativeEiningar:
        range: AdministrativEnhet
        multivalued: true
        inlined_as_list: true
      dokumentfiler:
        range: Dokumentfil
        multivalued: true
        inlined_as_list: true
      dokumentbeskrivelsar:
        range: Dokumentbeskrivelse
        multivalued: true
        inlined_as_list: true
      journalpostar:
        range: Journalpost
        multivalued: true
        inlined_as_list: true
      klassifikasjonssystem:
        range: Klassifikasjonssystem
      tilgangar:
        range: Tilgang
        multivalued: true
        inlined_as_list: true
      sakar:
        range: Sak
        multivalued: true
        inlined_as_list: true
      # arkiv.personal
      personalmappe_liste:
        range: Personalmappe
        multivalued: true
        inlined_as_list: true
      # arkiv.kulturminnevern
      dispensasjonAutomatiskFredaKulturminne_liste:
        range: DispensasjonAutomatiskFredaKulturminne
        multivalued: true
        inlined_as_list: true
      tilskuddFartoy_liste:
        range: TilskuddFartoy
        multivalued: true
        inlined_as_list: true
      tilskuddFredaBygningPrivatEie_liste:
        range: TilskuddFredaBygningPrivatEie
        multivalued: true
        inlined_as_list: true
      # arkiv.samferdsel
      soeknadDrosjeloeyve_liste:
        range: SoeknadDrosjeloeyve
        multivalued: true
        inlined_as_list: true
      # arkiv.kodeverk
      dokumentstatuskodar:
        range: DokumentStatus
        multivalued: true
        inlined_as_list: true
      dokumenttypar:
        range: DokumentType
        multivalued: true
        inlined_as_list: true
      formatar:
        range: Format
        multivalued: true
        inlined_as_list: true
      journalposttypar:
        range: JournalpostType
        multivalued: true
        inlined_as_list: true
      journalstatuskodar:
        range: JournalStatus
        multivalued: true
        inlined_as_list: true
      klassifikasjonstypar:
        range: Klassifikasjonstype
        multivalued: true
        inlined_as_list: true
      korrespondanseparttypar:
        range: KorrespondansepartType
        multivalued: true
        inlined_as_list: true
      merknadstypar:
        range: Merknadstype
        multivalued: true
        inlined_as_list: true
      partRollar:
        range: PartRolle
        multivalued: true
        inlined_as_list: true
      rollar:
        range: Rolle
        multivalued: true
        inlined_as_list: true
      saksmappetypar:
        range: Saksmappetype
        multivalued: true
        inlined_as_list: true
      sakstatuskodar:
        range: Saksstatus
        multivalued: true
        inlined_as_list: true
      skjermingsheimlar:
        range: Skjermingshjemmel
        multivalued: true
        inlined_as_list: true
      tilgangsgrupper:
        range: Tilgangsgruppe
        multivalued: true
        inlined_as_list: true
      tilgangsrestriksjonar:
        range: Tilgangsrestriksjon
        multivalued: true
        inlined_as_list: true
      tilknyttetRegistreringSomKodar:
        range: TilknyttetRegistreringSom
        multivalued: true
        inlined_as_list: true
      variantformatar:
        range: Variantformat
        multivalued: true
        inlined_as_list: true
    slot_usage:
      klassifikasjonssystem:
        multivalued: true
        inlined_as_list: true

  # --- arkiv.noark: abstrakte basisklassar ------------------------------------

  Mappe:
    abstract: true
    description: Abstrakt basisklasse for alle mappetypar. Grupperer dokument som høyrer saman.
    class_uri: ark:Mappe
    slots:
      - id
      - avsluttetDato
      - beskrivelse
      - klasse
      - mappeId
      - merknad
      - noekkelord
      - offentligTittel
      - opprettetDato
      - part
      - skjerming
      - tittel
      - arkivdel
      - avsluttetAv
      - opprettetAv
    slot_usage:
      avsluttetDato:
        in_subset:
          - Valgfri
      beskrivelse:
        in_subset:
          - Valgfri
      klasse:
        multivalued: true
        inlined_as_list: true
        in_subset:
          - Valgfri
      mappeId:
        in_subset:
          - Valgfri
      merknad:
        in_subset:
          - Valgfri
      noekkelord:
        in_subset:
          - Valgfri
      offentligTittel:
        in_subset:
          - Valgfri
      opprettetDato:
        in_subset:
          - Valgfri
      part:
        in_subset:
          - Valgfri
      skjerming:
        in_subset:
          - Valgfri
      tittel:
        in_subset:
          - Valgfri
      arkivdel:
        in_subset:
