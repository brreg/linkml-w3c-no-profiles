name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build-validator:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Cache mcp-linkml-validator image
        id: cache
        uses: actions/cache@v4
        with:
          path: mcp-linkml-validator.tar.zst
          key: mcp-linkml-validator-${{ hashFiles('src/mcp-linkml-validator/Dockerfile', 'src/mcp-linkml-validator/requirements.txt') }}
      - name: Bygg mcp-linkml-validator image
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          make mcp-val-build
          podman save mcp-linkml-validator | zstd -T0 > mcp-linkml-validator.tar.zst
      - name: Last inn image frå cache
        if: steps.cache.outputs.cache-hit == 'true'
        run: podman load < <(zstd -d -c mcp-linkml-validator.tar.zst)
      - name: Push til GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman tag mcp-linkml-validator ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.sha }}
          podman push ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:${{ github.sha }}
          podman tag mcp-linkml-validator ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:latest
          podman push ghcr.io/${{ github.repository_owner }}/mcp-linkml-validator:latest

  validate-ap-no:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: ap-no
      - uses: ./.github/actions/validate-examples
        with:
          domain: ap-no

  validate-fair:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: fair
      - uses: ./.github/actions/validate-examples
        with:
          domain: fair

  validate-fint:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: fint
      - uses: ./.github/actions/validate-examples
        with:
          domain: fint

  validate-ngr:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: ngr
      - uses: ./.github/actions/validate-examples
        with:
          domain: ngr

  validate-oreg:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: oreg
      - uses: ./.github/actions/validate-examples
        with:
          domain: oreg

  validate-samt:
    needs: build-validator
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-validator
      - uses: ./.github/actions/validate-bronze
        with:
          domain: samt
      - uses: ./.github/actions/validate-examples
        with:
          domain: samt
