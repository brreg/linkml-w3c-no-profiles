name: Generer context.jsonld
description: Køyrer gen-jsonld-context for alle skjema i domenet eller for eitt skjema

inputs:
  domain:
    description: Domenenamn (ap-no, fair, fint, ngr, oreg, samt)
    required: false
  schema:
    description: Sti til enkeltskjema
    required: false

runs:
  using: composite
  steps:
    - name: Generer context.jsonld — domene
      if: ${{ inputs.domain != '' }}
      shell: bash
      run: make domain-gen-context DOMAIN=${{ inputs.domain }}
    - name: Generer context.jsonld — enkeltskjema
      if: ${{ inputs.schema != '' }}
      shell: bash
      run: make schema-gen-context SCHEMA=${{ inputs.schema }}
